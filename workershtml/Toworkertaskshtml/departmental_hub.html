<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Departmental Hub | SoMAp</title>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
  <script src="../../somapappv1multischool/js/context.js"></script>
  <script src="../../Todashboardhtml/yearContext.js"></script>
  <script src="../../firebase.js"></script>
  <style>
    :root {
      --bg: #f6f7fb;
      --ink: #172033;
      --muted: #667085;
      --line: #d9deea;
      --brand: #3457d5;
      --brand2: #07966f;
      --danger: #b42318;
      --card: #ffffff;
      --soft: #eef3ff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Arial, sans-serif;
      background: var(--bg);
      color: var(--ink);
    }
    .shell { max-width: 1240px; margin: 0 auto; padding: 24px; }
    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
      margin-bottom: 22px;
    }
    .brand h1 { margin: 0; font-size: clamp(1.6rem, 3vw, 2.4rem); letter-spacing: 0; }
    .brand p { margin: 6px 0 0; color: var(--muted); }
    .actions { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
    .select, .input {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px 12px;
      background: #fff;
      color: var(--ink);
      min-height: 42px;
    }
    .btn {
      border: 0;
      border-radius: 10px;
      padding: 10px 14px;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 42px;
    }
    .btn.primary { background: var(--brand); color: #fff; }
    .btn.soft { background: var(--soft); color: var(--brand); border: 1px solid #cbd7ff; }
    .btn.danger { background: #fee4e2; color: var(--danger); }
    .summary {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
      gap: 14px;
      margin-bottom: 20px;
    }
    .summary-card, .dept-card, .panel {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      box-shadow: 0 12px 30px rgba(16, 24, 40, 0.06);
    }
    .summary-card { padding: 16px; }
    .summary-card strong { display: block; font-size: 1.8rem; }
    .summary-card span { color: var(--muted); font-size: .9rem; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 16px;
    }
    .dept-card {
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      min-height: 260px;
    }
    .dept-head { display: flex; justify-content: space-between; gap: 12px; align-items: flex-start; }
    .dept-title { margin: 0; font-size: 1.08rem; }
    .dept-sub { color: var(--muted); margin: 6px 0 0; line-height: 1.45; font-size: .92rem; }
    .pill {
      border-radius: 999px;
      background: #ecfdf3;
      color: #027a48;
      padding: 5px 9px;
      font-size: .75rem;
      font-weight: 800;
      white-space: nowrap;
    }
    .pill.waiting { background: #fff6db; color: #9a6700; }
    .person { display: flex; align-items: center; gap: 12px; padding: 12px; background: #f8fafc; border-radius: 12px; border: 1px solid #e7ebf3; }
    .person img { width: 52px; height: 52px; border-radius: 12px; object-fit: cover; background: #dde3ee; }
    .person b { display: block; }
    .person small { display: block; color: var(--muted); margin-top: 2px; }
    .card-actions { display: flex; flex-wrap: wrap; gap: 8px; margin-top: auto; }
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(13, 18, 32, .62);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
      z-index: 20;
    }
    .modal.open { display: flex; }
    .panel { width: min(980px, 96vw); max-height: 88vh; overflow: auto; padding: 20px; }
    .panel-head { display: flex; justify-content: space-between; gap: 12px; align-items: flex-start; margin-bottom: 16px; }
    .worker-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 12px; }
    .worker-card {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px;
      background: #fff;
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .worker-card.blocked { opacity: .55; background: #f8fafc; }
    .worker-card img { width: 48px; height: 48px; border-radius: 10px; object-fit: cover; background: #dde3ee; }
    .worker-card .meta { flex: 1; min-width: 0; }
    .worker-card b, .person b { word-break: break-word; }
    .notice { padding: 12px 14px; border-radius: 12px; background: #eef3ff; color: #263b8f; margin-bottom: 16px; }
    .hidden { display: none !important; }
    @media (max-width: 720px) {
      .shell { padding: 16px; }
      .topbar { align-items: flex-start; flex-direction: column; }
      .actions { width: 100%; }
      .actions .btn, .actions .select { flex: 1 1 150px; }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="topbar">
      <div class="brand">
        <h1>Departmental Hub</h1>
        <p id="schoolLine">Loading school...</p>
      </div>
      <div class="actions">
        <select id="yearSelect" class="select" data-somap-year-select data-somap-year-min="2024" data-somap-year-max="2042"></select>
        <button class="btn soft" id="addDepartmentBtn" type="button">Add Department</button>
        <a class="btn soft" id="backLink" href="../workertasks.html">Back</a>
      </div>
    </section>

    <section class="summary">
      <div class="summary-card"><strong id="deptCount">14</strong><span>Departments</span></div>
      <div class="summary-card"><strong id="assignedCount">0</strong><span>Assigned heads</span></div>
      <div class="summary-card"><strong id="workerCount">0</strong><span>Selectable workers</span></div>
    </section>

    <div id="notice" class="notice hidden"></div>
    <section class="grid" id="departmentsGrid"></section>
  </main>

  <div class="modal" id="workerModal" aria-hidden="true">
    <section class="panel" role="dialog" aria-modal="true">
      <div class="panel-head">
        <div>
          <h2 id="modalTitle" style="margin:0;">Select Head</h2>
          <p id="modalSub" style="margin:6px 0 0;color:var(--muted);">Choose from registered active workers.</p>
        </div>
        <button class="btn soft" id="closeModal" type="button">Close</button>
      </div>
      <input id="workerSearch" class="input" style="width:100%;margin-bottom:14px;" placeholder="Search worker by name, role, or phone">
      <div class="worker-grid" id="workerGrid"></div>
    </section>
  </div>

  <div class="modal" id="departmentModal" aria-hidden="true">
    <section class="panel" role="dialog" aria-modal="true" style="max-width:560px;">
      <div class="panel-head">
        <div>
          <h2 style="margin:0;">Add Department</h2>
          <p style="margin:6px 0 0;color:var(--muted);">Use this when the school creates a new department.</p>
        </div>
        <button class="btn soft" id="closeDepartmentModal" type="button">Close</button>
      </div>
      <label>Department name</label>
      <input id="newDepartmentName" class="input" style="width:100%;margin:6px 0 12px;" placeholder="Example: Boarding">
      <label>Description</label>
      <input id="newDepartmentDescription" class="input" style="width:100%;margin:6px 0 16px;" placeholder="What this department manages">
      <button class="btn primary" id="saveDepartmentBtn" type="button">Save Department</button>
    </section>
  </div>

  <script>
    const DEFAULT_DEPARTMENTS = [
      { key: 'house_shelter', title: 'House / Shelter', desc: 'Classes, offices, buildings, and learning shelter.', hubKey: 'storekeeper' },
      { key: 'food', title: 'Food', desc: 'Kitchen, meals, food stock, daily food invoice, and feeding accountability.', hubKey: 'cook', invoice: true },
      { key: 'clothing', title: 'Clothing', desc: 'Uniforms, curtains, tracksuits, and school textile needs.', hubKey: '' },
      { key: 'water', title: 'Water', desc: 'Water supply, storage, drinking points, and usage follow-up.', hubKey: '' },
      { key: 'education', title: 'Education', desc: 'Academic teaching and learning supervision.', reserved: true },
      { key: 'health', title: 'Health', desc: 'Student health, first aid, and medical follow-up.', hubKey: '' },
      { key: 'sanitation', title: 'Sanitation / Cleanliness', desc: 'Cleanliness, hygiene, and daily sanitation routines.', hubKey: 'cleaner' },
      { key: 'transport', title: 'Transport', desc: 'School vehicles, routes, driver follow-up, and transport records.', hubKey: 'driver' },
      { key: 'security', title: 'Security', desc: 'Gate, safety, incident records, and school protection.', hubKey: 'guard' },
      { key: 'conflict', title: 'Conflict', desc: 'Student and worker conflict reporting and resolution follow-up.', hubKey: '' },
      { key: 'projects', title: 'Projects', desc: 'School progress projects, repairs, and improvements.', hubKey: '' },
      { key: 'finance', title: 'Finance', desc: 'Money control and finance leadership.', reserved: true },
      { key: 'environment', title: 'Environment', desc: 'Trees, gardens, waste control, and school environment.', hubKey: '' },
      { key: 'store', title: 'Store', desc: 'Stores, supplies, and stock control.', hubKey: 'storekeeper' }
    ];
    const RESERVED_ROLES = new Set(['accountant', 'head_finance', 'head teacher', 'headteacher', 'academic', 'academic teacher', 'admin']);
    const HUB_URLS = {
      cook: '../workerscooks.html',
      cleaner: '../workersmsafi.html',
      guard: '../workersmlinzi.html',
      storekeeper: '../workersstorekeeper.html',
      driver: '../../transporthtml/transportdriver/transporthub.html'
    };
    const state = { year: String(new Date().getFullYear()), departments: [], assignments: {}, workers: [], activeDept: null };

    const qs = new URLSearchParams(location.search);
    const requestedSchoolId = qs.get('school') || localStorage.getItem('somap.currentSchoolId') || 'socrates-school';
    if (window.SOMAP?.setSchoolId) {
      SOMAP.setSchoolId(requestedSchoolId);
    }
    if (requestedSchoolId === 'socrates-school' && window.SOMAP?.setSchool) {
      SOMAP.setSchool({ id: 'socrates-school', name: 'Socrates School' });
    }

    const db = firebase.database();
    const school = window.SOMAP?.getSchool?.() || { id: 'socrates-school', name: 'Socrates School' };
    const schoolRef = (path) => db.ref(SOMAP.P(path));
    const isSocrates = ['socrates-school', 'default', 'socrates'].includes(school.id);

    function scopedOrLegacy(scopedPath, legacyPath) {
      return schoolRef(scopedPath).once('value').then(snap => {
        if (snap.exists() || !isSocrates) return snap;
        return db.ref(legacyPath).once('value');
      });
    }
    function esc(value) {
      return String(value ?? '').replace(/[&<>"']/g, s => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[s]));
    }
    function roleOf(worker) {
      return String(worker?.profile?.role || worker?.role || worker?.profile?.jobTitle || worker?.profile?.position || '').trim().toLowerCase();
    }
    function workerName(id, worker) {
      const p = worker?.profile || {};
      return p.fullNameUpper || [p.firstName, p.middleName, p.lastName].filter(Boolean).join(' ').toUpperCase() || id;
    }
    function photoOf(worker) {
      return worker?.docs?.idPhotoUrl || worker?.docs?.passportPhotoUrl || '../../images/somap-logo.png.jpg';
    }
    function phoneOf(worker) {
      return worker?.profile?.phone || worker?.profile?.phoneNumber || '';
    }
    function activeWorkers(raw = {}) {
      return Object.entries(raw)
        .map(([id, worker]) => ({ id, worker, name: workerName(id, worker), role: roleOf(worker), phone: phoneOf(worker), photo: photoOf(worker) }))
        .filter(item => item.worker?.profile?.active !== false);
    }
    function canSelectWorker(item) {
      return item.role && !RESERVED_ROLES.has(item.role);
    }
    function hubUrl(dept) {
      if (!dept?.hubKey || !HUB_URLS[dept.hubKey]) return '';
      if (dept.hubKey === 'driver') {
        const assigned = state.assignments[dept.key] || {};
        const params = new URLSearchParams({
          school: school.id,
          schoolName: school.name || '',
          year: state.year,
          driverUid: assigned.workerId || '',
          driverName: assigned.workerName || ''
        });
        return `${HUB_URLS.driver}?${params.toString()}`;
      }
      return `${HUB_URLS[dept.hubKey]}?department=${encodeURIComponent(dept.key)}&year=${encodeURIComponent(state.year)}`;
    }
    function setNotice(message) {
      const el = document.getElementById('notice');
      el.textContent = message;
      el.classList.remove('hidden');
      setTimeout(() => el.classList.add('hidden'), 3500);
    }
    async function loadAll() {
      document.getElementById('schoolLine').textContent = `${school.name || school.id} - Academic Year ${state.year}`;
      const [customSnap, assignmentsSnap, workersSnap] = await Promise.all([
        schoolRef(`years/${state.year}/departmentCatalog`).once('value').catch(() => null),
        schoolRef(`years/${state.year}/departmentHeads`).once('value').catch(() => null),
        scopedOrLegacy(`years/${state.year}/workers`, 'workers').catch(() => null)
      ]);
      const custom = customSnap?.val() || {};
      state.departments = [...DEFAULT_DEPARTMENTS, ...Object.values(custom)].filter(Boolean);
      state.assignments = assignmentsSnap?.val() || {};
      state.workers = activeWorkers(workersSnap?.val() || {});
      render();
    }
    function render() {
      document.getElementById('deptCount').textContent = state.departments.length;
      document.getElementById('assignedCount').textContent = Object.keys(state.assignments).length;
      document.getElementById('workerCount').textContent = state.workers.filter(canSelectWorker).length;
      const grid = document.getElementById('departmentsGrid');
      grid.innerHTML = state.departments.map(dept => {
        const assigned = state.assignments[dept.key];
        const url = hubUrl(dept);
        const reserved = dept.reserved;
        return `
          <article class="dept-card">
            <div class="dept-head">
              <div>
                <h3 class="dept-title">${esc(dept.title)}</h3>
                <p class="dept-sub">${esc(dept.desc)}</p>
              </div>
              <span class="pill ${assigned ? '' : 'waiting'}">${assigned ? 'Assigned' : 'Waiting'}</span>
            </div>
            ${assigned ? `
              <div class="person">
                <img src="${esc(assigned.photoUrl || '../../images/somap-logo.png.jpg')}" alt="" onerror="this.onerror=null;this.src='../../images/somap-logo.png.jpg';">
                <div>
                  <b>${esc(assigned.workerName)}</b>
                  <small>${esc(assigned.workerRole || 'worker')} ${assigned.phone ? '- ' + esc(assigned.phone) : ''}</small>
                </div>
              </div>` : `<div class="person"><img src="../../images/somap-logo.png.jpg" alt=""><div><b>No head selected</b><small>Assistant Headteacher can assign one.</small></div></div>`}
            <div class="card-actions">
              <button class="btn primary" type="button" data-assign="${esc(dept.key)}" ${reserved ? 'disabled title="Reserved for existing leadership role"' : ''}>${assigned ? 'Change Head' : 'Select Head'}</button>
              ${assigned && !reserved ? `<button class="btn danger" type="button" data-clear="${esc(dept.key)}">Clear</button>` : ''}
              ${url ? `<a class="btn soft" href="${esc(url)}">Open Hub</a>` : `<button class="btn soft" type="button" data-waiting="${esc(dept.title)}">Open Hub</button>`}
              ${dept.invoice ? `<a class="btn soft" href="../../Tofinancehtml/food-invoices.html?school=${encodeURIComponent(school.id)}&year=${encodeURIComponent(state.year)}">Food Invoices</a>` : ''}
            </div>
          </article>
        `;
      }).join('');
    }
    function openWorkerModal(deptKey) {
      const dept = state.departments.find(item => item.key === deptKey);
      if (!dept || dept.reserved) return;
      state.activeDept = dept;
      document.getElementById('modalTitle').textContent = `Select head: ${dept.title}`;
      document.getElementById('workerSearch').value = '';
      renderWorkers();
      document.getElementById('workerModal').classList.add('open');
    }
    function renderWorkers() {
      const term = document.getElementById('workerSearch').value.trim().toLowerCase();
      const workers = state.workers.filter(item => {
        const hay = `${item.name} ${item.role} ${item.phone}`.toLowerCase();
        return !term || hay.includes(term);
      });
      document.getElementById('workerGrid').innerHTML = workers.map(item => {
        const blocked = !canSelectWorker(item);
        return `
          <article class="worker-card ${blocked ? 'blocked' : ''}">
            <img src="${esc(item.photo)}" alt="" onerror="this.onerror=null;this.src='../../images/somap-logo.png.jpg';">
            <div class="meta">
              <b>${esc(item.name)}</b>
              <small>${esc(item.role || 'no role')} ${item.phone ? '- ' + esc(item.phone) : ''}</small>
            </div>
            <button class="btn ${blocked ? 'soft' : 'primary'}" type="button" data-worker="${esc(item.id)}" ${blocked ? 'disabled title="This role is reserved and cannot be selected here."' : ''}>Select</button>
          </article>
        `;
      }).join('');
    }
    async function assignWorker(workerId) {
      const dept = state.activeDept;
      const item = state.workers.find(w => w.id === workerId);
      if (!dept || !item || !canSelectWorker(item)) return;
      const old = state.assignments[dept.key];
      const payload = {
        deptKey: dept.key,
        deptTitle: dept.title,
        hubKey: dept.hubKey || '',
        workerId: item.id,
        workerName: item.name,
        workerRole: item.role,
        phone: item.phone || '',
        photoUrl: item.photo || '',
        schoolId: school.id,
        schoolName: school.name || '',
        year: state.year,
        assignedBy: localStorage.getItem('workerId') || sessionStorage.getItem('workerId') || '',
        assignedAt: Date.now()
      };
      const updates = {};
      updates[SOMAP.P(`years/${state.year}/departmentHeads/${dept.key}`)] = payload;
      updates[SOMAP.P(`years/${state.year}/workerDepartmentHeads/${item.id}/${dept.key}`)] = payload;
      if (old?.workerId && old.workerId !== item.id) {
        updates[SOMAP.P(`years/${state.year}/workerDepartmentHeads/${old.workerId}/${dept.key}`)] = null;
      }
      await db.ref().update(updates);
      document.getElementById('workerModal').classList.remove('open');
      setNotice(`${item.name} is now head of ${dept.title}.`);
      await loadAll();
    }
    async function clearDepartment(deptKey) {
      const old = state.assignments[deptKey];
      const updates = {};
      updates[SOMAP.P(`years/${state.year}/departmentHeads/${deptKey}`)] = null;
      if (old?.workerId) updates[SOMAP.P(`years/${state.year}/workerDepartmentHeads/${old.workerId}/${deptKey}`)] = null;
      await db.ref().update(updates);
      setNotice('Department head cleared.');
      await loadAll();
    }
    async function saveCustomDepartment() {
      const title = document.getElementById('newDepartmentName').value.trim();
      const desc = document.getElementById('newDepartmentDescription').value.trim();
      if (!title) return setNotice('Enter department name.');
      const key = title.toLowerCase().replace(/[^a-z0-9]+/g, '_').replace(/^_+|_+$/g, '') || `department_${Date.now()}`;
      await schoolRef(`years/${state.year}/departmentCatalog/${key}`).set({ key, title, desc: desc || title, hubKey: '', custom: true, createdAt: Date.now() });
      document.getElementById('departmentModal').classList.remove('open');
      document.getElementById('newDepartmentName').value = '';
      document.getElementById('newDepartmentDescription').value = '';
      await loadAll();
    }

    document.getElementById('departmentsGrid').addEventListener('click', (event) => {
      const assign = event.target.closest('[data-assign]');
      const clear = event.target.closest('[data-clear]');
      const waiting = event.target.closest('[data-waiting]');
      if (assign) openWorkerModal(assign.dataset.assign);
      if (clear) clearDepartment(clear.dataset.clear);
      if (waiting) setNotice(`${waiting.dataset.waiting} department is ready. Its operational page has not been built yet.`);
    });
    document.getElementById('workerGrid').addEventListener('click', (event) => {
      const btn = event.target.closest('[data-worker]');
      if (btn) assignWorker(btn.dataset.worker);
    });
    document.getElementById('workerSearch').addEventListener('input', renderWorkers);
    document.getElementById('closeModal').addEventListener('click', () => document.getElementById('workerModal').classList.remove('open'));
    document.getElementById('addDepartmentBtn').addEventListener('click', () => document.getElementById('departmentModal').classList.add('open'));
    document.getElementById('closeDepartmentModal').addEventListener('click', () => document.getElementById('departmentModal').classList.remove('open'));
    document.getElementById('saveDepartmentBtn').addEventListener('click', saveCustomDepartment);

    if (window.somapYearContext) {
      const yearSelect = document.getElementById('yearSelect');
      somapYearContext.attachYearDropdown?.(yearSelect);
      const queryYear = qs.get('year');
      if (queryYear && somapYearContext.setSelectedYear) somapYearContext.setSelectedYear(queryYear, { manual: true, forceDispatch: false });
      state.year = String(somapYearContext.getSelectedYear?.() || queryYear || new Date().getFullYear());
      yearSelect.value = state.year;
      somapYearContext.onYearChanged((year) => {
        state.year = String(year);
        const s = school.id || 'socrates-school';
        document.getElementById('backLink').href = `../workertasks.html?school=${encodeURIComponent(s)}&year=${encodeURIComponent(state.year)}`;
        loadAll();
      });
    }
    document.getElementById('backLink').href = `../workertasks.html?school=${encodeURIComponent(school.id)}&year=${encodeURIComponent(state.year)}`;
    loadAll().catch(err => setNotice(err.message || 'Failed to load departments.'));
  </script>
</body>
</html>
