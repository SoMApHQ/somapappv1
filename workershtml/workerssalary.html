<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Salary Center | SoMAp</title>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script><script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
  <script src="../somapappv1multischool/js/context.js"></script><script src="../Todashboardhtml/yearContext.js"></script><script src="../firebase.js"></script><script src="../shared/payroll_core.js"></script><script src="https://cdn.jsdelivr.net/npm/html2pdf.js@0.10.1/dist/html2pdf.bundle.min.js"></script>
  <style>
    :root{--navy:#071426;--panel:rgba(16,31,55,.9);--line:rgba(148,163,184,.17);--text:#edf4ff;--muted:#9aaac3;--gold:#f4c861;--green:#4adeaa;--red:#fb7185}*{box-sizing:border-box}body{margin:0;min-height:100vh;background:radial-gradient(circle at 90% 5%,#173a62 0,transparent 30%),linear-gradient(145deg,#06101e,#0b1b31);color:var(--text);font:14px/1.5 Inter,Segoe UI,Arial,sans-serif}.shell{max-width:1180px;margin:auto;padding:24px}.hero{display:flex;justify-content:space-between;align-items:center;gap:20px;margin-bottom:24px}.eyebrow{text-transform:uppercase;letter-spacing:.18em;color:var(--gold);font-size:11px;font-weight:900}h1{font-size:clamp(30px,5vw,50px);margin:4px 0}.muted{color:var(--muted)}.panel{background:var(--panel);border:1px solid var(--line);border-radius:22px;box-shadow:0 28px 90px rgba(0,0,0,.25);backdrop-filter:blur(18px)}.btn{border:0;border-radius:12px;padding:12px 16px;background:var(--gold);color:#091525;font-weight:900;cursor:pointer}.btn.alt{background:#1b3150;color:var(--text);border:1px solid var(--line)}.btn.danger{background:var(--red)}.status{display:inline-flex;padding:5px 10px;border-radius:99px;background:#203653;color:#c9d7ed;font-size:11px;font-weight:900;text-transform:uppercase}.status.published,.status.paid,.status.accepted{background:rgba(74,222,170,.14);color:#6ee7b7}.status.disputed{background:rgba(251,113,133,.14);color:#fda4af}.current{display:grid;grid-template-columns:1.1fr 1.9fr;overflow:hidden}.net-card{padding:30px;background:linear-gradient(150deg,rgba(244,200,97,.18),rgba(21,45,74,.5));border-right:1px solid var(--line)}.net-card strong{display:block;font-size:clamp(34px,5vw,54px);line-height:1.1;margin:10px 0}.details{padding:28px}.metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.metric{background:rgba(6,16,30,.48);border:1px solid var(--line);padding:14px;border-radius:14px}.metric span{display:block;color:var(--muted);font-size:11px;text-transform:uppercase}.metric b{font-size:18px}.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:20px}.history{margin-top:18px;overflow:hidden}.section-head{padding:20px 22px;border-bottom:1px solid var(--line)}.section-head h2{margin:0}.table-wrap{overflow:auto}table{width:100%;border-collapse:collapse;min-width:820px}th,td{padding:13px 16px;border-bottom:1px solid var(--line);text-align:left}th{color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:.08em}.empty{padding:70px 25px;text-align:center}.empty .icon{font-size:48px}.modal{position:fixed;inset:0;background:rgba(2,8,18,.84);z-index:50;display:none;place-items:center;padding:16px}.modal.open{display:grid}.modal-card{width:min(650px,100%);padding:24px;max-height:92vh;overflow:auto}.modal textarea{width:100%;min-height:140px;background:#081629;color:var(--text);border:1px solid var(--line);border-radius:12px;padding:12px}.slip{background:#fff;color:#172033;width:760px;padding:38px;font:13px/1.45 Arial,sans-serif}.slip-head{text-align:center;border-bottom:3px solid #16375d;padding-bottom:14px}.slip-head h1{font-size:24px;margin:4px}.slip-meta,.slip-person,.slip-approval{display:grid;grid-template-columns:repeat(2,1fr);gap:7px 28px;margin:15px 0}.slip h3{background:#16375d;color:#fff;padding:7px 9px;font-size:12px;letter-spacing:.08em}.slip table{min-width:0}.slip th,.slip td{padding:7px;border-bottom:1px solid #dce3eb}.slip th:last-child,.slip td:last-child{text-align:right}.slip .total{font-weight:bold;background:#edf3f9}.slip .net{font-size:18px;background:#e5f8ef;color:#086343}.slip-note{font-size:11px;color:#526172;margin-top:20px;border-top:1px solid #ccd6e1;padding-top:10px}@media(max-width:780px){.shell{padding:14px}.current{grid-template-columns:1fr}.net-card{border-right:0;border-bottom:1px solid var(--line)}.metrics{grid-template-columns:1fr 1fr}.hero .btn{display:none}}@media print{body>*{display:none!important}#printHost{display:block!important}.slip{width:auto}}
  </style>
</head>
<body><main class="shell"><header class="hero"><div><div class="eyebrow">SoMAp Worker Services</div><h1>Salary Center</h1><div class="muted" id="identity">Your private salary slips and payment acknowledgements</div></div><button class="btn alt" onclick="location.href='workersdashboard.html'">← Worker dashboard</button></header><section id="content"></section><section class="history panel"><div class="section-head"><h2>Salary history</h2><div class="muted">Only salary slips published to your registered worker account are shown.</div></div><div class="table-wrap"><table><thead><tr><th>Month</th><th>Gross pay</th><th>Deductions</th><th>Net pay</th><th>Payment</th><th>Acknowledgement</th><th>Action</th></tr></thead><tbody id="history"></tbody></table></div></section></main>
<div class="modal" id="modal"><div class="modal-card panel"><h2 id="modalTitle"></h2><div id="modalBody"></div><div class="actions" id="modalActions"></div></div></div><div id="printHost" style="position:fixed;left:-9999px;top:0"></div>
<script type="module">
  import { ensureAnonymousAuth, getLinkedWorkerId } from './modules/workers_helpers.js';
  const Core=window.SomapPayrollCore,db=firebase.database(),school=window.SOMAP?.getSchool?.(),$=id=>document.getElementById(id),schoolRef=p=>db.ref(SOMAP.P(p));let workerId='',year=String(window.somapYearContext?.getSelectedYear?.()||new Date().getFullYear()),profile={},slips={};const requestedMonth=Core.monthKey(new URLSearchParams(location.search).get('month'));
  if(!school?.id)location.href='../somapappv1multischool/multischool.html';const money=n=>`TSh ${Number(n||0).toLocaleString('en-US')}`,esc=v=>{const d=document.createElement('div');d.textContent=String(v??'');return d.innerHTML},fmt=v=>v?new Date(Number(v)).toLocaleString('en-TZ'):'—';
  ensureAnonymousAuth().then(load).catch(e=>showEmpty(e.message||'Unable to load salary slips.'));
  function normalizeSlip(s,k){if(s?.earnings)return s;const parts=Object.fromEntries((Array.isArray(s?.items)?s.items:[]).map(x=>[x.label,Number(x.amountTZS||0)]));const migrated={...s,monthKey:k,monthLabel:Core.monthLabel(k),staffName:profile.fullNameUpper||'',role:profile.role||'',earnings:{basicSalary:Number(s?.base||profile.baseSalary||0)},deductions:{paye:0,nssfEmployee:Number(parts.statutory||0),salaryAdvance:Number(parts.advances||0),loanDeduction:0,lateAbsenceDeduction:Number(parts.penalties||0),otherDeduction:0},employer:{nssfEmployer:0,wcfEmployer:0,otherEmployerCost:0},status:s?.status||'legacy',paymentStatus:s?.paymentStatus||'recorded',migratedFromLegacy:true};return{...migrated,...Core.calculate(migrated)}}
  async function load(){workerId=await getLinkedWorkerId();if(!workerId)throw new Error('Worker session not found. Please sign in again.');const years=[...new Set([year,String(Number(year)-1),requestedMonth?requestedMonth.slice(0,4):''].filter(Boolean))];const results=await Promise.all([schoolRef(`years/${year}/workers/${workerId}/profile`).once('value'),...years.map(y=>schoolRef(`years/${y}/workers_payslips/${workerId}`).once('value'))]);profile=results[0].val()||{};const raw=Object.assign({},...results.slice(1).map(s=>s.val()||{}));slips=Object.fromEntries(Object.entries(raw).map(([k,s])=>[k,normalizeSlip(s,k)]));$('identity').textContent=`${profile.fullNameUpper||'Registered worker'} · ${school.name||school.id}`;render()}
  function currentSlip(){const eligible=Object.entries(slips).filter(([,s])=>['paid','published','accepted','disputed'].includes(String(s.status||s.paymentStatus).toLowerCase()));if(requestedMonth){const requested=eligible.find(([k])=>k===requestedMonth);if(requested)return requested}return eligible.sort(([a],[b])=>b.localeCompare(a))[0]||null}
  function ack(s){return s.acknowledgement||s}
  function render(){const current=currentSlip();if(!current)showEmpty('No salary slip has been published for this month.');else{const [k,s]=current,a=ack(s),ast=a.disputed?'disputed':a.accepted?'accepted':a.downloaded?'downloaded':'pending';$('content').innerHTML=`<section class="current panel"><div class="net-card"><span class="status ${s.status}">${esc(s.paymentStatus||s.status)}</span><div class="muted" style="margin-top:24px">Net salary payable</div><strong>${money(s.netPay||s.net)}</strong><div>${esc(s.monthLabel||Core.monthLabel(k))}</div><div class="muted" style="margin-top:14px">Acknowledgement deadline: ${esc(s.ackDeadline||'4th of the following month')}</div></div><div class="details"><div class="eyebrow">Salary slip ${esc(s.slipId||'')}</div><h2 style="font-size:27px;margin:5px 0 18px">Review your payment record</h2><div class="metrics"><div class="metric"><span>Gross pay</span><b>${money(s.grossPay)}</b></div><div class="metric"><span>Total deductions</span><b>${money(s.totalDeductions)}</b></div><div class="metric"><span>Acknowledgement</span><b class="status ${ast}">${ast}</b></div></div>${a.disputed?`<p style="color:#fda4af"><strong>Dispute submitted:</strong> ${esc(a.disputeReason)}</p>`:''}<div class="actions"><button class="btn alt" data-view="${k}">Preview salary slip</button>${!a.accepted&&!a.disputed?`<button class="btn" data-accept="${k}">Accept & Download PDF</button><button class="btn danger" data-dispute="${k}">Raise dispute</button>`:`<button class="btn" data-download="${k}">Download PDF</button>`}</div></div></section>`;bindActions($('content'))}renderHistory()}
  function showEmpty(msg){$('content').innerHTML=`<section class="panel empty"><div class="icon">▤</div><h2>No salary slip available</h2><p class="muted">${esc(msg)}</p></section>`;renderHistory()}
  function renderHistory(){$('history').innerHTML=Object.entries(slips).sort(([a],[b])=>b.localeCompare(a)).map(([k,s])=>{const a=ack(s),st=a.disputed?'disputed':a.accepted?'accepted':a.downloaded?'downloaded':'pending';return `<tr><td><strong>${esc(s.monthLabel||Core.monthLabel(k))}</strong></td><td>${money(s.grossPay)}</td><td>${money(s.totalDeductions)}</td><td><strong>${money(s.netPay||s.net)}</strong></td><td><span class="status ${s.status}">${esc(s.paymentStatus||s.status)}</span></td><td><span class="status ${st}">${st}</span></td><td><button class="btn alt" data-view="${k}">View</button> <button class="btn alt" data-download="${k}">PDF</button></td></tr>`}).join('')||'<tr><td colspan="7" class="muted">No published salary history.</td></tr>';bindActions($('history'))}
  function bindActions(root){root.querySelectorAll('[data-view]').forEach(b=>b.onclick=()=>preview(b.dataset.view));root.querySelectorAll('[data-download]').forEach(b=>b.onclick=()=>download(b.dataset.download));root.querySelectorAll('[data-accept]').forEach(b=>b.onclick=()=>confirmAccept(b.dataset.accept));root.querySelectorAll('[data-dispute]').forEach(b=>b.onclick=()=>dispute(b.dataset.dispute))}
  function slipHtml(s,k){const c=Core.calculate(s),a=ack(s),rows=(obj,keys,labels)=>keys.map((x,i)=>`<tr><td>${labels[i]}</td><td>${money(obj[x])}</td></tr>`).join('');return `<section class="slip"><header class="slip-head"><div style="font-size:12px;text-transform:uppercase;letter-spacing:.13em">${esc(s.ownerName||'Generated for the registered employer')}</div><h1>${esc(s.schoolName||school.name||school.id)}</h1><strong>SALARY SLIP</strong></header><div class="slip-meta"><div><b>Payroll month:</b> ${esc(s.monthLabel||Core.monthLabel(k))}</div><div><b>Slip number:</b> ${esc(s.slipId||`PAY-${k}-${workerId}`)}</div><div><b>Generated:</b> ${fmt(s.publishedAt||s.generatedAt)}</div><div><b>Status:</b> ${esc(s.paymentStatus||s.status)}</div></div><h3>EMPLOYEE DETAILS</h3><div class="slip-person"><div><b>Name:</b> ${esc(s.staffName||profile.fullNameUpper)}</div><div><b>Worker ID:</b> ${esc(workerId)}</div><div><b>Role:</b> ${esc(s.role||profile.role)}</div><div><b>Department:</b> ${esc(s.department||profile.department||'—')}</div><div><b>NSSF:</b> ${esc(s.nssfNumber||profile.nssfNumber||'—')}</div><div><b>TIN:</b> ${esc(s.tin||profile.tin||'—')}</div><div><b>Payment:</b> ${esc(s.paymentMethod||profile.paymentMethod||'—')}</div><div><b>Account:</b> ${esc(Core.maskAccount(s.bankAccountNumber||s.mobileMoneyNumber))}</div></div><h3>EARNINGS</h3><table><tbody>${rows(c.earnings,Core.EARNING_KEYS,['Basic salary','Responsibility allowance','Transport allowance','Housing allowance','Overtime','Bonus','Arrears','Other earnings'])}<tr class="total"><td>GROSS PAY</td><td>${money(c.grossPay)}</td></tr></tbody></table><h3>DEDUCTIONS</h3><table><tbody>${rows(c.deductions,Core.DEDUCTION_KEYS,['PAYE','NSSF employee contribution','Salary advance','Loan deduction','Late / absence deduction','Other deduction'])}<tr class="total"><td>TOTAL DEDUCTIONS</td><td>${money(c.totalDeductions)}</td></tr><tr class="net"><td>NET SALARY PAYABLE</td><td>${money(c.netPay)}</td></tr></tbody></table><p><b>Amount in words:</b> ${esc(Core.numberToWords(c.netPay))}</p><h3>EMPLOYER CONTRIBUTIONS / SCHOOL COST</h3><table><tbody><tr><td>NSSF employer contribution</td><td>${money(c.employer.nssfEmployer)}</td></tr><tr><td>WCF employer contribution (not deducted from employee)</td><td>${money(c.employer.wcfEmployer)}</td></tr><tr class="total"><td>Total employer cost</td><td>${money(c.totalEmployerCost)}</td></tr></tbody></table><h3>PAYMENT & ACKNOWLEDGEMENT</h3><div class="slip-approval"><div><b>Payment reference:</b> ${esc(s.paymentReference||'—')}</div><div><b>Payment date:</b> ${fmt(s.paymentDate)}</div><div><b>Prepared by:</b> ${esc(s.preparedByName||'Payroll office')}</div><div><b>Approved by:</b> ${esc(s.approvedByName||'Administration')}</div><div><b>Acceptance:</b> ${a.accepted?'ACCEPTED':a.disputed?'DISPUTED':'PENDING'}</div><div><b>Accepted on:</b> ${fmt(a.acceptedAt)}</div></div>${a.acceptanceText?`<p><b>Worker acknowledgement:</b> ${esc(a.acceptanceText)}</p>`:''}${a.disputeReason?`<p><b>Dispute:</b> ${esc(a.disputeReason)}</p>`:''}<div class="slip-note">Generated by SoMAp. This record belongs to ${esc(s.schoolName||school.name||school.id)}, payroll year ${esc(year)}, month ${esc(s.monthLabel||Core.monthLabel(k))}. Keep payroll records according to the school’s legal retention policy.</div></section>`}
  function preview(k){const s=slips[k];$('modalTitle').textContent=`Salary slip · ${s.monthLabel||Core.monthLabel(k)}`;$('modalBody').innerHTML=`<div style="overflow:auto;max-height:70vh">${slipHtml(s,k)}</div>`;$('modalActions').innerHTML='<button class="btn alt" id="close">Close</button><button class="btn" id="pdf">Download PDF</button>';$('close').onclick=closeModal;$('pdf').onclick=()=>download(k);$('modal').classList.add('open')}
  function confirmAccept(k){const s=slips[k];$('modalTitle').textContent='Salary confirmation';$('modalBody').innerHTML=`<p>I confirm that I have reviewed this salary slip and received the net salary shown for <strong>${esc(s.monthLabel||Core.monthLabel(k))}</strong>. I understand that this acknowledgement will be recorded in SoMAp with date and time.</p><p><strong>Net salary: ${money(s.netPay||s.net)}</strong></p>`;$('modalActions').innerHTML='<button class="btn alt" id="cancel">Cancel</button><button class="btn" id="yes">Accept and download</button>';$('cancel').onclick=closeModal;$('yes').onclick=()=>accept(k);$('modal').classList.add('open')}
  async function accept(k){const text='I confirm that I have reviewed this salary slip and received the net salary shown for the stated month. I understand that this acknowledgement will be recorded in SoMAp with date and time.';const a={accepted:true,downloaded:true,acceptedAt:firebase.database.ServerValue.TIMESTAMP,downloadedAt:firebase.database.ServerValue.TIMESTAMP,acceptedByUid:firebase.auth().currentUser?.uid||'',acceptedByWorkerId:workerId,acceptedByName:profile.fullNameUpper||'',acceptanceText:text,disputed:false};await updateAck(k,a,'accepted');closeModal();await load();await download(k)}
  function dispute(k){$('modalTitle').textContent='Raise payroll dispute';$('modalBody').innerHTML='<p>I do not accept this salary slip as correct. I am submitting a payroll dispute for review by the administration.</p><textarea id="reason" placeholder="Explain the payment issue (at least 10 characters)"></textarea>';$('modalActions').innerHTML='<button class="btn alt" id="cancel">Cancel</button><button class="btn danger" id="send">Submit dispute</button>';$('cancel').onclick=closeModal;$('send').onclick=async()=>{const reason=$('reason').value.trim();if(reason.length<10)return alert('Please enter a dispute reason of at least 10 characters.');const a={disputed:true,disputedAt:firebase.database.ServerValue.TIMESTAMP,disputedByUid:firebase.auth().currentUser?.uid||'',disputedByWorkerId:workerId,disputedByName:profile.fullNameUpper||'',disputeReason:reason,accepted:false};await updateAck(k,a,'disputed');await schoolRef(`years/${k.slice(0,4)}/payroll_alerts`).push().set({type:'salary_dispute',workerId,workerName:profile.fullNameUpper||'',monthKey:k,reason,status:'open',createdAt:firebase.database.ServerValue.TIMESTAMP});closeModal();await load();alert('Your salary dispute has been submitted to the administration.')}}
  async function updateAck(k,a,status){const root=SOMAP.P(''),payrollYear=k.slice(0,4);const updates={};updates[`years/${payrollYear}/workers_payslips/${workerId}/${k}/acknowledgement`]=a;updates[`years/${payrollYear}/workers_payslips/${workerId}/${k}/status`]=status;updates[`years/${payrollYear}/workers_payroll/${k}/items/${workerId}/acknowledgement`]=a;await db.ref(root).update(updates)}
  async function download(k){const s=slips[k];if(!s)return;const host=$('printHost');host.innerHTML=slipHtml(s,k);await html2pdf().set({margin:8,filename:`${s.slipId||`PAY-${k}-${workerId}`}.pdf`,image:{type:'jpeg',quality:.98},html2canvas:{scale:2},jsPDF:{unit:'mm',format:'a4',orientation:'portrait'}}).from(host.firstElementChild).save();const a=ack(s);if(!a.downloaded){await updateAck(k,{...a,downloaded:true,downloadedAt:firebase.database.ServerValue.TIMESTAMP,downloadedByWorkerId:workerId},s.status);await load()}host.innerHTML=''}function closeModal(){$('modal').classList.remove('open')}
</script></body></html>
