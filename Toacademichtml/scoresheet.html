  <script>
    const SOMAP_DEFAULT_YEAR = 2025;
    const CLASS_ORDER = ['Baby Class','Middle Class','Pre-Unit','Class 1','Class 2','Class 3','Class 4','Class 5','Class 6','Class 7'];
    function normalizeClassNameForEnrollment(name) {
      const s = String(name || '').trim();
      if (!s) return 'Unknown';
      const low = s.toLowerCase();
      if (low.includes('baby')) return 'Baby Class';
      if (low.includes('middle')) return 'Middle Class';
      if (low.includes('pre') || low.includes('nursery') || low.includes('unit')) return 'Pre-Unit';
      const m = low.match(/class\s*(\d+)/) || low.match(/\b(\d+)\b/);
      if (m) return `Class ${parseInt(m[1], 10)}`;
      return s.replace(/\s+/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
    }
    function shiftClassForYear(baseClass, deltaYears) {
      const normalized = normalizeClassNameForEnrollment(baseClass);
      const idx = CLASS_ORDER.findIndex(c => c.toLowerCase() === normalized.toLowerCase());
      if (idx < 0) return normalized || 'Unknown';
      const next = idx + Number(deltaYears || 0);
      if (next < 0) return 'Pre-Admission';
      if (next >= CLASS_ORDER.length) return 'GRADUATED';
      return CLASS_ORDER[next];
    }
  </script>

  <script>
    /* ---------- CONFIG ---------- */
    const EXAM_KEYS = {
      'Monthly': 'monthly','Midterm 1':'midterm1','End Term':'endterm','Midterm 2':'midterm2','Annual':'annual'
    };
    const EXAM_REGISTRY_KEY = 'somap_custom_exam_registry_v1';
    function slugifyExamKey(label) {
      return String(label || '').toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '').replace(/-+/g, '-') || 'custom-exam';
    }
    function getStoredExamRegistry() {
      try {
        const parsed = JSON.parse(localStorage.getItem(EXAM_REGISTRY_KEY) || '[]');
        return Array.isArray(parsed) ? parsed : [];
      } catch (e) {
        return [];
      }
    }
    function getExamKeyFromLabel(label) {
      const direct = EXAM_KEYS[label];
      if (direct) return direct;
      const found = getStoredExamRegistry().find(item => item.label === label);
      return found?.key || slugifyExamKey(label);
    }

    const MONTH_KEYS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    const MONTH_LABELS = {
      '1':'Jan','01':'Jan',January:'Jan',
      '2':'Feb','02':'Feb',February:'Feb',
      '3':'Mar','03':'Mar',March:'Mar',
      '4':'Apr','04':'Apr',April:'Apr',
      '5':'May','05':'May',May:'May',
      '6':'Jun','06':'Jun',June:'Jun',
      '7':'Jul','07':'Jul',July:'Jul',
      '8':'Aug','08':'Aug',August:'Aug',
      '9':'Sep','09':'Sep',September:'Sep',
      '10':'Oct',October:'Oct',
      '11':'Nov',November:'Nov',
      '12':'Dec',December:'Dec'
    };

    function monthVariants(mon){
      const set = new Set();
      const raw = String(mon || '').trim();
      if (raw) set.add(raw);
      const stripped = raw.replace(/^0+/, '') || raw;
      if (stripped) set.add(stripped);
      const canonical = MONTH_LABELS[raw] || MONTH_LABELS[stripped];
      if (canonical){
        set.add(canonical);
        set.add(canonical.toLowerCase());
        set.add(canonical.toUpperCase());
        const idx = MONTH_KEYS.indexOf(canonical);
        if (idx >= 0) set.add(String(idx + 1).padStart(2,'0'));
        if (idx >= 0) set.add(String(idx + 1));
        const full = {
          Jan:'January', Feb:'February', Mar:'March', Apr:'April', May:'May', Jun:'June',
          Jul:'July', Aug:'August', Sep:'September', Oct:'October', Nov:'November', Dec:'December'
        }[canonical];
        if (full){
          set.add(full);
          set.add(full.toLowerCase());
          set.add(full.toUpperCase());
        }
      }
      return Array.from(set).filter(Boolean);
    }
    const ATTEND_PRESENT_CODES = new Set(['P','PRESENT','PR','1','TRUE','YES','Y']);
    const ATTEND_ABSENT_CODES = new Set(['A','ABSENT','0','FALSE','NO','N']);
    function canonicalMonthKey(mon){
      const raw = String(mon || '').trim();
      if (!raw) return null;
      const direct = MONTH_LABELS[raw] || MONTH_LABELS[raw.replace(/^0+/, '')];
      if (direct) return direct;
      const parts = raw.split(/[-_/]/);
      if (parts.length >= 2) {
        const tail = String(parts[parts.length - 1] || '').trim();
        return MONTH_LABELS[tail] || MONTH_LABELS[tail.replace(/^0+/, '')] || null;
      }
      return null;
    }
    function monthNumeric(mon){
      const key = canonicalMonthKey(mon);
      if (!key) return null;
      const idx = MONTH_KEYS.indexOf(key);
      return idx >= 0 ? String(idx + 1).padStart(2, '0') : null;
    }
    function normalizeAttendanceMap(val){
      const out = {};
      Object.keys(val || {}).forEach(adm => {
        const a = val[adm] || {};
        const present = Number(a.present || a.daysPresent || 0);
        const absent = Number(a.absent || a.daysAbsent || 0);
        const days = Number(a.days || (present + absent));
        out[adm] = { present, absent, days };
      });
      return out;
    }
    function interpretAttendanceEntry(entry){
      if (!entry) return null;
      const norm = (v) => {
        if (v === null || v === undefined) return null;
        const str = String(v).trim();
        return str ? str.toUpperCase() : null;
      };
      const daily = norm(entry.daily || entry.status || entry.attendance || entry.value);
      if (daily) {
        if (ATTEND_PRESENT_CODES.has(daily)) return { present: 1, absent: 0, days: 1 };
        if (ATTEND_ABSENT_CODES.has(daily)) return { present: 0, absent: 1, days: 1 };
      }
      const am = norm(entry.am);
      const pm = norm(entry.pm);
      if (am || pm) {
        const tokens = [am, pm].filter(Boolean);
        const presentCount = tokens.filter(t => ATTEND_PRESENT_CODES.has(t)).length;
        const absentCount = tokens.filter(t => ATTEND_ABSENT_CODES.has(t)).length;
        if (!presentCount && !absentCount) return null;
        if (presentCount >= absentCount) return { present: 1, absent: 0, days: 1 };
        return { present: 0, absent: 1, days: 1 };
      }
      const generic = norm(entry.present);
      if (generic) {
        if (ATTEND_PRESENT_CODES.has(generic)) return { present: 1, absent: 0, days: 1 };
        if (ATTEND_ABSENT_CODES.has(generic)) return { present: 0, absent: 1, days: 1 };
      }
      return null;
    }
    function aggregateClassFirstAttendance(val){
      const out = {};
      Object.keys(val || {}).forEach(dayKey => {
        const dayEntries = val[dayKey] || {};
        Object.keys(dayEntries || {}).forEach(ref => {
          const entry = dayEntries[ref] || {};
          const snap = entry.snap || entry.student || {};
          const adm = String(
            entry.adm ||
            entry.admissionNo ||
            entry.admNo ||
            snap.admissionNo ||
            snap.adm ||
            snap.admNo ||
            entry.studentId ||
            ''
          ).trim();
          if (!adm) return;
          const counts = interpretAttendanceEntry(entry);
          if (!counts) return;
          out[adm] = out[adm] || { present: 0, absent: 0, days: 0 };
          out[adm].present += counts.present || 0;
          out[adm].absent += counts.absent || 0;
          out[adm].days += counts.days || 0;
        });
      });
      return out;
    }

    const SomapSub = () => window.SomapSubjects || {};

    // Attempt/grade helpers (inline; do not import other files)
    function isNumber(n){ return Number.isFinite(n) && !Number.isNaN(n); }
    function attemptedItem(item){
      const rawScore = item?.score;
      const score = Number(rawScore);
      const max   = Number(item?.max);
      const missingScore = rawScore === '' || rawScore === null || rawScore === undefined || Number.isNaN(score);
      return !missingScore && isNumber(score) && isNumber(max) && max > 0 && score >= 0;

    function studentPercentFrom(subjects){
      let s = 0, m = 0, count = 0;
      for (const it of (subjects || [])){
        const score = Number(it?.score);
        const max   = Number(it?.max);
        if (attemptedItem({score,max})){
          s += score; m += max; count++;
        }
      }
      if (m <= 0 || count === 0) return { pct: 0, total: 0, max: 0, attemptedCount: 0 };
      return { pct: (s * 100) / m, total: s, max: m, attemptedCount: count };
    }
    // Unified grading
    function gradeFromPercent(p){
      const x = Math.max(0, Math.min(100, Number(p)||0));
      if (x >= 80.5) return 'A';
      if (x >= 60.5) return 'B';
      if (x >= 40.5) return 'C';
      if (x >= 20.5) return 'D';
      return 'F';

      Object.entries(raw).forEach(([adm, subjectMap]) => {
        if (!subjectMap || typeof subjectMap !== 'object' || Array.isArray(subjectMap)) return;
        const normalizedSubjects = {};
        Object.entries(subjectMap).forEach(([sub, value]) => {
          if (!value || typeof value !== 'object' || Array.isArray(value)) return;
          const hasScore = Object.prototype.hasOwnProperty.call(value, 'score') || Object.prototype.hasOwnProperty.call(value, 'Score');
          if (!hasScore) return;
          const labelFromDB = value.label || sub;
          const subjectKey = makeSubjectKey(labelFromDB);
          const score = Number(value.score ?? value.Score);
          const max = Number(value.max ?? value.Max ?? 100);
          if (!Number.isFinite(score) || !Number.isFinite(max) || max <= 0 || score < 0) return;
          const entry = { score, max };
          normalizedSubjects[subjectKey] = entry;
          if (labelFromDB !== subjectKey) normalizedSubjects[labelFromDB] = entry;
        });
        if (Object.keys(normalizedSubjects).length) out[adm] = normalizedSubjects;
      });

    function mergeScoresheetScoreMaps(records) {
      const merged = {};
      (records || []).forEach((record) => {
        Object.entries(record || {}).forEach(([adm, subjectMap]) => {
          merged[adm] = merged[adm] || {};
          Object.entries(subjectMap || {}).forEach(([subjectKey, value]) => {
            const previous = merged[adm][subjectKey] || { score: 0, max: 0 };
            const score = Number(value?.score || 0);
            const max = Number(value?.max || 0);
            if (!Number.isFinite(score) || !Number.isFinite(max) || max <= 0) return;
            merged[adm][subjectKey] = {

              max: previous.max + max

        });

    function appendSyntheticScoresFromRootScoresheet(root, months, collected, seen) {
      Object.entries(root || {}).forEach(([topKey, topVal]) => {
        if (!topVal || typeof topVal !== 'object' || Array.isArray(topVal)) return;
        const topMonth = canonicalMonthKey(topKey);
        if (topMonth) {
          if (!months.includes(topMonth)) return;
          const directMonthly = normalizeScoresheetScoreBucket(topVal);
          if (Object.keys(directMonthly).length) {
            const dedupe = `monthly::${topMonth}`;
            if (!seen.has(dedupe)) {
              seen.add(dedupe);
              collected.push(directMonthly);
            }
            return;
          }
          Object.entries(topVal).forEach(([nestedExamKey, nestedBucket]) => {
            if (!nestedBucket || typeof nestedBucket !== 'object' || Array.isArray(nestedBucket)) return;
            const normalizedExamKey = slugifyExamKey(nestedExamKey);
            if (SYNTHETIC_WINDOW_EXAM_KEYS.has(normalizedExamKey)) return;
            const examScores = normalizeScoresheetScoreBucket(nestedBucket);
            if (!Object.keys(examScores).length) return;
            const dedupe = `${normalizedExamKey}::${topMonth}`;
            if (seen.has(dedupe)) return;
            seen.add(dedupe);
            collected.push(examScores);
          });
          return;
        }
        const topExamKey = slugifyExamKey(topKey);
        if (SYNTHETIC_WINDOW_EXAM_KEYS.has(topExamKey)) return;
        Object.entries(topVal).forEach(([monthKey, monthBucket]) => {
          const resolvedMonth = canonicalMonthKey(monthKey);
          if (!resolvedMonth || !months.includes(resolvedMonth)) return;
          const examScores = normalizeScoresheetScoreBucket(monthBucket);
          if (!Object.keys(examScores).length) return;
          const dedupe = `${topExamKey}::${resolvedMonth}`;
          if (seen.has(dedupe)) return;
          seen.add(dedupe);
          collected.push(examScores);
        });
      });
    }

    function flattenEnrollmentsForLookup(raw) {
      if (!raw || typeof raw !== 'object') return {};
      const flat = {};
      function add(id, entry) {
        if (id && entry && typeof entry === 'object') flat[id] = Object.assign(flat[id] || {}, entry);
      }
      Object.entries(raw).forEach(([key, value]) => {
        if (!value || typeof value !== 'object') return;
        if (value.studentId || value.id || value.className || value.classLevel || value.class || value.grade) {
          add(value.id || value.studentId || key, value);
          return;
        }
        Object.entries(value).forEach(([stuId, stuVal]) => {
          const entry = (stuVal && typeof stuVal === 'object') ? { ...stuVal } : {};
          if (!entry.className && !entry.classLevel && !entry.class && !entry.grade) entry.className = key;
          add(entry.id || entry.studentId || stuId, entry);
        });
      });
      return flat;
    }
    function buildEnrollmentIndex(enrollments) {
      const flat = flattenEnrollmentsForLookup(enrollments);
      const byId = {};
      const byAdmission = {};
      Object.entries(flat).forEach(([key, value]) => {
        if (!value || typeof value !== 'object') return;
        const admission = value.admissionNumber || value.admissionNo || value.admNo || '';
        if (admission && !byAdmission[admission]) byAdmission[admission] = value;
        if (!byId[key]) byId[key] = value;
      });
      return { byId, byAdmission };
    }
    function lookupEnrollment(index, studentId, admissionNo) {
      if (!index) return {};
      if (studentId && index.byId?.[studentId]) return index.byId[studentId];
      if (admissionNo && index.byId?.[admissionNo]) return index.byId[admissionNo];
      if (admissionNo && index.byAdmission?.[admissionNo]) return index.byAdmission[admissionNo];
      return {};
    }
    const getEnrollmentClassFromRecord = (e) => (e && typeof e === 'object') ? (e.className || e.classLevel || e.class || e.grade || '') : '';
    const getStudentClassFromRecord = (s) => (s && typeof s === 'object') ? (s.className || s.classLevel || s.class || s.grade || s.gradeLevel || 'Unknown') : 'Unknown';
    function inferAdmissionYear(s) {
      const sources = [s?.createdTs, s?.admissionTs, s?.createdAt, s?.admissionDate, s?.admissionYear, s?.admYear];
      for (const v of sources) {
        if (v == null) continue;
        const y = typeof v === 'number' ? new Date(v).getFullYear() : (/^\d{4}$/.test(String(v).trim()) ? Number(v) : null);
        if (Number.isFinite(y)) return y;
      }

    function canonicalClassKey(str) {
      const api = window.SomapSubjects || {};
      const canonical = api.canonClass ? api.canonClass(str) : str;
      const norm = String(canonical || '').toUpperCase().replace(/[\s\-\._]/g, '');
      if (!norm) return '';
      return norm.replace(/(19|20)\d{2}$/, '').replace(/^(CLASS|GRADE|STD|STREAM)/gi, '');
    }
    function classMatches(target, actual) {
      if (!target || !actual) return false;
      const t = canonicalClassKey(target);
      const a = canonicalClassKey(actual);
      if (t && a && t === a) return true;
      const tLead = (t.match(/^\d+/) || [''])[0];
      const aLead = (a.match(/^\d+/) || [''])[0];
      if ((tLead === '1' || tLead === '2') && (aLead === '1' || aLead === '2')) return tLead === aLead;
      return false;
    }

    /** Load ALL students for year (no class filter) - same as classattendance */
    async function loadAllStudentsFromDb(yearOverride) {
      if (!getDB()) return [];
      const year = normalizeYearValue(yearOverride ?? state.year ?? new Date().getFullYear());
      const delta = Number(year) - SOMAP_DEFAULT_YEAR;
      const tryPaths = ['students', 'Students', 'StudentsList', 'Students_List'];

      const [anchorSnap, yearSnap] = await Promise.all([
        scopedOrSocratesLegacy(`enrollments/${SOMAP_DEFAULT_YEAR}`, `enrollments/${SOMAP_DEFAULT_YEAR}`).catch(() => null),
        scopedOrSocratesLegacy(`enrollments/${year}`, `enrollments/${year}`).catch(() => null)
      ]);
      const anchorIndex = buildEnrollmentIndex(anchorSnap?.exists?.() ? anchorSnap.val() : {});
      const yearIndex = buildEnrollmentIndex(yearSnap?.exists?.() ? yearSnap.val() : {});

      for (const p of tryPaths) {
        try {
          // Try both scoped and legacy paths (readFirstExisting tries multiple candidates)
          const found = await readFirstExisting([p]);
          const snap = found?.snap;
          if (!snap?.exists?.()) continue;
          const data = snap.val() || {};
          const roster = Object.keys(data).map((k) => {
            const s = data[k] || {};
            if (String(s.status || '').toLowerCase() === 'shifted') return null;
            const name = [s.firstName, s.middleName, s.lastName].filter(Boolean).join(' ').trim() || s.name || s.fullName || '';
            const admissionNo = s.admissionNumber || s.admNo || s.admissionNo || '';
            const anchorEnroll = lookupEnrollment(anchorIndex, k, admissionNo);
            const yearEnroll = lookupEnrollment(yearIndex, k, admissionNo);
            const yearClass = getEnrollmentClassFromRecord(yearEnroll);
            const anchorClass = getEnrollmentClassFromRecord(anchorEnroll);
            const studentClass = getStudentClassFromRecord(s);
            const baseClass = anchorClass || studentClass || 'Unknown';
            const hasAnchor = anchorEnroll && typeof anchorEnroll === 'object' && Object.keys(anchorEnroll).length > 0;
            const oldAdmission = Number.isFinite(inferAdmissionYear(s)) && inferAdmissionYear(s) <= SOMAP_DEFAULT_YEAR;
            const shouldShift = hasAnchor || oldAdmission;
            const lastTransfer = s.lastClassTransfer || s.meta?.lastClassTransfer;
            const transferYear = lastTransfer?.effectiveDate ? new Date(String(lastTransfer.effectiveDate) + 'T12:00:00').getFullYear() : null;
            const transferClass = lastTransfer?.toClass || '';

            let computedClass = yearClass;
            if (!computedClass && transferClass && Number(transferYear) === Number(year)) computedClass = transferClass;
            if (!computedClass) {
              computedClass = shouldShift ? shiftClassForYear(baseClass, delta) : baseClass;
            }
            const finalClass = normalizeClassNameForEnrollment(computedClass || 'Unknown');
            if (String(finalClass).trim().toUpperCase() === 'GRADUATED') return null;

            const feeDue = Number(s.totalFee || s.feePerYear || s.feeDue || 0);
            let feePaid = Number(s.feesPaid || s.feePaid || s.paidAmount || 0);
            if (s.payments && typeof s.payments === 'object') feePaid = Object.values(s.payments).reduce((sum, p) => sum + Number(p.amount || 0), 0);
            const balance = Number(s.balance || Math.max(0, feeDue - feePaid) || 0);

            return {
              id: k,
              adm: admissionNo || k,
              admissionNo,
              name,
              class: finalClass,
              stream: s.stream || s.streamName || s.section || '',
              feeDue,
              feePaid,
              balance,
              parentContact: s.parentContact || s.parentPhone || s.guardianPhone || '',
              meta: s
            };
          }).filter(Boolean);
          roster.sort((a, b) => (a.name || '').localeCompare(b.name || ''));
          return roster;
        } catch (e) { console.warn('[scoresheet] loadStudents path', p, e?.message); }
      }
      return [];
    }

        const found = await readFirstExisting([refPath]);

    async function fetchScores({ year, className, examKey, month }) {
      if (!getDB()) return {};

      // Tolerant class keys (Pre-Unit <-> Pre Unit Class, Class 1, etc.)
      const classCandidates = [];
      if (className) {
        const cls = String(className).trim();
        classCandidates.push(cls);
        if (cls.toLowerCase().includes('pre') && cls.toLowerCase().includes('unit')) {
          if (!classCandidates.includes('Pre Unit Class')) classCandidates.push('Pre Unit Class');
          if (!classCandidates.includes('Pre-Unit')) classCandidates.push('Pre-Unit');
        }
        const match = cls.match(/(\d+)/);
        if (match) {
          const num = match[1];
          const numericKey = num;
          const withPrefix = `Class ${num}`;
          if (!classCandidates.includes(numericKey)) classCandidates.push(numericKey);
          if (!classCandidates.includes(withPrefix)) classCandidates.push(withPrefix);
        }
      }

      const normalizedExamKey = String(examKey || '').toLowerCase();
      if (isSyntheticWindowExamKey(normalizedExamKey)) {
        const months = examMonthsForWindowScoresheet(normalizedExamKey, month);
        const collected = [];
        const seen = new Set();
        for (const clsKey of classCandidates) {
          const found = await readFirstExisting([`scores/${year}/${clsKey}`]);
          const snap = found?.snap || null;
          if (!(snap && snap.exists && snap.exists())) continue;
          appendSyntheticScoresFromRootScoresheet(snap.val() || {}, months, collected, seen);
        }
        return mergeScoresheetScoreMaps(collected);
      }

      const variants = monthVariants(month);
      const paths = [];

      classCandidates.forEach(clsKey => {
        const base = `scores/${year}/${clsKey}`;
        variants.forEach(v => {
          paths.push(`${base}/${examKey}/${v}`);
          paths.push(`${base}/${examKey.toLowerCase()}/${v}`);
          paths.push(`${base}/${examKey.toUpperCase()}/${v}`);
          paths.push(`${base}/${v}`); // Legacy support
        });
      });

      let snap = null;
      let usedPath = null;

      for (const refPath of paths) {
        try {
          const found = await readFirstExisting([refPath]);
          const candidateSnap = found?.snap || null;
          console.log('[scoresheet.fetchScores] trying', refPath, candidateSnap && candidateSnap.exists && candidateSnap.exists());
          if (candidateSnap && candidateSnap.exists && candidateSnap.exists()) {
            snap = candidateSnap;
            usedPath = refPath;
            break;
          }
        } catch (e) {
          console.warn('[scoresheet.fetchScores] error on', refPath, e);
        }
      }

      if (!snap) {
        console.warn(
          '[scoresheet.fetchScores] NO DATA for',
          { year, className, examKey, month, classCandidates, pathsTried: paths }
        );
        return {};
      }

      console.log('[scoresheet.fetchScores] USING', usedPath);

      const out = {};
      const val = snap.val() || {};

      Object.keys(val).forEach(adm => {
        out[adm] = {};
        const subjObj = val[adm] || {};
        Object.keys(subjObj).forEach(sub => {
          const o = subjObj[sub] || {};
          
          // Determine the canonical key
          const labelFromDB = o.label || sub;
          // Use makeSubjectKey to ensure consistency with saveAllScores
          const subjectKey = makeSubjectKey(labelFromDB);
          
          const entry = {
            score: Number(o.score || 0),
            max: Number(o.max || 100),
          };
          
          out[adm][subjectKey] = entry;
          
          // Also fallback to mapped label just in case
          if (labelFromDB !== subjectKey) {
             out[adm][labelFromDB] = entry;
          }
        });
      });

      return out;
    }

    async function loadCustomSubjectsForYear(year){
      const api = SomapSub();
      if (!api.setCustomSubjectsMap) return {};
      try {
        const found = await readFirstExisting([`subjectCatalog/${year}`]);
        let raw = found?.snap?.exists?.() ? (found.snap.val() || {}) : {};
        if (!Object.keys(raw || {}).length) {
          try {
            const legacySnap = await getDB()?.ref(`subjectCatalog/${year}`).get();
            if (legacySnap && legacySnap.exists && legacySnap.exists()) {
              raw = legacySnap.val() || {};
            }
          } catch (_) {}
        }
        const map = {};
        const addLabels = (className, labels) => {
          const cls = String(className || '').trim();
          if (!cls) return;
          const list = Array.isArray(labels) ? labels : [];
          if (!list.length) return;
          if (!map[cls]) map[cls] = [];
          map[cls].push(...list.filter(Boolean).map((v) => String(v).trim()).filter(Boolean));
        };
        Object.entries(raw || {}).forEach(([className, bucket]) => {
          const labels = [];
          if (Array.isArray(bucket)) {
            bucket.forEach((entry) => {
              const label = typeof entry === 'string' ? entry : (entry?.label || entry?.name || '');
              if (label) labels.push(label);
            });
          } else if (bucket && typeof bucket === 'object') {
            Object.values(bucket).forEach((entry) => {
              const label = typeof entry === 'string' ? entry : (entry?.label || entry?.name || '');
              if (label) labels.push(label);
            });
          }
          addLabels(className, labels);
        });
        const teacherCfgFound = await readFirstExisting([`years/${year}/teachers_config`, `teachers_config/${year}`]);
        let teacherCfg = teacherCfgFound?.snap?.exists?.() ? (teacherCfgFound.snap.val() || {}) : {};
        if (!Object.keys(teacherCfg || {}).length) {
          try {
            const legacyCfgSnap = await getDB()?.ref(`years/${year}/teachers_config`).get();
            if (legacyCfgSnap && legacyCfgSnap.exists && legacyCfgSnap.exists()) {
              teacherCfg = legacyCfgSnap.val() || {};
            }
          } catch (_) {}
        }
        Object.values(teacherCfg || {}).forEach((cfg) => {
          const mappings = Array.isArray(cfg?.classSubjectMappings) ? cfg.classSubjectMappings : [];
          mappings.forEach((mapping) => {
            const className =
              mapping?.class ||
              mapping?.className ||
              mapping?.classLevel ||
              mapping?.grade ||
              '';
            const labels = Array.isArray(mapping?.subjects) ? mapping.subjects : [];
            addLabels(className, labels);
          });
        });
        api.setCustomSubjectsMap(map, { year, replace: true });
        return map;
      } catch (err) {
        console.warn('[scoresheet] loadCustomSubjectsForYear failed', err?.message || err);
        return {};
      }
    }

    function escapeHtml(s){ return String(s||'').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
    function money(n){ n = Number(n||0); return new Intl.NumberFormat('en-KE',{style:'currency',currency:'KES',maximumFractionDigits:0}).format(n); }

    /* ---------- Computation: totals/averages/positions/grades ---------- */
    function pairsFromInputs(subjectCells){
      return Object.values(subjectCells || {}).map(c => ({
        score: Number(c.scoreInput.value),
        max: Number(c.maxInput.value)
      }));
    }

    function recomputeAll(){
      const perSubject = {};
      // Clear existing overall positions until recomputed
      Object.values(state.rowsByAdm).forEach(r => r.tdPstn.textContent = '-');

      Object.keys(state.rowsByAdm).forEach(adm=>{
        const row = state.rowsByAdm[adm];
        const subjects = state.subjectList.map(subject=>{
          const cell = row.subjectCells[subject.key];
          const score = Number(cell.scoreInput.value);
          const max = Number(cell.maxInput.value);
          cell.pstnSpan.textContent = '-';
          const attempted = attemptedItem({ score, max });
          if (attempted){
            const pct = (score * 100) / max;
            perSubject[subject.key] = perSubject[subject.key] || [];
            perSubject[subject.key].push({ adm, pct });
          }
          return { score, max, key: subject.key };
        });

        const sum = studentPercentFrom(subjects);
        const overallGrade = gradeFromPercent(sum.pct);
        row.tdTotal.textContent = sum.total.toFixed(2);
        row.tdMax.textContent = sum.max ? Math.round(sum.max) : '0';
        row.tdAvg.textContent = sum.pct.toFixed(2);
        row.tdGrade.textContent = overallGrade;
        row._avgPct = sum.pct;
        row._sumScore = sum.total;
        row._attemptCount = sum.attemptedCount;

        // Auto-update teacher comment based on grade
        const comment = getTeacherComment(overallGrade, row.meta.name);
        row.tdComment.querySelector('textarea').value = comment;
      });

      // Subject positions (attempted items only)
      state.subjectList.forEach(subject=>{
        const list = (perSubject[subject.key] || []).slice().sort((a,b)=> b.pct - a.pct);
        let pos=0, last=null, idx=0;
        list.forEach(item=>{
          idx++;
          if(last === null || item.pct < last){ pos = idx; last = item.pct; }
          const row = state.rowsByAdm[item.adm];
          if(row?.subjectCells?.[subject.key]){
            row.subjectCells[subject.key].pstnSpan.textContent = String(pos);
          }
        });
      });

      // Overall position (avg desc, then total desc, then attendance desc) for attempted students only
      const ranked = Object.keys(state.rowsByAdm).map(adm=>{
        const r = state.rowsByAdm[adm];
        return { adm, avg: r._avgPct || 0, total: r._sumScore || 0, attendance: Number(r.tdPresent.textContent || 0), attempts: r._attemptCount || 0 };
      }).filter(r => r.attempts > 0);
      ranked.sort((a,b)=>{
        if(b.avg !== a.avg) return b.avg - a.avg;
        if(b.total !== a.total) return b.total - a.total;
        return b.attendance - a.attendance;
      });
      ranked.forEach((r,i)=> state.rowsByAdm[r.adm].tdPstn.textContent = String(i+1));
    }

        const score = Number(cell.scoreInput.value);
        const max = Number(cell.maxInput.value);
        if (!attemptedItem({ score, max })) return;
        sum += (score * 100) / max;
        count++;
      });
      return count ? sum / count : 0;
    }

    function buildStudentPdfSubjectRows(row){
      return state.subjectList.map(subject => {
        const cell = row.subjectCells[subject.key];
        const score = Number(cell?.scoreInput?.value);
        const max = Number(cell?.maxInput?.value);
        const attempted = attemptedItem({ score, max });
        const pct = attempted ? ((score * 100) / max) : null;
        const grade = attempted ? gradeFromPercent(pct) : '-';
        const subjectAvg = currentSubjectAveragePct(subject.key);
        return [
          subject.label,
          attempted ? score.toFixed(1) : '-',
          attempted ? String(Math.round(max)) : '-',
          attempted ? `${pct.toFixed(1)}%` : '-',
          grade,
          subjectAvg ? `${subjectAvg.toFixed(1)}%` : '-',
          cell?.pstnSpan?.textContent || '-'
        ];
      });
    }

    async function loadPdfImageAsDataUrl(url){
      if (!url) return null;
      return new Promise((resolve) => {
        const img = new Image();
        img.crossOrigin = 'anonymous';
        img.onload = () => {
          try {
            const canvas = document.createElement('canvas');
            canvas.width = img.naturalWidth || img.width;
            canvas.height = img.naturalHeight || img.height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0);
            resolve(canvas.toDataURL('image/png'));
          } catch (_) {
            resolve(null);
          }
        };
        img.onerror = () => resolve(null);
        img.src = url;
      });
    }

    /* ---------- Persist summary (kept) ---------- */
    async function persistComputedSummary(){
      const db = getDB();
      if(!db) return;
      const summary = {
        updatedAt: Date.now(),
        className: state.className,
        stream: state.stream,
        year: state.year,
        month: state.month,
        examKey: state.examKey,
        subjectList: state.subjectList.map(s => s.label),
        subjectKeys: state.subjectList.map(s => s.key)
      };
      summary.subjectAverages = {};
      state.subjectList.forEach(sub=>{
        let sum=0, cnt=0;
        Object.keys(state.rowsByAdm).forEach(adm=>{
          const row = state.rowsByAdm[adm];
          const c = row.subjectCells[sub.key];
          const sc = Number(c.scoreInput.value);
          const mx = Number(c.maxInput.value);
          if(!attemptedItem({ score: sc, max: mx })) return;
          sum += (sc * 100) / mx;
          cnt++;
        });
        summary.subjectAverages[sub.key] = cnt ? sum/cnt : 0;
      });
      const graded = Object.values(state.rowsByAdm).filter(r => (r._attemptCount || 0) > 0);
      const classAvg = graded.length ? graded.reduce((sum, r) => sum + (r._avgPct || 0), 0) / graded.length : 0;
      summary.classAveragePct = classAvg;
      summary.classGrade = gradeFromPercent(classAvg);
      const list = graded.map(r=>({ name: r.meta.name, adm: r.meta.adm, avg: r._avgPct || 0 })).sort((a,b)=> b.avg - a.avg);
      summary.top3 = list.slice(0,3); summary.bottom3 = list.slice(-3);
      let sumP=0,sumA=0,sumD=0, feeReq=0,feePaid=0,feeBal=0;
      Object.keys(state.rowsByAdm).forEach(adm=>{
        const r = state.rowsByAdm[adm];
        sumP += Number(r.tdPresent.textContent||0); sumA += Number(r.tdAbsent.textContent||0); sumD += (Number(r.tdPresent.textContent||0)+Number(r.tdAbsent.textContent||0));
        const f = state.fees[adm] || { required: r.meta.feeDue || 0, paid: r.meta.feePaid || 0, balance: r.meta.balance || 0 };
        feeReq += f.required||0; feePaid += f.paid||0; feeBal += f.balance||0;
      });
      summary.attendance = { present: sumP, absent: sumA, days: sumD };
      summary.fees = { required: feeReq, paid: feePaid, balance: feeBal };
      const summaryPath = `summaries/${state.year}/${state.className}/${state.examKey}/${state.month}`;
      await db.ref(scopedPath(summaryPath)).set(summary);
      if (isSocrates) {
        await db.ref(summaryPath).set(summary);
      }
    }

          const parsed = JSON.parse(cached);
          const match = parsed.className && parsed.year && 
            (canonicalClassKey(parsed.className) === canonicalClassKey(state.className)) &&
            String(parsed.year) === String(state.year);
          if (match && Array.isArray(parsed.students) && parsed.students.length > 0) {

        console.log('Fetching students...');
        state.students = await fetchStudents(state.className, state.stream, state.year);
        console.log('Students fetched:', state.students.length);
      }
      
      if(state.students.length === 0) {
        console.warn('No students found! Trying alternative class name variations...');
        
        // Try alternative class name variations (classMatches handles Pre-Unit/Pre Unit Class)
        const alternatives = [];
        if(state.className.includes('Class')) {
          alternatives.push(state.className.replace('Class', '').trim());
        }
        if(state.className.includes(' ')) {
          alternatives.push(state.className.replace(/\s+/g, ''));
        }
        if(!state.className.includes('Class') && !state.className.includes(' ')) {
          alternatives.push(state.className + ' Class');
        }
        console.log('Trying alternatives:', alternatives);
        
        for(const alt of alternatives) {
          console.log('Trying alternative class name:', alt);
          const altStudents = await fetchStudents(alt, state.stream, state.year);
          if(altStudents.length > 0) {
            console.log('Found students with alternative class name:', alt, 'Count:', altStudents.length);
            state.students = altStudents;
            state.className = alt; // Update the class name to match
            break;
          }
        }
        
        if(state.students.length === 0) {

          const allClasses = Object.keys(SomapSub().SUBJECTS_BY_CLASS || {});

      <label style="display:block;color:#cbd5e1;font-size:0.8rem;margin-bottom:4px;">New name</label>
      <input id="renameSubjectTo" type="text" placeholder="e.g. French" style="width:100%;padding:8px 10px;background:#0f172a;border:1px solid #475569;border-radius:8px;color:#f1f5f9;font-size:0.875rem;margin-bottom:1.2rem;box-sizing:border-box;">

      <div id="renameSubjectStatus" style="font-size:0.78rem;color:#94a3b8;margin-bottom:0.8rem;min-height:18px;"></div>

      <div style="display:flex;gap:8px;justify-content:flex-end;">
        <button id="btnCancelRename" style="padding:8px 18px;background:#334155;color:#cbd5e1;border:none;border-radius:8px;cursor:pointer;font-size:0.85rem;">Cancel</button>
        <button id="btnConfirmRename" style="padding:8px 18px;background:#9333ea;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:0.85rem;font-weight:600;"><i class="fas fa-check"></i> Rename</button>
      </div>
    </div>
  </div>

  <script>
  (function(){
    const modal        = document.getElementById('renameSubjectModal');
    const selectFrom   = document.getElementById('renameSubjectFrom');
    const inputTo      = document.getElementById('renameSubjectTo');
    const statusEl     = document.getElementById('renameSubjectStatus');
    const classLabel   = document.getElementById('renameSubjectClassLabel');
    const btnOpen      = document.getElementById('btnRenameSubject');
    const btnClose     = document.getElementById('btnCloseRenameModal');
    const btnCancel    = document.getElementById('btnCancelRename');
    const btnConfirm   = document.getElementById('btnConfirmRename');

    function setStatus(msg, color){ statusEl.textContent = msg; statusEl.style.color = color || '#94a3b8'; }

    function openModal(){
      if (!state.className || !state.year){ alert('Select class and year first.'); return; }
      // populate subject dropdown
      selectFrom.innerHTML = '<option value="">— select subject —</option>';
      (state.subjectList || []).forEach(s => {
        const opt = document.createElement('option');
        opt.value = s.key;
        opt.textContent = s.label;
        selectFrom.appendChild(opt);
      });
      inputTo.value = '';
      setStatus('');
      classLabel.textContent = `${state.className} • ${state.year}`;
      modal.style.display = 'flex';
      inputTo.focus && inputTo.focus();
    }
    function closeModal(){ modal.style.display = 'none'; }

    btnOpen   && btnOpen.addEventListener('click', openModal);
    btnClose  && btnClose.addEventListener('click', closeModal);
    btnCancel && btnCancel.addEventListener('click', closeModal);
    modal.addEventListener('click', e => { if (e.target === modal) closeModal(); });

    // When "from" changes, pre-fill the "to" input with current name
    selectFrom.addEventListener('change', () => {
      const sel = selectFrom.options[selectFrom.selectedIndex];
      if (sel && sel.value) inputTo.value = sel.textContent;
      inputTo.select && inputTo.select();
    });

    btnConfirm && btnConfirm.addEventListener('click', async () => {
      const oldKey   = selectFrom.value;
      const oldLabel = selectFrom.options[selectFrom.selectedIndex]?.textContent || oldKey;
      const newRaw   = String(inputTo.value || '').trim();
      if (!oldKey)  { setStatus('Please select a subject to rename.', '#f87171'); return; }
      if (!newRaw)  { setStatus('Please enter a new name.', '#f87171'); return; }

      const api = SomapSub();
      const canonical = api.canonSubject ? api.canonSubject(newRaw) : newRaw;
      const newKey = makeSubjectKey(canonical);
      if (!newKey)  { setStatus('Invalid new name.', '#f87171'); return; }
      if (newKey === oldKey) { setStatus('New name is the same as the current name.', '#f87171'); return; }
      const alreadyExists = (state.subjectList || []).some(s => s.key === newKey);
      if (alreadyExists) { setStatus(`"${canonical}" already exists in ${state.className}.`, '#f87171'); return; }

      setStatus('Renaming… please wait.', '#fbbf24');
      btnConfirm.disabled = true;

      try {
        await renameSubjectEverywhere(state.year, state.className, oldKey, oldLabel, newKey, canonical);
        // update in-memory subject list
        if (api.renameCustomSubject) {
          api.renameCustomSubject(state.className, oldLabel, canonical, state.year);
        } else {
          // fallback: reload
          await loadCustomSubjectsForYear(state.year);
        }
        state.subjectList = getSubjectsForClassAndYear(state.className, state.year);
        // re-key any in-memory scores
        Object.values(state.scores || {}).forEach(stuScores => {
          if (stuScores && stuScores[oldKey] !== undefined) {
            stuScores[newKey] = { ...(stuScores[oldKey] || {}), label: canonical };
            delete stuScores[oldKey];
          }
        });
        buildTable();
        recomputeAll();
        if (typeof lblStatus !== 'undefined' && lblStatus) lblStatus.textContent = `Renamed "${oldLabel}" → "${canonical}"`;
        setStatus(`Done! "${oldLabel}" has been renamed to "${canonical}" everywhere.`, '#4ade80');
        setTimeout(closeModal, 1800);
      } catch(err) {
        setStatus('Error: ' + (err?.message || err), '#f87171');
      } finally {
        btnConfirm.disabled = false;
      }
    });

    /* -------------------------------------------------------
       Core rename function — updates Firebase in 3 places:
       1. subjectCatalog  (subject metadata)
       2. scores          (all stored marks)
       3. teachers_config (teacher subject assignments)
    ------------------------------------------------------- */
    async function renameSubjectEverywhere(year, className, oldKey, oldLabel, newKey, newLabel) {
      const db = getDB();
      if (!db) throw new Error('Firebase not initialized');
      const classKey = api_canonClass(className);
      if (!classKey) throw new Error('Invalid class name');

      const updates = {};  // multi-path atomic update

      // ── 1. subjectCatalog ──────────────────────────────────
      const catalogBase = `subjectCatalog/${year}/${classKey}`;
      const newPayload = { label: newLabel, key: newKey, className: classKey, year: Number(year), updatedAt: firebase.database.ServerValue.TIMESTAMP };
      updates[scopedPath(`${catalogBase}/${newKey}`)] = newPayload;
      updates[scopedPath(`${catalogBase}/${oldKey}`)] = null;
      if (isSocrates) {
        updates[`${catalogBase}/${newKey}`] = newPayload;
        updates[`${catalogBase}/${oldKey}`] = null;
      }

      // ── 2. scores — scan all exam types & months ───────────
      const scoresBasePath = `scores/${year}/${classKey}`;
      const scoresSnap = await (async () => {
        try {
          const found = await readFirstExisting([scoresBasePath]);
          return found?.snap?.exists?.() ? found.snap : null;
        } catch(_){ return null; }
      })();
      if (scoresSnap) {
        const scoresRaw = scoresSnap.val() || {};
        // structure: { examKey: { month: { admNum: { subjectKey: { score, max, label } } } } }
        Object.entries(scoresRaw).forEach(([examK, monthsObj]) => {
          if (!monthsObj || typeof monthsObj !== 'object') return;
          Object.entries(monthsObj).forEach(([monthK, studentsObj]) => {
            if (!studentsObj || typeof studentsObj !== 'object') return;
            Object.entries(studentsObj).forEach(([adm, subjectsObj]) => {
              if (!subjectsObj || typeof subjectsObj !== 'object') return;
              if (subjectsObj[oldKey] === undefined) return;
              const scoreData = { ...(subjectsObj[oldKey] || {}), label: newLabel };
              const base = `${scoresBasePath}/${examK}/${monthK}/${adm}`;
              updates[scopedPath(`${base}/${newKey}`)] = scoreData;
              updates[scopedPath(`${base}/${oldKey}`)] = null;
              if (isSocrates) {
                updates[`${base}/${newKey}`] = scoreData;
                updates[`${base}/${oldKey}`] = null;
              }
            });
          });
        });
      }

      // ── 3. teachers_config — update classSubjectMappings ───
      const cfgPaths = [`years/${year}/teachers_config`, `teachers_config/${year}`];
      for (const cfgPath of cfgPaths) {
        try {
          const found = await readFirstExisting([cfgPath]);
          if (!found?.snap?.exists?.()) continue;
          const cfgRaw = found.snap.val() || {};
          Object.entries(cfgRaw).forEach(([teacherId, cfg]) => {
            const mappings = Array.isArray(cfg?.classSubjectMappings) ? cfg.classSubjectMappings : [];
            let changed = false;
            const updatedMappings = mappings.map(mapping => {
              const mappingClass = api_canonClass(mapping?.class || mapping?.className || mapping?.classLevel || mapping?.grade || '');
              if (mappingClass !== classKey) return mapping;
              const subs = Array.isArray(mapping.subjects) ? mapping.subjects : [];
              if (!subs.includes(oldLabel) && !subs.includes(oldKey)) return mapping;
              changed = true;
              const updatedSubs = subs.map(s => (s === oldLabel || s === oldKey) ? newLabel : s);
              // also handle stream subjects
              const streams = Array.isArray(mapping.streams) ? mapping.streams.map(stream => {
                const ss = Array.isArray(stream.subjects) ? stream.subjects : [];
                if (!ss.includes(oldLabel) && !ss.includes(oldKey)) return stream;
                return { ...stream, subjects: ss.map(s => (s === oldLabel || s === oldKey) ? newLabel : s) };
              }) : mapping.streams;
              return { ...mapping, subjects: updatedSubs, ...(streams ? { streams } : {}) };
            });
            if (changed) {
              updates[scopedPath(`${cfgPath}/${teacherId}/classSubjectMappings`)] = updatedMappings;
              if (isSocrates) updates[`${cfgPath}/${teacherId}/classSubjectMappings`] = updatedMappings;
            }
          });
        } catch(_){}
      }

      // ── Apply all updates atomically ───────────────────────
      await db.ref('/').update(updates);
    }

    function api_canonClass(className) {
      const api = SomapSub();
      return api.canonClass ? api.canonClass(className) : String(className || '').trim();
    }
  })();
  </script>
</body>
</html>
