  <script>
    const SOMAP_DEFAULT_YEAR = 2025;
    const CLASS_ORDER = ['Baby Class','Middle Class','Pre-Unit','Class 1','Class 2','Class 3','Class 4','Class 5','Class 6','Class 7'];
    function normalizeClassNameForEnrollment(name) {
      const s = String(name || '').trim();
      if (!s) return 'Unknown';
      const low = s.toLowerCase();
      if (low.includes('baby')) return 'Baby Class';
      if (low.includes('middle')) return 'Middle Class';
      if (low.includes('pre') || low.includes('nursery') || low.includes('unit')) return 'Pre-Unit';
      const m = low.match(/class\s*(\d+)/) || low.match(/\b(\d+)\b/);
      if (m) return `Class ${parseInt(m[1], 10)}`;
      return s.replace(/\s+/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
    }
    function shiftClassForYear(baseClass, deltaYears) {
      const normalized = normalizeClassNameForEnrollment(baseClass);
      const idx = CLASS_ORDER.findIndex(c => c.toLowerCase() === normalized.toLowerCase());
      if (idx < 0) return normalized || 'Unknown';
      const next = idx + Number(deltaYears || 0);
      if (next < 0) return 'Pre-Admission';
      if (next >= CLASS_ORDER.length) return 'GRADUATED';
      return CLASS_ORDER[next];
    }
  </script>

  <script>
    /* ---------- CONFIG ---------- */
    const SomapSub = () => window.SomapSubjects || {};
    const SomapExam = () => window.SomapExamUtils || {};

    // Attempt/grade helpers (inline; do not import other files)
    function isNumber(n){ return Number.isFinite(n) && !Number.isNaN(n); }
    function attemptedItem(item){
      const rawScore = item?.score;
      const score = Number(rawScore);
      const max   = Number(item?.max);
      const missingScore = rawScore === '' || rawScore === null || rawScore === undefined || Number.isNaN(score);
      return !missingScore && isNumber(score) && isNumber(max) && max > 0 && score >= 0;
    }
    function studentPercentFrom(subjects){
      let s = 0, m = 0, count = 0;
      for (const it of (subjects || [])){
        const score = Number(it?.score);
        const max   = Number(it?.max);
        if (attemptedItem({score,max})){
          s += score; m += max; count++;
        }
      }
      if (m <= 0 || count === 0) return { pct: 0, total: 0, max: 0, attemptedCount: 0 };
      return { pct: (s * 100) / m, total: s, max: m, attemptedCount: count };
    }
    // Unified grading
    function gradeFromPercent(p){
      const x = Math.max(0, Math.min(100, Number(p)||0));
      if (x >= 80.5) return 'A';
      if (x >= 60.5) return 'B';
      if (x >= 40.5) return 'C';
      if (x >= 20.5) return 'D';
      return 'F';
    }

    function getSubjectConfigsForClass(className){
      const list = SomapSub().getSubjectsForClass ? SomapSub().getSubjectsForClass(className, state.year) : [];
      return (Array.isArray(list) ? list : []).map(sub=>{
        const label = SomapSub().canonSubject ? SomapSub().canonSubject(sub) : sub;
        return { key: makeSubjectKey(label), label };
      });
    }

    const EXAM_KEYS = {
      'Monthly': 'monthly',
      'Midterm 1': 'midterm1',
      'Term 1': 'endterm',
      'End Term': 'endterm',
      'Midterm 2': 'midterm2',
      'Annual': 'annual'
    };
    const EXAM_REGISTRY_KEY = 'somap_custom_exam_registry_v1';
    const EXAM_REGISTRY_PATH = 'academic/customExamRegistry';
    let customExamRegistryCache = [];
    const MONTH_KEYS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    const MONTH_LABELS = {
      '1':'Jan','01':'Jan',January:'Jan',
      '2':'Feb','02':'Feb',February:'Feb',
      '3':'Mar','03':'Mar',March:'Mar',
      '4':'Apr','04':'Apr',April:'Apr',
      '5':'May','05':'May',May:'May',
      '6':'Jun','06':'Jun',June:'Jun',
      '7':'Jul','07':'Jul',July:'Jul',
      '8':'Aug','08':'Aug',August:'Aug',
      '9':'Sep','09':'Sep',September:'Sep',
      '10':'Oct',October:'Oct',
      '11':'Nov',November:'Nov',
      '12':'Dec',December:'Dec'
    };
    const FULL_MONTH_NAMES = {
      Jan: 'January', Feb: 'February', Mar: 'March', Apr: 'April', May: 'May', Jun: 'June',
      Jul: 'July', Aug: 'August', Sep: 'September', Oct: 'October', Nov: 'November', Dec: 'December'
    };
    const ATTEND_PRESENT_CODES = new Set(['P','PRESENT','PR','1','TRUE','YES','Y']);
    const ATTEND_ABSENT_CODES = new Set(['A','ABSENT','0','FALSE','NO','N']);

    function makeSubjectKey(label){
      const canonical = SomapSub().canonSubject ? SomapSub().canonSubject(label) : label;
      return String(canonical || '').trim().replace(/[.#$/\[\]]/g, '_');
    }
    function normalizeExamLabel(label) {
      return String(label || '').replace(/\s*\(custom\)\s*$/i, '').trim().replace(/\s+/g, ' ');
    }
    function slugifyExamKey(label) {
      return normalizeExamLabel(label).toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '').replace(/-+/g, '-') || 'custom-exam';
    }
    function normalizeExamRegistryItems(items) {
      const seen = new Set();
      return (Array.isArray(items) ? items : [])
        .map(item => {
          const label = normalizeExamLabel(item?.label);
          const key = String(item?.key || '').trim() || slugifyExamKey(label);
          if (!label) return null;
          return { label, key };
        })
        .filter(Boolean)
        .filter(item => {
          const dedupe = `${item.label}::${item.key}`.toLowerCase();
          if (seen.has(dedupe)) return false;
          seen.add(dedupe);
          return true;
        });
    }
    function readLocalExamRegistry() {
      try {
        const parsed = JSON.parse(localStorage.getItem(EXAM_REGISTRY_KEY) || '[]');
        return normalizeExamRegistryItems(Array.isArray(parsed) ? parsed : []);
      } catch (_) {
        return [];
      }
    }
    function writeLocalExamRegistry(items) {
      try { localStorage.setItem(EXAM_REGISTRY_KEY, JSON.stringify(items || [])); } catch (_) {}
    }
    function getStoredExamRegistry() {
      return customExamRegistryCache.slice();
    }
    function examLabelFromKey(rawKey) {
      const key = String(rawKey || '').trim();
      if (!key) return '';
      const builtIn = Object.entries(EXAM_KEYS).find(([, value]) => String(value).toLowerCase() === key.toLowerCase());
      if (builtIn) return builtIn[0];
      const custom = getStoredExamRegistry().find(item => String(item?.key || '').toLowerCase() === key.toLowerCase());
      if (custom?.label) return custom.label;
      return key
        .replace(/[_-]+/g, ' ')
        .replace(/\s+/g, ' ')
        .trim()
        .replace(/\b\w/g, m => m.toUpperCase());
    }
    function getExamKeyFromLabel(label) {
      const cleanLabel = normalizeExamLabel(label);
      const direct = EXAM_KEYS[cleanLabel];
      if (direct) return direct;
      const found = getStoredExamRegistry().find(item => normalizeExamLabel(item?.label).toLowerCase() === cleanLabel.toLowerCase());
      return found?.key || slugifyExamKey(cleanLabel);
    }
    function isComputedWindowExamLabel(label) {
      const key = String(getExamKeyFromLabel(label) || '').toLowerCase();
      return ['midterm1', 'endterm', 'midterm2', 'annual'].includes(key);
    }
    function isMonthLikeToken(token) {
      const t = String(token || '').trim();
      if (!t) return true;
      const lower = t.toLowerCase();
      if (MONTH_KEYS.some(m => m.toLowerCase() === lower)) return true;
      if (Object.keys(MONTH_LABELS).some(k => String(k).toLowerCase() === lower)) return true;
      return false;
    }
    async function discoverCustomExamsFromData({ year, className } = {}) {
      const discovered = [];
      const yearValue = String(year || state.year || window.somapYearContext?.getSelectedYear?.() || new Date().getFullYear());
      const classCandidates = [];
      const clsRaw = String(className || classSelect?.value || state.className || state.assignedClass || '').trim();
      if (clsRaw) {
        classCandidates.push(clsRaw);
        const digits = clsRaw.match(/(\d+)/)?.[1];
        if (digits) {
          if (!classCandidates.includes(digits)) classCandidates.push(digits);
          const prefixed = `Class ${digits}`;
          if (!classCandidates.includes(prefixed)) classCandidates.push(prefixed);
        }
      }
      for (const cls of classCandidates) {
        const scoreRoot = await readFirstExisting([`scores/${yearValue}/${cls}`]);
        const scoreVal = scoreRoot?.snap?.exists?.() ? (scoreRoot.snap.val() || {}) : {};
        Object.keys(scoreVal).forEach(key => {
          if (isMonthLikeToken(key)) return;
          const examKey = slugifyExamKey(key);
          if (Object.values(EXAM_KEYS).includes(examKey)) return;
          discovered.push({ label: examLabelFromKey(key), key: examKey });
        });

        const summaryRoot = await readFirstExisting([`summaries/${yearValue}/${cls}`]);
        const summaryVal = summaryRoot?.snap?.exists?.() ? (summaryRoot.snap.val() || {}) : {};
        Object.keys(summaryVal).forEach(key => {
          if (isMonthLikeToken(key)) return;
          const examKey = slugifyExamKey(key);
          if (Object.values(EXAM_KEYS).includes(examKey)) return;
          discovered.push({ label: examLabelFromKey(key), key: examKey });
        });
      }
      return normalizeExamRegistryItems(discovered);
    }
    async function loadExamRegistry({ year, className } = {}) {
      const localItems = readLocalExamRegistry();
      let remoteItems = [];
      try {
        const found = await readFirstExisting([EXAM_REGISTRY_PATH]);
        remoteItems = normalizeExamRegistryItems(found?.snap?.exists?.() ? found.snap.val() : []);
      } catch (_) {
        remoteItems = [];
      }
      const discovered = await discoverCustomExamsFromData({ year, className });
      customExamRegistryCache = normalizeExamRegistryItems([...(remoteItems || []), ...(localItems || []), ...(discovered || [])]);
      writeLocalExamRegistry(customExamRegistryCache);
      return customExamRegistryCache;
    }
    function getAllExamOptions() {
      const builtIn = Object.keys(EXAM_KEYS).map(label => ({ label, key: EXAM_KEYS[label], builtIn: true }));
      const custom = getStoredExamRegistry().filter(item => item && item.label && item.key).map(item => ({ ...item, builtIn: false }));
      const seen = new Set();
      return [...builtIn, ...custom].filter(item => {
        const key = `${item.label}::${item.key}`.toLowerCase();
        if (seen.has(key)) return false;
        seen.add(key);
        return true;
      });
    }
    function populateExamTypeSelect(selectedLabel) {
      if (!examType) return;
      const options = getAllExamOptions();
      examType.innerHTML = options.map(item => `<option value="${String(item.label).replace(/"/g, '&quot;')}">${item.builtIn ? item.label : `${item.label} (Custom)`}</option>`).join('');
      const fallback = options[0]?.label || 'Monthly';
      const normalizedSelected = normalizeExamLabel(selectedLabel);
      examType.value = options.some(item => normalizeExamLabel(item.label) === normalizedSelected) ? normalizedSelected : fallback;
    }
    function monthVariants(mon){
      const set = new Set();
      const raw = String(mon || '').trim();
      if (raw) set.add(raw);
      const stripped = raw.replace(/^0+/, '') || raw;
      if (stripped) set.add(stripped);
      const canonical = MONTH_LABELS[raw] || MONTH_LABELS[stripped];
      if (canonical){
        set.add(canonical);
        set.add(canonical.toLowerCase());
        set.add(canonical.toUpperCase());
        const idx = MONTH_KEYS.indexOf(canonical);
        if (idx >= 0) set.add(String(idx + 1).padStart(2,'0'));
        if (idx >= 0) set.add(String(idx + 1));
        const full = FULL_MONTH_NAMES[canonical];
        if (full){
          set.add(full);
          set.add(full.toLowerCase());
          set.add(full.toUpperCase());
        }
      }
      return Array.from(set).filter(Boolean);
    }
    function canonicalMonthKey(mon){
      const raw = String(mon || '').trim();
      if (!raw) return null;
      const direct = MONTH_LABELS[raw] || MONTH_LABELS[raw.replace(/^0+/, '')];
      if (direct) return direct;
      const parts = raw.split(/[-_/]/);
      if (parts.length >= 2) {
        const tail = String(parts[parts.length - 1] || '').trim();
        return MONTH_LABELS[tail] || MONTH_LABELS[tail.replace(/^0+/, '')] || null;
      }
      return null;
    }
    function monthNumeric(mon){
      const key = canonicalMonthKey(mon);
      if (!key) return null;
      const idx = MONTH_KEYS.indexOf(key);
      return idx >= 0 ? String(idx + 1).padStart(2, '0') : null;
    }
    function pdfMonthLabel(monthKey){
      const short = MONTH_LABELS[monthKey] || monthKey;
      return FULL_MONTH_NAMES[short] || short || '-';
    }
    function normalizeAdmValue(val) {
      return String(val || '').trim();
    }
    function getQueryParams() {
      const params = new URLSearchParams(window.location.search || '');
      return {
        year: params.get('year') || '',
        className: params.get('class') || '',
        stream: params.get('stream') || '',
        examTypeLabel: params.get('examType') || params.get('examTypeLabel') || '',
        month: params.get('month') || ''
      };
    }
    function getInitialFilterSnapshot() {
      const ss = window.sessionStorage || {};
      const qp = getQueryParams();
      return {
        className: qp.className || ss.getItem('className') || state.assignedClass || '',
        stream: qp.stream || ss.getItem('stream') || '',
        month: qp.month || ss.getItem('somap_exam_month') || ss.getItem('month') || 'October',
        year: qp.year || ss.getItem('year') || window.somapYearContext?.getSelectedYear?.() || new Date().getFullYear().toString(),
        examTypeLabel: qp.examTypeLabel || ss.getItem('examTypeLabel') || ss.getItem('somap_exam_type') || ss.getItem('examType') || 'Monthly'
      };
    }
    function getCachedRosterStudents(className, year, stream){
      try {
        const raw = sessionStorage.getItem('somap_scoresheet_roster');
        if (!raw) return [];
        const parsed = JSON.parse(raw);
        const parsedClass = normalizeClassNameForEnrollment(parsed?.className || '');
        const targetClass = normalizeClassNameForEnrollment(className || '');
        const sameClass = parsedClass === targetClass || classMatches(parsedClass, targetClass) || classMatches(targetClass, parsedClass);
        const sameYear = String(parsed?.year || '') === String(year || '');
        if (!sameClass || !sameYear || !Array.isArray(parsed?.students)) return [];
        const normalizedStream = String(stream || '').toUpperCase().replace(/[\s-]/g, '');
        return parsed.students
          .map((stu) => {
            const feeDue = Number(stu.totalFee ?? stu.feeDue ?? 0);
            const feePaid = Number(stu.paid ?? stu.feePaid ?? 0);
            const balance = Number(stu.balance ?? Math.max(0, feeDue - feePaid) ?? 0);
            const adm = normalizeAdmValue(stu.adm || stu.admissionNo || stu.id || stu.studentId || '');
            return {
              id: String(stu.id || stu.studentId || adm),
              adm,
              admissionNo: normalizeAdmValue(stu.admissionNo || stu.adm || stu.id || ''),
              name: stu.name || stu.fullName || [stu.firstName, stu.middleName, stu.lastName].filter(Boolean).join(' ').trim() || `Student ${adm}`,
              class: normalizeClassNameForEnrollment(stu.class || className || ''),
              stream: stu.stream || '',
              feeDue,
              feePaid,
              balance,
              meta: stu.meta || stu
            };
          })
          .filter(student => {
            if (!normalizedStream) return true;
            return String(student.stream || '').toUpperCase().replace(/[\s-]/g, '').includes(normalizedStream);
          });
      } catch (_) {
        return [];
      }
    }
    function persistRosterCache(students, className, year, stream) {
      try {
        sessionStorage.setItem('somap_scoresheet_roster', JSON.stringify({
          students: Array.isArray(students) ? students : [],
          className: className || '',
          year: year || '',
          stream: stream || '',
          timestamp: Date.now()
        }));
      } catch (_) {}
    }
    function normalizeAttendanceMap(val){
      const out = {};
      Object.keys(val || {}).forEach(adm => {
        const a = val[adm] || {};
        const present = Number(a.present || a.daysPresent || 0);
        const absent = Number(a.absent || a.daysAbsent || 0);
        const days = Number(a.days || (present + absent));
        out[adm] = { present, absent, days };
      });
      return out;
    }
    function interpretAttendanceEntry(entry){
      if (!entry) return null;
      const norm = (v) => {
        if (v === null || v === undefined) return null;
        const str = String(v).trim();
        return str ? str.toUpperCase() : null;
      };
      const daily = norm(entry.daily || entry.status || entry.attendance || entry.value);
      if (daily) {
        if (ATTEND_PRESENT_CODES.has(daily)) return { present: 1, absent: 0, days: 1 };
        if (ATTEND_ABSENT_CODES.has(daily)) return { present: 0, absent: 1, days: 1 };
      }
      const am = norm(entry.am);
      const pm = norm(entry.pm);
      if (am || pm) {
        const tokens = [am, pm].filter(Boolean);
        const presentCount = tokens.filter(t => ATTEND_PRESENT_CODES.has(t)).length;
        const absentCount = tokens.filter(t => ATTEND_ABSENT_CODES.has(t)).length;
        if (!presentCount && !absentCount) return null;
        if (presentCount >= absentCount) return { present: 1, absent: 0, days: 1 };
        return { present: 0, absent: 1, days: 1 };
      }
      const generic = norm(entry.present);
      if (generic) {
        if (ATTEND_PRESENT_CODES.has(generic)) return { present: 1, absent: 0, days: 1 };
        if (ATTEND_ABSENT_CODES.has(generic)) return { present: 0, absent: 1, days: 1 };
      }
      return null;
    }

    function flattenEnrollmentsForLookup(raw) {
      if (!raw || typeof raw !== 'object') return {};

        if (id && entry && typeof entry === 'object') flat[id] = Object.assign(flat[id] || {}, entry);
      }
      Object.entries(raw).forEach(([key, value]) => {
        if (!value || typeof value !== 'object') return;
        if (value.studentId || value.id || value.className || value.classLevel || value.class || value.grade) {
          add(value.id || value.studentId || key, value);

        Object.entries(value).forEach(([stuId, stuVal]) => {
          const entry = (stuVal && typeof stuVal === 'object') ? { ...stuVal } : {};
          if (!entry.className && !entry.classLevel && !entry.class && !entry.grade) entry.className = key;
          add(entry.id || entry.studentId || stuId, entry);
        });
      });
      return flat;

    function buildEnrollmentIndex(enrollments) {

    function inferAdmissionYear(s) {
      const sources = [s?.createdTs, s?.admissionTs, s?.createdAt, s?.admissionDate, s?.admissionYear, s?.admYear];
      for (const v of sources) {
        if (v == null) continue;
        const y = typeof v === 'number' ? new Date(v).getFullYear() : (/^\d{4}$/.test(String(v).trim()) ? Number(v) : null);
        if (Number.isFinite(y)) return y;

      const tLead = (t.match(/^\d+/) || [''])[0];
      const aLead = (a.match(/^\d+/) || [''])[0];
      if ((tLead === '1' || tLead === '2') && (aLead === '1' || aLead === '2')) return tLead === aLead;
      return false;
    }
    async function loadAllStudentsFromDb(yearOverride) {
      if (!getDB()) return [];
      const year = normalizeYearValue(yearOverride ?? state.year ?? new Date().getFullYear());
      const delta = Number(year) - SOMAP_DEFAULT_YEAR;
      const tryPaths = ['students', 'Students', 'StudentsList', 'Students_List'];
      const [anchorSnap, yearSnap] = await Promise.all([
        scopedOrSocratesLegacy(`enrollments/${SOMAP_DEFAULT_YEAR}`, `enrollments/${SOMAP_DEFAULT_YEAR}`).catch(() => null),
        scopedOrSocratesLegacy(`enrollments/${year}`, `enrollments/${year}`).catch(() => null)
      ]);
      const anchorIndex = buildEnrollmentIndex(anchorSnap?.exists?.() ? anchorSnap.val() : {});
      const yearIndex = buildEnrollmentIndex(yearSnap?.exists?.() ? yearSnap.val() : {});

      for (const p of tryPaths) {
        try {
          const found = await readFirstExisting([p]);
          const snap = found?.snap;
          if (!snap?.exists?.()) continue;
          const data = snap.val() || {};
          const roster = Object.keys(data).map((k) => {
            const s = data[k] || {};
            if (String(s.status || '').toLowerCase() === 'shifted') return null;
            const name = [s.firstName, s.middleName, s.lastName].filter(Boolean).join(' ').trim() || s.name || s.fullName || '';
            const admissionNo = s.admissionNumber || s.admNo || s.admissionNo || '';
            const anchorEnroll = lookupEnrollment(anchorIndex, k, admissionNo);
            const yearEnroll = lookupEnrollment(yearIndex, k, admissionNo);
            const yearClass = getEnrollmentClassFromRecord(yearEnroll);
            const anchorClass = getEnrollmentClassFromRecord(anchorEnroll);
            const studentClass = getStudentClassFromRecord(s);
            const baseClass = anchorClass || studentClass || 'Unknown';
            const hasAnchor = anchorEnroll && typeof anchorEnroll === 'object' && Object.keys(anchorEnroll).length > 0;
            const oldAdmission = Number.isFinite(inferAdmissionYear(s)) && inferAdmissionYear(s) <= SOMAP_DEFAULT_YEAR;
            const shouldShift = hasAnchor || oldAdmission;
            const lastTransfer = s.lastClassTransfer || s.meta?.lastClassTransfer;
            const transferYear = lastTransfer?.effectiveDate ? new Date(String(lastTransfer.effectiveDate) + 'T12:00:00').getFullYear() : null;
            const transferClass = lastTransfer?.toClass || '';

            let computedClass = yearClass;
            if (!computedClass && transferClass && Number(transferYear) === Number(year)) computedClass = transferClass;
            if (!computedClass) computedClass = shouldShift ? shiftClassForYear(baseClass, delta) : baseClass;

            const finalClass = normalizeClassNameForEnrollment(computedClass || 'Unknown');
            if (String(finalClass).trim().toUpperCase() === 'GRADUATED') return null;

            const feeDue = Number(s.totalFee || s.feePerYear || s.feeDue || s.required || s.debt || 0);
            let feePaid = Number(s.paid || s.feePaid || s.totalPaid || s.paidAmount || s.credit || 0);
            if (s.payments && typeof s.payments === 'object') {
              feePaid = Object.values(s.payments).reduce((sum, p) => sum + Number(p.amount || 0), 0);
            }
            const balance = Number(s.balance || Math.max(0, feeDue - feePaid) || 0);

            return {
              id: String(s._id || s.studentId || s.id || k),
              adm: String(admissionNo || k),
              admissionNo: String(admissionNo || k),
              name: name || ('Student ' + (admissionNo || k)),
              class: finalClass,
              stream: s.stream || s.streamName || s.section || '',
              feeDue,
              feePaid,
              balance,
              meta: s
            };
          }).filter(Boolean);
          roster.sort((a, b) => (a.name || '').localeCompare(b.name || ''));
          return roster;
        } catch (err) {
          console.warn('[checkscoresheet] fetchStudents path', p, err?.message || err);
        }
      }
      return [];
    }

      if(insertIndex < 0) insertIndex = theadRow.children.length;
      state.subjectConfigs.forEach(({ label })=>{
        const thScore = document.createElement('th'); thScore.className = 'p-2 border'; thScore.textContent = label;
        const thPstn = document.createElement('th'); thPstn.className = 'p-2 border'; thPstn.textContent = 'Pstn';
        theadRow.insertBefore(thScore, theadRow.children[insertIndex]);
        theadRow.insertBefore(thPstn, theadRow.children[insertIndex + 1]);
        insertIndex += 2;
      });

      scoresBody.innerHTML = '';
      state.rowsByAdm = {};

      state.students.forEach((s, idx)=>{
        const tr = document.createElement('tr');
        tr.className = idx % 2 ? 'bg-white' : 'bg-slate-50';

        const tdIndex = document.createElement('td'); tdIndex.className='p-2 border text-center'; tdIndex.textContent = String(idx+1);
        tr.appendChild(tdIndex);

        const tdAdm = document.createElement('td'); tdAdm.className='p-2 border text-center'; tdAdm.textContent = s.adm;
        tr.appendChild(tdAdm);

        const tdName = document.createElement('td'); tdName.className='p-2 border';
        tdName.innerHTML = `<div class="font-medium">${escapeHtml(s.name)}</div><div class="text-xs text-slate-500">${escapeHtml(s.class)}</div>`;
        tr.appendChild(tdName);

        const feeObj = state.fees[s.adm] || { required: s.feeDue || 0, paid: s.feePaid || 0, balance: s.balance || 0 };
        const tdFeeDue = document.createElement('td'); tdFeeDue.className='p-2 border text-center'; tdFeeDue.textContent = money(feeObj.required || 0);
        const tdPaid = document.createElement('td'); tdPaid.className='p-2 border text-center'; tdPaid.textContent = money(feeObj.paid || 0);
        const tdBal = document.createElement('td'); tdBal.className='p-2 border text-center'; tdBal.textContent = money(feeObj.balance || 0);
        tr.appendChild(tdFeeDue); tr.appendChild(tdPaid); tr.appendChild(tdBal);

        const subjectCells = {};
        state.subjectConfigs.forEach(({ key, label })=>{
          const tdScore = document.createElement('td'); tdScore.className='p-1.5 border text-center'; tdScore.title = label;
          const tdPstn = document.createElement('td'); tdPstn.className='p-1.5 border text-center'; tdPstn.title = `${label} Position`;

          const sc = (state.scores[s.adm]||{})[key] || {};
          tdScore.textContent = sc.score ?? '-';
          tdPstn.textContent = '-'; // Filled in recomputeAll

          tr.appendChild(tdScore); tr.appendChild(tdPstn);

          subjectCells[key] = { tdScore, tdPstn: tdPstn, label };
        });

        const tdTotal = document.createElement('td'); tdTotal.className='p-2 border text-center font-medium'; tdTotal.textContent='0';
        const tdMax = document.createElement('td'); tdMax.className='p-2 border text-center'; tdMax.textContent='0';
        const tdAvg = document.createElement('td'); tdAvg.className='p-2 border text-center'; tdAvg.textContent='0';
        const tdPstn = document.createElement('td'); tdPstn.className='p-2 border text-center'; tdPstn.textContent='–';
        const tdGrade = document.createElement('td'); tdGrade.className='p-2 border text-center'; tdGrade.textContent='–';
        tr.appendChild(tdTotal); tr.appendChild(tdMax); tr.appendChild(tdAvg); tr.appendChild(tdPstn); tr.appendChild(tdGrade);

        const att = state.attendance[s.adm] || { present:0, absent:0 };
        const tdPresent = document.createElement('td'); tdPresent.className='p-2 border text-center'; tdPresent.textContent = att.present;
        const tdAbsent = document.createElement('td'); tdAbsent.className='p-2 border text-center'; tdAbsent.textContent = att.absent;
        tr.appendChild(tdPresent); tr.appendChild(tdAbsent);

        const tdComment = document.createElement('td'); tdComment.className='p-2 border text-sm'; tdComment.textContent = '–'; // Filled in recomputeAll
        tr.appendChild(tdComment);

        // View eye button (links to singlereportcard.html with adm param)
        const tdView = document.createElement('td'); tdView.className='p-2 border text-center';
        tdView.innerHTML = `<button class="px-2 py-1 bg-blue-100 text-blue-600 rounded text-xs flex items-center gap-1 mx-auto" onclick="window.location.href='singlereportcard.html?adm=${s.adm}'">
          <i class="fas fa-eye"></i> View
        </button>`;
        tr.appendChild(tdView);

        scoresBody.appendChild(tr);

        state.rowsByAdm[s.adm] = {
          tr, subjectCells,
          tdTotal, tdMax, tdAvg, tdPstn, tdGrade,
          tdPresent, tdAbsent,
          tdFeeDue, tdPaid, tdBal,
          tdComment,
          meta: s
        };
      });

      lblCount.textContent = String(state.students.length);
      lblSubjects.textContent = String(state.subjectList.length);
    }

    function escapeHtml(s){ return String(s||'').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
    function money(n){ n = Number(n||0); return new Intl.NumberFormat('en-KE',{style:'currency',currency:'KES',maximumFractionDigits:0}).format(n); }

    /* ---------- Computation: totals/averages/positions/grades ---------- */
    function recomputeAll(){
      const perSubject = {};
      Object.values(state.rowsByAdm).forEach(r => r.tdPstn.textContent = '-');
      Object.keys(state.rowsByAdm).forEach(adm=>{
        const row = state.rowsByAdm[adm];
        const subjects = state.subjectConfigs.map(({ key, label })=>{
          const subjectScores = state.scores[adm] || {};
          const entry = subjectScores[key] || subjectScores[label] || {};
          row.subjectCells[key].tdPstn.textContent = '-';
          const score = Number(entry.score);
          const max = Number(entry.max);
          const attempted = attemptedItem({ score, max });
          if (attempted){
            const pct = (score * 100) / max;
            perSubject[key] = perSubject[key] || [];
            perSubject[key].push({ adm, pct });
            row.subjectCells[key].tdScore.textContent = score;
          } else {
            row.subjectCells[key].tdScore.textContent = '-';
          }
          return { score, max, key };
        });
        const sum = studentPercentFrom(subjects);
        row.tdTotal.textContent = sum.total.toFixed(2);
        row.tdMax.textContent = sum.max ? Math.round(sum.max) : '0';
        row.tdAvg.textContent = sum.pct.toFixed(2);
        const grade = gradeFromPercent(sum.pct);
        row.tdGrade.textContent = grade;
        row._avgPct = sum.pct;
        row._sumScore = sum.total;
        row._attemptCount = sum.attemptedCount;

        // Auto-update teacher comment based on grade
        const comment = getTeacherComment(grade, row.meta.name);
        row.tdComment.textContent = comment;
      });

      state.subjectConfigs.forEach(({ key, label })=>{
        const list = (perSubject[key] || []).slice().sort((a,b)=> b.pct - a.pct);
        let pos=0, last=null, idx=0;
        list.forEach(item=>{
          idx++;
          if(last === null || item.pct < last){ pos = idx; last = item.pct; }
          const row = state.rowsByAdm[item.adm];
          row.subjectCells[key].tdPstn.textContent = String(pos);
        });
      });

      const arr = Object.keys(state.rowsByAdm).map(adm=>{
        const r = state.rowsByAdm[adm];
        return { adm, avg: r._avgPct || 0, total: r._sumScore || 0, attendance: Number(r.tdPresent.textContent || 0), attempts: r._attemptCount || 0 };
      }).filter(r => r.attempts > 0);
      arr.sort((a,b)=>{
        if(b.avg !== a.avg) return b.avg - a.avg;
        if(b.total !== a.total) return b.total - a.total;
        if(b.attendance !== a.attendance) return b.attendance - a.attendance;
        return String(a.adm).localeCompare(String(b.adm));
      });
      arr.forEach((r,i)=> state.rowsByAdm[r.adm].tdPstn.textContent = String(i+1));
    }

    /* ---------- Load sequence (main entry) ---------- */
    function initFilterControls(){
      const snapshot = getInitialFilterSnapshot();
      const ss = window.sessionStorage || {};
      const assigned = state.assignedClass || ss.getItem('teacherAssignedClass') || '';
      if(classSelect){
        const opts = Array.from(new Set([
          ...Object.keys(SomapSub().SUBJECTS_BY_CLASS || {}),
          snapshot.className || '',
          assigned || ''
        ].filter(Boolean)));
        if(assigned){
          lockClassDropdown(assigned);
        } else {
          classSelect.innerHTML = opts.map(o=>`<option value="${o}">${o}</option>`).join('');
          if (snapshot.className) classSelect.value = snapshot.className;
          classSelect.disabled = false;
        }
      }
      if(streamInput){
        streamInput.value = snapshot.stream || '';
      }
      if(monthSelect){
        monthSelect.value = snapshot.month || monthSelect.value || 'October';
      }
      if(yearInput){
        yearInput.value = snapshot.year || yearInput.value || new Date().getFullYear();
      }
      if(examType){
        populateExamTypeSelect(snapshot.examTypeLabel);
        examType.value = normalizeExamLabel(snapshot.examTypeLabel || examType.value || 'Monthly');
        if(monthSelect){ monthSelect.disabled = isComputedWindowExamLabel(examType.value); }
      }
      if(monthSelect){
        monthSelect.value = snapshot.month || monthSelect.value || 'October';
      }
    }

    function readFilters(){
      const ss = window.sessionStorage || {};
      const qp = getQueryParams();
      state.className = classSelect?.value || qp.className || state.assignedClass || ss.getItem('className') || '';
      const rawStream = (streamInput?.value || qp.stream || ss.getItem('stream') || '');
      const classNumMatch = state.className.match(/\d+/);
      const classNum = classNumMatch ? classNumMatch[0] : '';
      state.stream = rawStream.replace(/class/i, '').replace(classNum, '').trim().toUpperCase();
      state.month = monthSelect?.value || qp.month || ss.getItem('somap_exam_month') || ss.getItem('month') || '';
      state.year = yearInput?.value || qp.year || ss.getItem('year') || '';
      state.examType = examType?.value || qp.examTypeLabel || ss.getItem('examTypeLabel') || ss.getItem('somap_exam_type') || ss.getItem('examType') || 'Monthly';
      state.examType = normalizeExamLabel(state.examType);
      state.examTypeLabel = state.examType;
      state.examKey = getExamKeyFromLabel(state.examTypeLabel);
      state.schoolBranch = ss.getItem('schoolBranch') || '';
      if(state.assignedClass && state.className !== state.assignedClass){
        state.className = state.assignedClass;
      }
      if(classSelect && !classSelect.value && state.className){
        classSelect.innerHTML = `<option value="${state.className}">${state.className}</option>`;
        classSelect.value = state.className;
        classSelect.disabled = true;
      }
    }

    async function loadAll(){
      readFilters();
      if(state.assignedClass && state.className !== state.assignedClass){
        state.className = state.assignedClass;
      }
      if(!state.className){ alert('Select class to view saved scores.'); return; }
      if(!state.year){ state.year = new Date().getFullYear().toString(); }
      if(!state.month){ state.month = 'October'; }
      await loadExamRegistry({ year: state.year, className: state.className });
      populateExamTypeSelect(state.examType);
      state.examType = normalizeExamLabel(examType?.value || state.examType || 'Monthly');
      state.examTypeLabel = state.examType;
      state.examKey = getExamKeyFromLabel(state.examTypeLabel);
      if(monthSelect){ monthSelect.disabled = isComputedWindowExamLabel(state.examTypeLabel); }
      if(classSelect && !classSelect.value) lockClassDropdown(state.className);
      try {
        const ss = window.sessionStorage || {};
        ss.setItem('className', state.className);
        ss.setItem('stream', state.stream || '');
        ss.setItem('year', state.year);
        ss.setItem('month', state.month);
        ss.setItem('examTypeLabel', state.examTypeLabel);
        ss.setItem('somap_exam_type', state.examType);
        ss.setItem('somap_exam_month', state.month);
        ss.setItem('examType', state.examType);
        if (state.assignedClass) ss.setItem('teacherAssignedClass', state.assignedClass);
      } catch(e) {}

      await loadCustomSubjectsForYear(state.year);
      state.subjectConfigs = getSubjectConfigsForClass(state.className);
      state.subjectList = state.subjectConfigs.map(s => s.key);

      lblStatus.textContent = 'Loading saved scores...';
      const cachedStudents = getCachedRosterStudents(state.className, state.year, state.stream);
      if(cachedStudents.length){
        state.students = cachedStudents;
      } else {
        const rosterIds = await fetchRosterIds(state.year, state.className);
        const fetchedStudents = await fetchStudents(state.className, state.stream, state.year);
        const byRef = new Map();
        fetchedStudents.forEach(student => {
          [student.adm, student.admissionNo, student.id].map(normalizeAdmValue).filter(Boolean).forEach(ref => {
            if (!byRef.has(ref)) byRef.set(ref, student);
          });
        });
        const matchedRoster = rosterIds
          .map(id => byRef.get(normalizeAdmValue(id)) || null)
          .filter(Boolean)
          .filter((student, index, arr) => arr.findIndex(item => normalizeAdmValue(item.adm || item.admissionNo || item.id) === normalizeAdmValue(student.adm || student.admissionNo || student.id)) === index);
        state.students = matchedRoster.length ? matchedRoster : fetchedStudents;
      }
      state.attendance = await fetchAttendance(state.year, state.month, state.className) || {};
      state.fees = await fetchFees(state.year, state.className) || {};
      state.scores = await fetchScores({ year: state.year, className: state.className, examType: state.examTypeLabel, month: state.month }) || {};

      // Fallback: if no students fetched but scores exist, build rows from scores keys
      if(state.students.length === 0 && Object.keys(state.scores || {}).length){
        state.students = Object.keys(state.scores).map((adm, idx)=> ({
          adm,
          name: `Adm ${adm}`,
          class: state.className,
          stream: state.stream || '',
          feeDue: 0, feePaid: 0, balance: 0
        }));
      }
      persistRosterCache(state.students, state.className, state.year, state.stream);

      buildTable();
      recomputeAll();
      lblStatus.textContent = `${state.students.length} students • ${state.subjectConfigs.length} subjects loaded.`;
    }

    function gatherRowsForExport(){
      const header = ['Adm','Student','Fee Due','Paid','Balance'];
      state.subjectConfigs.forEach(({ label })=>{ header.push(`${label} Score`, `${label} Max`, `${label} Pstn`); });
      header.push('Total','Max','% Avg','Overall Pos','Grade','Present','Absent','Comment');
      const rows = [header];
      Object.keys(state.rowsByAdm).forEach(adm=>{
        const r = state.rowsByAdm[adm];
        const row = [
          adm,
          r.meta.name,
          r.tdFeeDue?.textContent || '',
          r.tdPaid?.textContent || '',
          r.tdBal?.textContent || ''
        ];
        state.subjectConfigs.forEach(({ key })=>{
          const sc = ((state.scores[adm]||{})[key]||{}).score || 0;
          const mx = ((state.scores[adm]||{})[key]||{}).max || 100;
          const pstn = r.subjectCells[key]?.tdPstn?.textContent || '';
          row.push(sc, mx, pstn);
        });
        row.push(
          r.tdTotal.textContent || '',
          r.tdMax.textContent || '',
          r.tdAvg.textContent || '',
          r.tdPstn.textContent || '',
          r.tdGrade.textContent || '',
          r.tdPresent.textContent || '',
          r.tdAbsent.textContent || '',
          r.tdComment.textContent || ''
        );
        rows.push(row);
      });
      return rows;
    }

    function exportPDF(){
      const rows = gatherRowsForExport();
      if(rows.length <= 1){
        alert('No data to export.');
        return;
      }
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF({ orientation:'l', unit:'pt', format:'a4' });
      const monthLabel = pdfMonthLabel(state.month);
      const title = `Scoresheet ${state.className || ''} ${state.examTypeLabel || ''} ${state.year || ''}/${monthLabel}`;
      const subtitle = `Stream ${state.stream || '-'}  |  ${state.examTypeLabel || 'Monthly'}  |  Month ${monthLabel}`;

      doc.setFillColor(79, 70, 229);
      doc.rect(30, 28, 782, 42, 'F');
      doc.setTextColor(255,255,255);
      doc.setFontSize(16);
      doc.text(title, 40, 55);
      doc.setFontSize(11);
      doc.text(subtitle, 40, 70);

      doc.autoTable({
        startY:90,
        head:[rows[0]],
        body:rows.slice(1),
        theme:'grid',
        styles:{fontSize:7,cellPadding:3, halign:'center', textColor:[31,41,55]},
        headStyles:{fillColor:[99, 102, 241], textColor:[255,255,255], fontStyle:'bold'},
        alternateRowStyles:{fillColor:[245,248,255]},
        footStyles:{fillColor:[16,185,129], textColor:[255,255,255]},
        columnStyles:{0:{halign:'left'},1:{halign:'left'}},
        didDrawPage: (data)=>{
          doc.setFontSize(9);
          doc.setTextColor(148,163,184);
          doc.text(`Generated ${new Date().toLocaleString()}`, data.settings.margin.left, doc.internal.pageSize.height - 10);
        }
      });
      doc.save(title.replace(/[^A-Za-z0-9_ -]/g,'_') + '.pdf');
    }

    /* ---------- Event Listeners ---------- */
    window.addEventListener('load', () => {
      startAuthWatcher();
    });
    if(btnLoad) btnLoad.addEventListener('click', loadAll);
    if(btnExportPDF) btnExportPDF.addEventListener('click', exportPDF);
    if(examType){
      examType.addEventListener('change', (e)=>{
        const v = e.target.value;
        sessionStorage.setItem('somap_exam_type', v);
        sessionStorage.setItem('examTypeLabel', normalizeExamLabel(v));
        if(monthSelect){ monthSelect.disabled = isComputedWindowExamLabel(v); }
        loadAll();
      });
    }
    if(monthSelect){
      monthSelect.addEventListener('change', (e)=>{
        sessionStorage.setItem('somap_exam_month', e.target.value);
        loadAll();
      });
    }

    /* ---------- Small helpers ---------- */
    function hexToRgb(hex){ const m = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex); return m?{r:parseInt(m[1],16),g:parseInt(m[2],16),b:parseInt(m[3],16)}:{r:37,g:99,b:235}; }

    // Full screen toggle
    const btnFullScreen = document.getElementById('btnFullScreen');
    btnFullScreen.addEventListener('click', () => {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen();
        btnFullScreen.textContent = 'Exit Full Screen';
        btnFullScreen.classList.replace('bg-green-600', 'bg-red-600');
      } else {
        document.exitFullscreen();
        btnFullScreen.textContent = 'Full Screen';
        btnFullScreen.classList.replace('bg-red-600', 'bg-green-600');
      }
    });
  </script>
  <script src="../js/modules/grading.js"></script>
  <script>
    const { percent, gradeFromPercent: gradingGradeFromPercent, letterAndPercent } = window.Grading;
  </script>
</body>
