<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SoMAp - Joint Exam Intelligence Report</title>

  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-storage-compat.js"></script>
  <script src="../somapappv1multischool/js/context.js"></script>
  <script src="../firebase.js"></script>
  <script src="../Todashboardhtml/yearContext.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3.8.2/dist/jspdf.plugin.autotable.min.js"></script>
  <script src="../js/school-logo.js"></script>

  <style>
    :root {
      --navy: #0f172a;
      --blue: #1d4ed8;
      --line: rgba(148, 163, 184, 0.24);
    }
    body {
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
      color: #172033;
      background:
        radial-gradient(circle at 0 0, rgba(14, 165, 233, 0.16), transparent 26%),
        radial-gradient(circle at 100% 0, rgba(29, 78, 216, 0.14), transparent 30%),
        linear-gradient(180deg, #eef6ff 0%, #f8fbff 46%, #eef3f8 100%);
    }
    .shell-card {
      background: rgba(255, 255, 255, 0.94);
      border: 1px solid var(--line);
      box-shadow: 0 24px 54px rgba(15, 23, 42, 0.08);
      backdrop-filter: blur(18px);
    }
    .hero {
      background: linear-gradient(135deg, #0f172a 0%, #164e63 52%, #1d4ed8 100%);
      color: white;
      border: 1px solid rgba(255, 255, 255, 0.18);
      box-shadow: 0 30px 80px rgba(15, 23, 42, 0.24);
    }
    .tab-btn {
      border: 1px solid transparent;
      color: #475569;
      white-space: nowrap;
    }
    .tab-btn.active {
      color: white;
      background: #0f172a;
      border-color: #0f172a;
    }
    .metric {
      border-left: 5px solid var(--accent, #2563eb);
    }
    .table-wrap {
      overflow: auto;
      border: 1px solid rgba(148, 163, 184, 0.22);
      border-radius: 16px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    th {
      background: #0f172a;
      color: white;
      text-align: left;
      padding: 10px 12px;
      white-space: nowrap;
    }
    td {
      padding: 10px 12px;
      border-bottom: 1px solid rgba(148, 163, 184, 0.18);
      vertical-align: top;
    }
    .risk-danger { color: #b91c1c; font-weight: 800; }
    .risk-warning { color: #b45309; font-weight: 800; }
    .risk-safe { color: #047857; font-weight: 800; }
    .hidden-panel { display: none; }
  </style>
</head>
<body>
  <main class="max-w-7xl mx-auto px-4 sm:px-6 py-6 sm:py-10">
    <section class="hero rounded-[28px] p-6 sm:p-8 mb-6">
      <div class="flex flex-col lg:flex-row lg:items-center lg:justify-between gap-6">
        <div class="flex items-center gap-5">
          <img id="school-logo-display" src="../images/socrates_logo.png" alt="School logo" class="w-20 h-20 rounded-2xl bg-white/95 object-contain p-2 shadow-lg">
          <div>
            <p class="text-xs uppercase tracking-[0.32em] text-sky-100">Socrates internal accountability</p>
            <h1 class="text-3xl sm:text-4xl font-black mt-2">Joint Exam Intelligence Report</h1>
            <p class="text-sky-100 mt-2"><span id="classLabel">Class</span> • <span id="yearLabel">Year</span> • <span id="schoolLabel">School</span></p>
          </div>
        </div>
        <div class="flex flex-wrap gap-3">
          <button id="backBtn" class="rounded-xl bg-white/10 border border-white/20 px-4 py-3 font-bold hover:bg-white/20">Back</button>
          <button data-tab-jump="Upload Result" class="rounded-xl bg-sky-400 text-slate-950 px-4 py-3 font-black hover:bg-sky-300">Upload Joint</button>
        </div>
      </div>
    </section>

    <div id="accessNotice" class="hidden shell-card rounded-2xl p-5 mb-6 border-red-200 text-red-700 font-semibold"></div>

    <section id="recapGrid" class="grid sm:grid-cols-2 lg:grid-cols-5 gap-4 mb-6"></section>

    <nav class="shell-card rounded-2xl p-2 mb-6 overflow-x-auto">
      <div id="tabs" class="flex gap-2 min-w-max"></div>
    </nav>

    <section id="panel-Recap" class="tab-panel shell-card rounded-2xl p-5 sm:p-6"></section>

    <section id="panel-Upload Result" class="tab-panel hidden-panel shell-card rounded-2xl p-5 sm:p-6">
      <div class="grid lg:grid-cols-[0.9fr_1.1fr] gap-6">
        <form id="uploadForm" class="space-y-4">
          <div>
            <h2 class="text-xl font-black text-slate-900">Upload Joint Result</h2>
            <p class="text-sm text-slate-500 mt-1">Excel is parsed in the browser. PDF evidence is stored as file metadata for now.</p>
          </div>
          <label class="block text-sm font-bold text-slate-700">Exam date
            <input id="examDate" type="date" required class="mt-1 w-full rounded-xl border border-slate-300 px-3 py-3">
          </label>
          <label class="block text-sm font-bold text-slate-700">Joint name/title
            <input id="jointName" required placeholder="e.g. Ward Joint Examination - May" class="mt-1 w-full rounded-xl border border-slate-300 px-3 py-3">
          </label>
          <div class="grid sm:grid-cols-2 gap-3">
            <label class="block text-sm font-bold text-slate-700">Class
              <input id="classInput" readonly class="mt-1 w-full rounded-xl border border-slate-200 bg-slate-50 px-3 py-3">
            </label>
            <label class="block text-sm font-bold text-slate-700">Academic year
              <input id="yearInput" readonly class="mt-1 w-full rounded-xl border border-slate-200 bg-slate-50 px-3 py-3">
            </label>
          </div>
          <label class="block text-sm font-bold text-slate-700">Upload Excel file
            <input id="excelFile" type="file" accept=".xlsx,.xls,.csv" required class="mt-1 w-full rounded-xl border border-slate-300 px-3 py-3 bg-white">
          </label>
          <label class="block text-sm font-bold text-slate-700">Optional PDF evidence file
            <input id="pdfFile" type="file" accept="application/pdf,.pdf" class="mt-1 w-full rounded-xl border border-slate-300 px-3 py-3 bg-white">
          </label>
          <label class="block text-sm font-bold text-slate-700">Notes
            <textarea id="notes" rows="4" class="mt-1 w-full rounded-xl border border-slate-300 px-3 py-3" placeholder="Context, source, or moderation notes"></textarea>
          </label>
          <div class="flex flex-wrap gap-3">
            <button class="rounded-xl bg-slate-950 text-white px-5 py-3 font-black" type="submit">Parse and Preview</button>
            <button id="confirmSaveBtn" class="hidden rounded-xl bg-emerald-600 text-white px-5 py-3 font-black" type="button">Confirm and Save Analysis</button>
          </div>
        </form>
        <div>
          <h3 class="text-lg font-black text-slate-900 mb-3">Preview</h3>
          <div id="previewBox" class="rounded-2xl border border-dashed border-slate-300 bg-slate-50 p-4 text-sm text-slate-600">No Excel file parsed yet.</div>
        </div>
      </div>
    </section>

    <section id="panel-Schools & PSLE Strength" class="tab-panel hidden-panel shell-card rounded-2xl p-5 sm:p-6"></section>
    <section id="panel-Subject Accountability" class="tab-panel hidden-panel shell-card rounded-2xl p-5 sm:p-6"></section>
    <section id="panel-Pupil Movement" class="tab-panel hidden-panel shell-card rounded-2xl p-5 sm:p-6"></section>
    <section id="panel-Teacher Responsibility" class="tab-panel hidden-panel shell-card rounded-2xl p-5 sm:p-6"></section>
    <section id="panel-Action Plans" class="tab-panel hidden-panel shell-card rounded-2xl p-5 sm:p-6"></section>
    <section id="panel-PDF Reports" class="tab-panel hidden-panel shell-card rounded-2xl p-5 sm:p-6"></section>

    <section class="shell-card rounded-2xl p-5 mt-6">
      <h2 class="text-xl font-black text-slate-900 mb-3">Historical Uploaded Joints</h2>
      <div id="historyBox" class="text-sm text-slate-600">Loading...</div>
    </section>
  </main>

  <div id="toast" class="fixed right-4 bottom-4 z-50 hidden rounded-2xl bg-slate-950 text-white px-5 py-4 shadow-2xl max-w-md"></div>
  <script src="js/joint_exam_intelligence.js"></script>
</body>
</html>
