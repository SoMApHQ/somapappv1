<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Approved School Gallery · SoMAp</title><link rel="stylesheet" href="volunteers.css"><script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script><script src="../somapappv1multischool/js/context.js"></script><script src="../firebase.js"></script><script src="volunteers-core.js"></script></head><body><main class="shell"><header class="topbar"><div><div class="eyebrow">Memories and milestones</div><h1>Approved school gallery</h1><p class="muted">Only photographs approved for volunteer viewing appear here.</p></div><a class="btn secondary" href="volunteerportal.html">Back to portal</a></header><section class="gallery" id="gallery"><div class="card empty">Loading approved memories…</div></section></main><script>(async()=>{const V=SomapVolunteers,s=V.requireSession(),snap=await V.ref('volunteerGallery',s.year).once('value'),items=[];snap.forEach(c=>{const x=c.val()||{};if(x.approved===true&&['public','volunteer-only','project-specific'].includes(x.visibility)&&x.imageUrl)items.push(x)});const e=V.escapeHtml;document.getElementById('gallery').innerHTML=items.length?items.map(x=>`<figure class="card"><img src="${e(x.imageUrl)}" alt="${e(x.caption||'School memory')}" loading="lazy"><figcaption><b>${e(x.title||'School memory')}</b><br><span class="muted">${e(x.caption)}</span></figcaption></figure>`).join(''):'<div class="card empty">No approved photos have been published.</div>'})().catch(()=>location.replace('../login.html'))</script></body></html>
