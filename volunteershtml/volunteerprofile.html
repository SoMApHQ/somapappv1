<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>My Volunteer Profile · SoMAp</title><link rel="stylesheet" href="volunteers.css"><script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script><script src="../somapappv1multischool/js/context.js"></script><script src="../firebase.js"></script><script src="volunteers-core.js"></script></head><body><main class="shell"><header class="topbar"><div><div class="eyebrow">Volunteer portal</div><h1>My Registered Profile</h1></div><a class="btn secondary" href="volunteerportal.html">Back to portal</a></header><section class="card" id="profile"><div class="empty">Loading profile…</div></section></main><script>(async()=>{const V=SomapVolunteers,s=V.requireSession(),snap=await V.ref('volunteers',s.year).once('value');let v;snap.forEach(c=>{if(c.val()?.volunteerId===s.volunteerId)v=c.val()});if(!v)return;const e=V.escapeHtml;document.getElementById('profile').innerHTML=`<div class="hero-profile"><img class="profile-photo" src="${e(v.passportPhotoUrl||'../images/somap-logo.png')}" alt=""><div><h2>${e(v.displayName)}</h2><p>${e(v.country)} · ${e(v.organization)}</p><span class="badge">${e(v.status)}</span></div></div><hr><div class="grid"><div class="span-6"><h3>Contact</h3><p>${e(v.normalizedPhone)}<br>${e(v.email)}</p></div><div class="span-6"><h3>Volunteer work</h3><p>${e(v.volunteerType)}<br>${e(v.specialty)}</p></div><div class="span-6"><h3>Visit dates</h3><p>${e(v.plannedArrivalDate)} — ${e(v.plannedDepartureDate)}</p></div><div class="span-6"><h3>Access</h3><p>Level ${Number(v.accessLevel)||1}</p></div></div><div class="notice">Sensitive details are managed by the school. To correct this profile, contact the assigned school representative.</div><a class="btn secondary" href="mailto:${encodeURIComponent(v.schoolContactEmail||v.email||'')}?subject=Request%20Volunteer%20Profile%20Correction">Request Profile Correction</a>`})().catch(()=>location.replace('../login.html'))</script></body></html>
