<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Projects We Are Building · SoMAp</title><link rel="stylesheet" href="volunteers.css"><script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script><script src="../somapappv1multischool/js/context.js"></script><script src="../firebase.js"></script><script src="volunteers-core.js"></script></head><body><main class="shell"><header class="topbar"><div><div class="eyebrow">Dignity · transparency · progress</div><h1>Projects we are building</h1><p class="muted">What has been done, what remains, and the school community's contribution.</p></div><a class="btn secondary" href="volunteerportal.html">Back to portal</a></header><section class="portal-grid" id="projects"><div class="card empty">Loading approved projects…</div></section></main><script>(async()=>{const V=SomapVolunteers,s=V.requireSession(),snap=await V.ref('volunteerProjects',s.year).once('value'),items=[];snap.forEach(c=>{const p=c.val()||{},assigned=Array.isArray(p.assignedVolunteers)&&p.assignedVolunteers.includes(s.volunteerId);if(['public','volunteer-only'].includes(p.visibility)||assigned)items.push(p)});const e=V.escapeHtml,m=n=>Number(n||0).toLocaleString();document.getElementById('projects').innerHTML=items.length?items.map(p=>`<article class="card portal-card"><span class="badge">${e(p.status)}</span><h2>${e(p.title)}</h2><p class="muted">${e(p.description)}</p><div class="progress"><i style="width:${Math.max(0,Math.min(100,Number(p.progressPercent)||0))}%"></i></div><p><b>${Number(p.progressPercent)||0}% progress</b></p><p>Estimated cost: ${m(p.estimatedCost)}<br>Amount spent: ${m(p.amountSpent)}<br>School contribution: ${e(p.schoolContribution||'Recorded by the school')}</p><small>${e(p.startDate)} — ${e(p.targetDate)}</small></article>`).join(''):'<div class="card empty">No volunteer-visible projects have been published.</div>'})().catch(()=>location.replace('../login.html'))</script></body></html>
