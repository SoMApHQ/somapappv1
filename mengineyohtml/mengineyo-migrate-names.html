<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MENGINEYO — One-time Name Index Migration</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gray-50 flex items-center justify-center px-4 py-10">
  <div class="w-full max-w-lg bg-white rounded-xl shadow-sm border border-gray-100 p-6">
    <h1 class="font-bold text-gray-800 text-lg mb-2">One-time migration: build project name index</h1>
    <p class="text-xs text-gray-500 mb-4">
      Login now looks projects up by name instead of project code. This tool backfills
      <code>mengineyoNames/&lt;slug&gt;</code> for every project registered before this change.
      Safe to run more than once — it never overwrites an existing entry.
    </p>
    <button id="runBtn" onclick="runMigration()" class="w-full py-3 rounded-xl font-bold text-white bg-emerald-600 hover:bg-emerald-700 text-sm">
      Run Migration
    </button>
    <div id="log" class="mt-4 text-xs font-mono whitespace-pre-wrap bg-gray-50 border border-gray-200 rounded-lg p-3 max-h-96 overflow-y-auto"></div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
  <script src="../firebase.js"></script>
  <script src="./mengineyo-core.js"></script>
  <script>
    function log(msg) {
      const el = document.getElementById('log');
      el.textContent += msg + '\n';
      el.scrollTop = el.scrollHeight;
    }

    async function runMigration() {
      const btn = document.getElementById('runBtn');
      btn.disabled = true;
      document.getElementById('log').textContent = '';
      log('Reading mengineyoProjects…');

      try {
        const [projectsSnap, namesSnap] = await Promise.all([
          window.db.ref('mengineyoProjects').once('value'),
          window.db.ref('mengineyoNames').once('value'),
        ]);

        if (!projectsSnap.exists()) {
          log('No projects found.');
          btn.disabled = false;
          return;
        }

        const existingNames = namesSnap.exists() ? namesSnap.val() : {};
        const projects = projectsSnap.val();
        const updates = {};
        let created = 0, skipped = 0, conflicts = 0;

        for (const [projectId, proj] of Object.entries(projects)) {
          const projectName = proj.profile && proj.profile.projectName;
          if (!projectName) { log('⚠ ' + projectId + ' has no profile.projectName, skipped.'); skipped++; continue; }

          const slug = ME.slugifyName(projectName);
          if (!slug) { log('⚠ ' + projectId + ' name "' + projectName + '" produced an empty slug, skipped.'); skipped++; continue; }

          if (existingNames[slug] && existingNames[slug] !== projectId) {
            log('✖ Conflict: "' + projectName + '" (slug "' + slug + '") already points to a different project. Resolve manually.');
            conflicts++;
            continue;
          }
          if (existingNames[slug] === projectId) {
            skipped++;
            continue;
          }

          updates['mengineyoNames/' + slug] = projectId;
          existingNames[slug] = projectId;
          log('+ Will add "' + projectName + '" → ' + slug);
          created++;
        }

        if (Object.keys(updates).length) {
          await window.db.ref().update(updates);
        }

        log('\nDone. Added ' + created + ', already indexed/skipped ' + skipped + ', conflicts ' + conflicts + '.');
        if (conflicts) log('Conflicting projects need a unique name before their operators can log in by name.');
      } catch (err) {
        log('Error: ' + err.message);
        console.error(err);
      } finally {
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
