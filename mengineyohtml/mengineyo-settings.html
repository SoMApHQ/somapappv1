<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MENGINEYO — Settings</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
</head>
<body class="min-h-screen bg-gray-50 pb-24">

  <header class="bg-emerald-700 text-white px-4 py-3">
    <div class="max-w-2xl mx-auto flex items-center justify-between">
      <div class="flex items-center gap-2">
        <a href="mengineyo-dashboard.html" class="text-emerald-200 hover:text-white"><i class="fas fa-arrow-left"></i></a>
        <div>
          <div class="font-bold text-base">Project Settings</div>
          <div class="text-xs text-emerald-200" id="meProjectName"></div>
        </div>
      </div>
      <span class="text-xs text-emerald-200" id="meOperatorInfo"></span>
    </div>
  </header>

  <div class="max-w-2xl mx-auto px-4 py-5">
    <div id="meAlert"></div>

    <!-- Project Info -->
    <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-5 mb-4">
      <h2 class="font-bold text-gray-800 mb-4"><i class="fas fa-info-circle text-emerald-600 mr-2"></i>Project Information</h2>
      <div class="grid grid-cols-2 gap-3 mb-3">
        <div class="col-span-2 sm:col-span-1">
          <div class="text-xs text-gray-500 font-semibold uppercase tracking-wide mb-0.5">Project Name</div>
          <div class="font-bold text-gray-800" id="dispName">—</div>
        </div>
        <div>
          <div class="text-xs text-gray-500 font-semibold uppercase tracking-wide mb-0.5">Project Code</div>
          <div class="font-mono font-bold text-emerald-700 text-sm" id="dispCode">—</div>
        </div>
        <div>
          <div class="text-xs text-gray-500 font-semibold uppercase tracking-wide mb-0.5">Country</div>
          <div class="text-gray-700" id="dispCountry">—</div>
        </div>
        <div>
          <div class="text-xs text-gray-500 font-semibold uppercase tracking-wide mb-0.5">Currency</div>
          <div class="text-gray-700" id="dispCurrency">—</div>
        </div>
        <div>
          <div class="text-xs text-gray-500 font-semibold uppercase tracking-wide mb-0.5">Location</div>
          <div class="text-gray-700" id="dispLocation">—</div>
        </div>
        <div>
          <div class="text-xs text-gray-500 font-semibold uppercase tracking-wide mb-0.5">Ownership</div>
          <div class="text-gray-700" id="dispOwnership">—</div>
        </div>
      </div>
      <div class="mb-3">
        <div class="text-xs text-gray-500 font-semibold uppercase tracking-wide mb-1">Activities</div>
        <div id="dispActivities" class="flex flex-wrap gap-1"></div>
      </div>
    </div>

    <!-- Edit Project Settings (Chair only) -->
    <div id="editSection" class="hidden bg-white rounded-xl shadow-sm border border-gray-100 p-5 mb-4">
      <h2 class="font-bold text-gray-800 mb-4"><i class="fas fa-edit text-emerald-600 mr-2"></i>Edit Settings</h2>
      <div class="space-y-4">
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1">Project Name</label>
          <input id="setName" type="text" class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:ring-2 focus:ring-emerald-500 focus:outline-none" />
        </div>
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1">Location</label>
          <input id="setLocation" type="text" class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:ring-2 focus:ring-emerald-500 focus:outline-none" />
        </div>
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1">Default Milk Price per Litre</label>
          <input id="setMilkPrice" type="number" min="0" step="0.01" placeholder="0.00" class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:ring-2 focus:ring-emerald-500 focus:outline-none" />
        </div>
        <div class="space-y-3">
          <label class="flex items-center gap-3 cursor-pointer">
            <input id="setRequireConfirm" type="checkbox" class="w-4 h-4 accent-emerald-600 flex-shrink-0" />
            <div>
              <div class="text-sm font-semibold text-gray-700">Require Manager to Confirm Milk Records</div>
              <div class="text-xs text-gray-400">Mchungi records are Draft until Manager confirms</div>
            </div>
          </label>
          <label class="flex items-center gap-3 cursor-pointer">
            <input id="setAllowMchungiPhotos" type="checkbox" class="w-4 h-4 accent-emerald-600 flex-shrink-0" />
            <div>
              <div class="text-sm font-semibold text-gray-700">Allow Mchungi to Upload Photos</div>
              <div class="text-xs text-gray-400">Mchungi can upload animal and newborn photos</div>
            </div>
          </label>
          <label class="flex items-center gap-3 cursor-pointer">
            <input id="setAllowManagerEditConfirmed" type="checkbox" class="w-4 h-4 accent-emerald-600 flex-shrink-0" />
            <div>
              <div class="text-sm font-semibold text-gray-700">Allow Manager to Edit Confirmed Milk Records</div>
              <div class="text-xs text-gray-400">If off, confirmed records cannot be changed</div>
            </div>
          </label>
        </div>
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1">Require CEO Approval for Sales Above</label>
          <div class="flex items-center gap-2">
            <span class="text-sm text-gray-500" id="currencyLabel">KSh</span>
            <input id="setSalesApproval" type="number" min="0" step="100" placeholder="0 = no limit" class="flex-1 border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:ring-2 focus:ring-emerald-500 focus:outline-none" />
          </div>
        </div>
        <button id="saveSettingsBtn" onclick="saveSettings()" class="w-full py-3 rounded-xl font-bold text-white bg-emerald-600 hover:bg-emerald-700 text-sm">
          <i class="fas fa-save mr-2"></i>Save Settings
        </button>
      </div>
    </div>

    <!-- Activities edit -->
    <div id="activitiesEditSection" class="hidden bg-white rounded-xl shadow-sm border border-gray-100 p-5 mb-4">
      <h2 class="font-bold text-gray-800 mb-3"><i class="fas fa-th-large text-emerald-600 mr-2"></i>Activities</h2>
      <div id="actGrid" class="grid grid-cols-2 sm:grid-cols-3 gap-2 mb-3"></div>
      <button onclick="saveActivities()" class="w-full py-3 rounded-xl font-bold text-white bg-emerald-600 hover:bg-emerald-700 text-sm">
        Save Activities
      </button>
    </div>

    <!-- Danger zone (Chair only) -->
    <div id="dangerZone" class="hidden bg-red-50 border border-red-200 rounded-xl p-5 mb-4">
      <h2 class="font-bold text-red-700 mb-3"><i class="fas fa-exclamation-triangle mr-2"></i>Danger Zone</h2>
      <p class="text-xs text-red-600 mb-3">These actions affect the entire project. Be careful.</p>
      <button onclick="deactivateProject()" class="w-full py-3 rounded-xl font-bold text-red-700 border border-red-400 hover:bg-red-100 text-sm mb-2">
        Deactivate Project (hide from login)
      </button>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-storage-compat.js"></script>
  <script src="../firebase.js"></script>
  <script src="./mengineyo-core.js"></script>
  <script>
    const session = ME.requireAuth();
    ME.renderHeader();

    const isChair = session.role === 'Chair';
    if (isChair) {
      document.getElementById('editSection').classList.remove('hidden');
      document.getElementById('activitiesEditSection').classList.remove('hidden');
      document.getElementById('dangerZone').classList.remove('hidden');
      document.getElementById('currencyLabel').textContent = session.currencySymbol || 'KSh';
    }

    let profileData = null;

    async function loadProfile() {
      const snap = await ME.meRef(session.projectId, 'profile').once('value');
      profileData = snap.val();
      if (!profileData) return;

      ME.setText('dispName',     profileData.projectName || '-');
      ME.setText('dispCode',     profileData.projectCode || '-');
      ME.setText('dispCountry',  profileData.country || '-');
      ME.setText('dispCurrency', (profileData.currency||'') + ' (' + (profileData.currencySymbol||'') + ')');
      ME.setText('dispLocation', profileData.location || '-');
      ME.setText('dispOwnership',profileData.ownership || '-');

      const acts = profileData.activities || [];
      document.getElementById('dispActivities').innerHTML = acts.map(a =>
        `<span class="bg-emerald-100 text-emerald-700 text-xs px-2 py-0.5 rounded-full">${a}</span>`
      ).join('') || '<span class="text-gray-400 text-xs">None selected</span>';

      if (isChair) {
        document.getElementById('setName').value     = profileData.projectName || '';
        document.getElementById('setLocation').value = profileData.location || '';

        // Build activities grid
        const grid = document.getElementById('actGrid');
        grid.innerHTML = ME.ACTIVITIES.map(a =>
          `<label class="flex items-center gap-2 text-xs font-medium text-gray-700 cursor-pointer">
            <input type="checkbox" name="setAct" value="${a}" class="accent-emerald-600 w-4 h-4" ${acts.includes(a)?'checked':''} />
            ${a}
          </label>`
        ).join('');
      }
    }

    async function loadSettings() {
      if (!isChair) return;
      const snap = await ME.meRef(session.projectId, 'settings').once('value');
      const s = snap.val() || {};
      if (document.getElementById('setMilkPrice'))           document.getElementById('setMilkPrice').value          = s.milkPriceDefault || 0;
      if (document.getElementById('setRequireConfirm'))      document.getElementById('setRequireConfirm').checked    = s.requireManagerConfirmMilk !== false;
      if (document.getElementById('setAllowMchungiPhotos'))  document.getElementById('setAllowMchungiPhotos').checked = s.allowMchungiPhotos !== false;
      if (document.getElementById('setAllowManagerEditConfirmed')) document.getElementById('setAllowManagerEditConfirmed').checked = !!s.allowManagerEditConfirmedMilk;
      if (document.getElementById('setSalesApproval'))       document.getElementById('setSalesApproval').value       = s.requireCEOApprovalSalesAbove || 0;
    }

    async function saveSettings() {
      ME.setBtnLoading('saveSettingsBtn', true);
      try {
        const updates = {};
        updates['mengineyoProjects/' + session.projectId + '/profile/projectName'] = document.getElementById('setName').value.trim();
        updates['mengineyoProjects/' + session.projectId + '/profile/location']    = document.getElementById('setLocation').value.trim();
        updates['mengineyoProjects/' + session.projectId + '/profile/updatedAt']   = ME.now();
        updates['mengineyoProjects/' + session.projectId + '/settings'] = {
          milkPriceDefault:            parseFloat(document.getElementById('setMilkPrice').value) || 0,
          requireManagerConfirmMilk:   document.getElementById('setRequireConfirm').checked,
          allowMchungiPhotos:          document.getElementById('setAllowMchungiPhotos').checked,
          allowManagerEditConfirmedMilk: document.getElementById('setAllowManagerEditConfirmed').checked,
          requireCEOApprovalSalesAbove: parseFloat(document.getElementById('setSalesApproval').value) || 0,
          updatedAt: ME.now(),
          updatedBy: session.operatorId,
        };
        await window.db.ref().update(updates);
        await ME.audit('settings_updated', 'settings', session.projectId);
        ME.showAlert('Settings saved!', 'success');
        loadProfile();
      } catch(e) {
        ME.showAlert('Save failed: ' + e.message, 'error');
      }
      ME.setBtnLoading('saveSettingsBtn', false);
    }

    async function saveActivities() {
      const checked = Array.from(document.querySelectorAll('input[name="setAct"]:checked')).map(el => el.value);
      await ME.meRef(session.projectId, 'profile/activities').set(checked);
      await ME.audit('activities_updated', 'settings', session.projectId, { activities: checked });
      ME.showAlert('Activities updated!', 'success');
      loadProfile();
    }

    async function deactivateProject() {
      if (!confirm('Deactivate this project? It will not appear in the login search. You can reactivate it later.')) return;
      await ME.meRef(session.projectId, 'profile/status').set('inactive');
      await ME.audit('project_deactivated', 'project', session.projectId);
      ME.showAlert('Project deactivated.', 'warning');
    }

    loadProfile();
    loadSettings();
  </script>
</body>
</html>
