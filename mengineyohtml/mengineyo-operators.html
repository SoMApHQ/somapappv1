<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MENGINEYO — Operators</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
</head>
<body class="min-h-screen bg-gray-50 pb-24">

  <!-- Header -->
  <header class="bg-emerald-700 text-white px-4 py-3">
    <div class="max-w-3xl mx-auto flex items-center justify-between">
      <div class="flex items-center gap-2">
        <a href="mengineyo-dashboard.html" class="text-emerald-200 hover:text-white"><i class="fas fa-arrow-left"></i></a>
        <div>
          <div class="font-bold text-base">Operators</div>
          <div class="text-xs text-emerald-200" id="meProjectName"></div>
        </div>
      </div>
      <span class="text-xs text-emerald-200" id="meOperatorInfo"></span>
    </div>
  </header>

  <div class="max-w-3xl mx-auto px-4 py-4">
    <div id="meAlert"></div>

    <!-- Add Operator button -->
    <div class="flex items-center justify-between mb-4">
      <h2 class="font-bold text-gray-800">Project Operators</h2>
      <button id="addOpBtn" onclick="openAddModal()" class="bg-emerald-600 text-white text-sm px-4 py-2 rounded-lg hover:bg-emerald-700 font-semibold">
        <i class="fas fa-plus mr-1"></i>Add Operator
      </button>
    </div>

    <!-- Operators List -->
    <div id="operatorsList" class="space-y-3">
      <div class="text-center text-gray-400 text-sm py-8">Loading operators…</div>
    </div>
  </div>

  <!-- Add / Edit Operator Modal -->
  <div id="opModal" class="hidden fixed inset-0 z-50 flex items-end sm:items-center justify-center px-4" onclick="closeModal(event, 'opModal')">
    <div class="absolute inset-0 bg-black/50"></div>
    <div class="relative bg-white rounded-2xl shadow-xl w-full max-w-lg p-5 max-h-[90vh] overflow-y-auto" onclick="event.stopPropagation()">
      <div class="flex items-center justify-between mb-4">
        <h3 class="font-bold text-gray-800" id="modalTitle">Add Operator</h3>
        <button onclick="closeModal(null,'opModal')" class="text-gray-400 hover:text-gray-700"><i class="fas fa-times"></i></button>
      </div>
      <div id="modalAlert"></div>
      <input type="hidden" id="editOpId" />
      <div class="space-y-3">
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1">Full Name <span class="text-red-500">*</span></label>
          <input id="opName" type="text" placeholder="Full name" class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500" />
        </div>
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1">Phone <span class="text-red-500">*</span></label>
          <input id="opPhone" type="tel" placeholder="+254 700 000 000" class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500" />
        </div>
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1">Email <span class="text-gray-400 font-normal">(optional)</span></label>
          <input id="opEmail" type="email" placeholder="email@example.com" class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500" />
        </div>
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1">Role <span class="text-red-500">*</span></label>
          <select id="opRole" class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500">
            <option value="">-- Select Role --</option>
            <option>CEO</option>
            <option>Director</option>
            <option>Manager</option>
            <option>Mchungi</option>
            <option>Vet</option>
            <option>Accountant</option>
            <option>Viewer</option>
          </select>
        </div>
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1">Position Title <span class="text-gray-400 font-normal">(optional)</span></label>
          <input id="opTitle" type="text" placeholder="e.g. Head Mchungi, Farm Manager" class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500" />
        </div>
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1">Notes <span class="text-gray-400 font-normal">(optional)</span></label>
          <textarea id="opNotes" rows="2" placeholder="Any notes about this operator…" class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500 resize-none"></textarea>
        </div>

        <!-- PIN section (new operators only) -->
        <div id="pinSection">
          <div class="border-t border-gray-100 pt-3">
            <label class="block text-sm font-semibold text-gray-700 mb-1">Set PIN / Password <span class="text-red-500" id="pinRequired">*</span></label>
            <div class="relative">
              <input id="opPin" type="password" placeholder="Minimum 4 characters" class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500 pr-10" />
              <button type="button" onclick="togglePin('opPin',this)" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400"><i class="fas fa-eye"></i></button>
            </div>
            <p class="text-xs text-gray-400 mt-1" id="pinHint">Leave blank when editing to keep the current PIN.</p>
          </div>
        </div>
      </div>
      <button id="saveOpBtn" onclick="saveOperator()" class="mt-4 w-full py-3 rounded-xl font-bold text-white bg-emerald-600 hover:bg-emerald-700 text-sm">
        Save Operator
      </button>
    </div>
  </div>

  <!-- Reset PIN Modal -->
  <div id="resetModal" class="hidden fixed inset-0 z-50 flex items-end sm:items-center justify-center px-4" onclick="closeModal(event,'resetModal')">
    <div class="absolute inset-0 bg-black/50"></div>
    <div class="relative bg-white rounded-2xl shadow-xl w-full max-w-sm p-5" onclick="event.stopPropagation()">
      <h3 class="font-bold text-gray-800 mb-2">Reset Operator PIN</h3>
      <p class="text-xs text-gray-500 mb-3">A temporary PIN will be set. The operator must change it on first login.</p>
      <div id="resetAlert"></div>
      <input type="hidden" id="resetOpId" />
      <label class="block text-sm font-semibold text-gray-700 mb-1">New Temporary PIN</label>
      <div class="relative">
        <input id="resetPin" type="password" placeholder="New temporary PIN" class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500 pr-10" />
        <button type="button" onclick="togglePin('resetPin',this)" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400"><i class="fas fa-eye"></i></button>
      </div>
      <div class="flex gap-3 mt-4">
        <button onclick="closeModal(null,'resetModal')" class="flex-1 py-2.5 rounded-xl font-semibold text-gray-700 border border-gray-300 text-sm">Cancel</button>
        <button id="resetBtn" onclick="doResetPin()" class="flex-1 py-2.5 rounded-xl font-bold text-white bg-amber-600 hover:bg-amber-700 text-sm">Set Temp PIN</button>
      </div>
    </div>
  </div>

  <!-- Bottom Nav -->
  <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 z-40">
    <div class="max-w-5xl mx-auto flex items-center justify-around py-1">
      <a href="mengineyo-dashboard.html" class="flex flex-col items-center py-1 px-2 text-gray-500 hover:text-emerald-700"><i class="fas fa-home text-lg"></i><span class="text-xs mt-0.5">Home</span></a>
      <a href="mengineyo-animals.html" class="flex flex-col items-center py-1 px-2 text-gray-500 hover:text-emerald-700"><i class="fas fa-cow text-lg"></i><span class="text-xs mt-0.5">Animals</span></a>
      <a href="mengineyo-milk.html" class="flex flex-col items-center py-1 px-2 text-gray-500 hover:text-emerald-700"><i class="fas fa-tint text-lg"></i><span class="text-xs mt-0.5">Milk</span></a>
      <a href="mengineyo-finance.html" class="flex flex-col items-center py-1 px-2 text-gray-500 hover:text-emerald-700"><i class="fas fa-coins text-lg"></i><span class="text-xs mt-0.5">Finance</span></a>
      <a href="mengineyo-reports.html" class="flex flex-col items-center py-1 px-2 text-gray-500 hover:text-emerald-700"><i class="fas fa-chart-bar text-lg"></i><span class="text-xs mt-0.5">Reports</span></a>
      <a href="mengineyo-operators.html" class="flex flex-col items-center py-1 px-2 text-emerald-700"><i class="fas fa-users text-lg"></i><span class="text-xs mt-0.5 font-semibold">Operators</span></a>
    </div>
  </nav>

  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-storage-compat.js"></script>
  <script src="../firebase.js"></script>
  <script src="./mengineyo-core.js"></script>
  <script>
    const session = ME.requireRole(['Chair']);
    if (!session) throw new Error('Chair only');
    ME.renderHeader();

    const roleColors = { Chair:'bg-emerald-700 text-white', CEO:'bg-blue-600 text-white', Director:'bg-indigo-600 text-white', Manager:'bg-teal-600 text-white', Mchungi:'bg-amber-600 text-white', Vet:'bg-red-600 text-white', Accountant:'bg-purple-600 text-white', Viewer:'bg-gray-400 text-white' };

    function loadOperators() {
      ME.meRef(session.projectId, 'operators').on('value', snap => {
        const list = document.getElementById('operatorsList');
        if (!snap.exists()) { list.innerHTML = '<div class="text-center text-gray-400 text-sm py-8">No operators yet.</div>'; return; }
        const ops = [];
        snap.forEach(ch => ops.push({ id: ch.key, ...ch.val() }));
        list.innerHTML = ops.map(op => `
          <div class="bg-white rounded-xl border border-gray-100 shadow-sm p-4">
            <div class="flex items-start justify-between gap-2">
              <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-full bg-emerald-100 flex items-center justify-center text-emerald-700 font-bold text-sm flex-shrink-0">
                  ${op.fullName ? op.fullName[0].toUpperCase() : '?'}
                </div>
                <div>
                  <div class="font-bold text-gray-800 text-sm">${op.fullName || 'Unknown'}</div>
                  <div class="text-xs text-gray-500">${op.phone || ''} ${op.email ? '· ' + op.email : ''}</div>
                  ${op.positionTitle ? '<div class="text-xs text-gray-400 italic">' + op.positionTitle + '</div>' : ''}
                </div>
              </div>
              <div class="flex flex-col items-end gap-1">
                <span class="text-xs px-2 py-0.5 rounded-full font-semibold ${roleColors[op.role] || 'bg-gray-400 text-white'}">${op.role}</span>
                <span class="text-xs ${op.active !== false ? 'text-green-600' : 'text-red-500'}">${op.active !== false ? 'Active' : 'Inactive'}</span>
              </div>
            </div>
            ${op.role !== 'Chair' ? `
            <div class="flex gap-2 mt-3 flex-wrap">
              <button onclick="openEditModal('${op.id}')" class="text-xs bg-gray-100 hover:bg-gray-200 px-3 py-1.5 rounded-lg font-semibold text-gray-700"><i class="fas fa-edit mr-1"></i>Edit</button>
              <button onclick="openResetModal('${op.id}')" class="text-xs bg-amber-50 hover:bg-amber-100 px-3 py-1.5 rounded-lg font-semibold text-amber-700"><i class="fas fa-key mr-1"></i>Reset PIN</button>
              <button onclick="toggleActive('${op.id}', ${op.active !== false})" class="text-xs ${op.active !== false ? 'bg-red-50 hover:bg-red-100 text-red-700' : 'bg-green-50 hover:bg-green-100 text-green-700'} px-3 py-1.5 rounded-lg font-semibold">
                <i class="fas ${op.active !== false ? 'fa-ban' : 'fa-check'} mr-1"></i>${op.active !== false ? 'Deactivate' : 'Activate'}
              </button>
            </div>` : '<div class="text-xs text-gray-400 mt-2 italic">Chair — Full control. Cannot be deactivated here.</div>'}
          </div>`).join('');
      });
    }

    function openAddModal() {
      document.getElementById('editOpId').value = '';
      document.getElementById('opName').value = '';
      document.getElementById('opPhone').value = '';
      document.getElementById('opEmail').value = '';
      document.getElementById('opRole').value = '';
      document.getElementById('opTitle').value = '';
      document.getElementById('opNotes').value = '';
      document.getElementById('opPin').value = '';
      document.getElementById('modalTitle').textContent = 'Add Operator';
      document.getElementById('pinRequired').textContent = '*';
      document.getElementById('pinHint').textContent = 'A PIN is required for new operators.';
      document.getElementById('opModal').classList.remove('hidden');
    }

    function openEditModal(opId) {
      ME.meRef(session.projectId, 'operators/' + opId).once('value').then(snap => {
        if (!snap.exists()) return;
        const op = snap.val();
        document.getElementById('editOpId').value = opId;
        document.getElementById('opName').value  = op.fullName || '';
        document.getElementById('opPhone').value = op.phone || '';
        document.getElementById('opEmail').value = op.email || '';
        document.getElementById('opRole').value  = op.role || '';
        document.getElementById('opTitle').value = op.positionTitle || '';
        document.getElementById('opNotes').value = op.notes || '';
        document.getElementById('opPin').value   = '';
        document.getElementById('modalTitle').textContent = 'Edit Operator';
        document.getElementById('pinRequired').textContent = '';
        document.getElementById('pinHint').textContent = 'Leave blank to keep the current PIN.';
        document.getElementById('opModal').classList.remove('hidden');
      });
    }

    async function saveOperator() {
      const opId   = document.getElementById('editOpId').value;
      const name   = document.getElementById('opName').value.trim();
      const phone  = document.getElementById('opPhone').value.trim();
      const email  = document.getElementById('opEmail').value.trim();
      const role   = document.getElementById('opRole').value;
      const title  = document.getElementById('opTitle').value.trim();
      const notes  = document.getElementById('opNotes').value.trim();
      const pin    = document.getElementById('opPin').value;

      if (!name)  { ME.showAlert('Please enter the operator name.', 'error', 'modalAlert'); return; }
      if (!phone) { ME.showAlert('Please enter the phone number.', 'error', 'modalAlert'); return; }
      if (!role)  { ME.showAlert('Please select a role.', 'error', 'modalAlert'); return; }
      if (!opId && !pin) { ME.showAlert('Please set a PIN for the new operator.', 'error', 'modalAlert'); return; }
      if (pin && pin.length < 4) { ME.showAlert('PIN must be at least 4 characters.', 'error', 'modalAlert'); return; }

      ME.setBtnLoading('saveOpBtn', true);
      try {
        const data = {
          fullName: name, phone, email: email || null, role,
          positionTitle: title || null, notes: notes || null,
          ...ME.updateMeta(),
        };
        if (pin) {
          data.pinHash = await ME.hashPin(pin);
          data.temporaryPin = false;
        }

        if (opId) {
          await ME.meRef(session.projectId, 'operators/' + opId).update(data);
          await ME.audit('operator_edited', 'operator', opId, { name, role });
        } else {
          const ref = ME.meRef(session.projectId, 'operators').push();
          const newId = ref.key;
          await ref.set({ operatorId: newId, projectId: session.projectId, active: true, createdAt: ME.now(), createdAtISO: ME.isoNow(), ...data });
          await ME.audit('operator_added', 'operator', newId, { name, role });
        }
        ME.showAlert('Operator saved successfully.', 'success');
        closeModal(null, 'opModal');
      } catch(e) {
        ME.showAlert('Save failed: ' + e.message, 'error', 'modalAlert');
      }
      ME.setBtnLoading('saveOpBtn', false);
    }

    async function toggleActive(opId, currentlyActive) {
      if (currentlyActive && !confirm('Deactivate this operator? They will not be able to login.')) return;
      await ME.meRef(session.projectId, 'operators/' + opId).update({ active: !currentlyActive, ...ME.updateMeta() });
      await ME.audit(currentlyActive ? 'operator_deactivated' : 'operator_activated', 'operator', opId);
    }

    function openResetModal(opId) {
      document.getElementById('resetOpId').value = opId;
      document.getElementById('resetPin').value = '';
      document.getElementById('resetModal').classList.remove('hidden');
    }

    async function doResetPin() {
      const opId = document.getElementById('resetOpId').value;
      const pin  = document.getElementById('resetPin').value;
      if (pin.length < 4) { ME.showAlert('Temporary PIN must be at least 4 characters.', 'error', 'resetAlert'); return; }
      ME.setBtnLoading('resetBtn', true);
      try {
        const tmpHash = await ME.hashPin(pin);
        await ME.meRef(session.projectId, 'operators/' + opId).update({
          temporaryPinHash: tmpHash,
          temporaryPin: true,
          pinHash: null,
          ...ME.updateMeta(),
        });
        await ME.audit('pin_reset', 'operator', opId);
        ME.showAlert('Temporary PIN set. Operator must change it on next login.', 'success', 'resetAlert');
        setTimeout(() => closeModal(null, 'resetModal'), 1800);
      } catch(e) {
        ME.showAlert('Reset failed: ' + e.message, 'error', 'resetAlert');
      }
      ME.setBtnLoading('resetBtn', false);
    }

    function togglePin(inputId, btn) {
      const inp = document.getElementById(inputId);
      if (inp.type === 'password') { inp.type = 'text'; btn.innerHTML = '<i class="fas fa-eye-slash"></i>'; }
      else { inp.type = 'password'; btn.innerHTML = '<i class="fas fa-eye"></i>'; }
    }

    function closeModal(evt, id) {
      if (evt && evt.target !== document.getElementById(id)) return;
      document.getElementById(id).classList.add('hidden');
    }

    loadOperators();
  </script>
</body>
</html>
