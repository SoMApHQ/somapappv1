<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MENGINEYO — Reports</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
</head>
<body class="min-h-screen bg-gray-50 pb-28">

  <header class="bg-emerald-700 text-white px-4 py-3">
    <div class="max-w-4xl mx-auto flex items-center justify-between">
      <div class="flex items-center gap-2">
        <a href="mengineyo-dashboard.html" class="text-emerald-200 hover:text-white"><i class="fas fa-arrow-left"></i></a>
        <div>
          <div class="font-bold text-base">Reports</div>
          <div class="text-xs text-emerald-200" id="meProjectName"></div>
        </div>
      </div>
      <span class="text-xs text-emerald-200" id="meOperatorInfo"></span>
    </div>
  </header>

  <div class="max-w-4xl mx-auto px-4 py-4">
    <div id="meAlert"></div>

    <!-- Report selector -->
    <div class="grid grid-cols-2 sm:grid-cols-4 gap-3 mb-5">
      <button onclick="showReport('milk-daily')" class="report-btn flex flex-col items-center gap-1 bg-white border border-gray-200 rounded-xl p-3 hover:border-blue-400 hover:bg-blue-50 text-center text-xs font-semibold text-gray-700">
        <i class="fas fa-tint text-blue-500 text-xl"></i>Daily Milk
      </button>
      <button onclick="showReport('milk-monthly')" class="report-btn flex flex-col items-center gap-1 bg-white border border-gray-200 rounded-xl p-3 hover:border-blue-400 hover:bg-blue-50 text-center text-xs font-semibold text-gray-700">
        <i class="fas fa-calendar text-blue-600 text-xl"></i>Monthly Milk
      </button>
      <button onclick="showReport('animal-stock')" class="report-btn flex flex-col items-center gap-1 bg-white border border-gray-200 rounded-xl p-3 hover:border-emerald-400 hover:bg-emerald-50 text-center text-xs font-semibold text-gray-700">
        <i class="fas fa-cow text-emerald-600 text-xl"></i>Animal Stock
      </button>
      <button onclick="showReport('pregnancy')" class="report-btn flex flex-col items-center gap-1 bg-white border border-gray-200 rounded-xl p-3 hover:border-pink-400 hover:bg-pink-50 text-center text-xs font-semibold text-gray-700">
        <i class="fas fa-baby text-pink-500 text-xl"></i>Pregnancy
      </button>
      <button onclick="showReport('births')" class="report-btn flex flex-col items-center gap-1 bg-white border border-gray-200 rounded-xl p-3 hover:border-pink-400 hover:bg-pink-50 text-center text-xs font-semibold text-gray-700">
        <i class="fas fa-baby-carriage text-pink-600 text-xl"></i>Birth Report
      </button>
      <button onclick="showReport('health')" class="report-btn flex flex-col items-center gap-1 bg-white border border-gray-200 rounded-xl p-3 hover:border-red-400 hover:bg-red-50 text-center text-xs font-semibold text-gray-700">
        <i class="fas fa-stethoscope text-red-500 text-xl"></i>Health
      </button>
      <button onclick="showReport('finance')" class="report-btn flex flex-col items-center gap-1 bg-white border border-gray-200 rounded-xl p-3 hover:border-amber-400 hover:bg-amber-50 text-center text-xs font-semibold text-gray-700">
        <i class="fas fa-coins text-amber-500 text-xl"></i>Finance
      </button>
      <button onclick="showReport('missing')" class="report-btn flex flex-col items-center gap-1 bg-white border border-gray-200 rounded-xl p-3 hover:border-orange-400 hover:bg-orange-50 text-center text-xs font-semibold text-gray-700">
        <i class="fas fa-exclamation-triangle text-orange-500 text-xl"></i>Missing Records
      </button>
    </div>

    <!-- Date range filter (shown per report) -->
    <div id="dateFilter" class="hidden flex gap-3 items-center mb-4 flex-wrap">
      <div class="flex items-center gap-2 flex-1">
        <label class="text-xs font-semibold text-gray-600 whitespace-nowrap">From:</label>
        <input id="dateFrom" type="date" class="border border-gray-300 rounded-lg px-3 py-2 text-sm flex-1 focus:ring-2 focus:ring-emerald-500 focus:outline-none" />
      </div>
      <div class="flex items-center gap-2 flex-1">
        <label class="text-xs font-semibold text-gray-600 whitespace-nowrap">To:</label>
        <input id="dateTo" type="date" class="border border-gray-300 rounded-lg px-3 py-2 text-sm flex-1 focus:ring-2 focus:ring-emerald-500 focus:outline-none" />
      </div>
      <button onclick="runReport()" class="bg-emerald-600 text-white text-sm px-4 py-2 rounded-lg hover:bg-emerald-700 font-semibold whitespace-nowrap">
        <i class="fas fa-search mr-1"></i>Run Report
      </button>
      <button onclick="exportCSV()" class="bg-gray-100 text-gray-700 text-sm px-4 py-2 rounded-lg hover:bg-gray-200 font-semibold whitespace-nowrap">
        <i class="fas fa-download mr-1"></i>Export CSV
      </button>
    </div>

    <!-- Month filter (for monthly reports) -->
    <div id="monthFilter" class="hidden flex gap-3 items-center mb-4 flex-wrap">
      <div class="flex items-center gap-2 flex-1">
        <label class="text-xs font-semibold text-gray-600 whitespace-nowrap">Month:</label>
        <input id="reportMonth" type="month" class="border border-gray-300 rounded-lg px-3 py-2 text-sm flex-1 focus:ring-2 focus:ring-emerald-500 focus:outline-none" />
      </div>
      <button onclick="runReport()" class="bg-emerald-600 text-white text-sm px-4 py-2 rounded-lg hover:bg-emerald-700 font-semibold whitespace-nowrap">
        <i class="fas fa-search mr-1"></i>Run Report
      </button>
      <button onclick="exportCSV()" class="bg-gray-100 text-gray-700 text-sm px-4 py-2 rounded-lg hover:bg-gray-200 font-semibold whitespace-nowrap">
        <i class="fas fa-download mr-1"></i>Export CSV
      </button>
    </div>

    <!-- Report output -->
    <div id="reportTitle" class="hidden font-bold text-gray-800 text-lg mb-3"></div>
    <div id="reportContent"></div>
  </div>

  <!-- Bottom Nav -->
  <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 z-40">
    <div class="max-w-5xl mx-auto flex items-center justify-around py-1">
      <a href="mengineyo-dashboard.html" class="flex flex-col items-center py-1 px-2 text-gray-500 hover:text-emerald-700"><i class="fas fa-home text-lg"></i><span class="text-xs mt-0.5">Home</span></a>
      <a href="mengineyo-animals.html" class="flex flex-col items-center py-1 px-2 text-gray-500 hover:text-emerald-700"><i class="fas fa-cow text-lg"></i><span class="text-xs mt-0.5">Animals</span></a>
      <a href="mengineyo-milk.html" class="flex flex-col items-center py-1 px-2 text-gray-500 hover:text-emerald-700"><i class="fas fa-tint text-lg"></i><span class="text-xs mt-0.5">Milk</span></a>
      <a href="mengineyo-finance.html" class="flex flex-col items-center py-1 px-2 text-gray-500 hover:text-emerald-700"><i class="fas fa-coins text-lg"></i><span class="text-xs mt-0.5">Finance</span></a>
      <a href="mengineyo-reports.html" class="flex flex-col items-center py-1 px-2 text-emerald-700"><i class="fas fa-chart-bar text-lg"></i><span class="text-xs mt-0.5 font-semibold">Reports</span></a>
      <a href="mengineyo-births.html" class="flex flex-col items-center py-1 px-2 text-gray-500 hover:text-emerald-700"><i class="fas fa-baby text-lg"></i><span class="text-xs mt-0.5">Births</span></a>
    </div>
  </nav>

  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-storage-compat.js"></script>
  <script src="../firebase.js"></script>
  <script src="./mengineyo-core.js"></script>
  <script>
    const session = ME.requireAuth();
    ME.renderHeader();
    const sym = session.currencySymbol || 'KSh';
    let currentReport = null;
    let reportData    = [];

    function normalizeSpeciesLocal(value) {
      if (ME.normalizeSpecies) return ME.normalizeSpecies(value);
      const key = String(value || '').trim().toLowerCase();
      if (['cattle','cow','cows'].includes(key)) return 'Cattle';
      if (['goat','goats'].includes(key)) return 'Goat';
      if (key === 'sheep') return 'Sheep';
      if (['chicken','chickens'].includes(key)) return 'Chicken';
      if (['pig','pigs'].includes(key)) return 'Pig';
      return value || 'Other';
    }

    function normalizeStatusLocal(value) {
      const key = String(value || 'active').trim().toLowerCase();
      return ['active','sold','dead','missing','transferred','deleted'].includes(key) ? key : 'active';
    }

    function animalsFromSnapshot(snap) {
      if (ME.snapshotToAnimals) return ME.snapshotToAnimals(snap);
      const animals = [];
      snap.forEach(ch => {
        const value = ch.val() || {};
        if (value.species || value.animalId || value.name || value.sex || value.status) {
          animals.push({ id: ch.key, ...value, species: normalizeSpeciesLocal(value.species), status: normalizeStatusLocal(value.status) });
          return;
        }
        Object.keys(value).forEach(nestedKey => {
          const nested = value[nestedKey];
          if (nested && typeof nested === 'object') {
            animals.push({ id: nestedKey, species: normalizeSpeciesLocal(ch.key), ...nested, status: normalizeStatusLocal(nested.status) });
          }
        });
      });
      return animals;
    }

    // Set defaults
    const now = new Date();
    const monthStr = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0');
    const firstDay = monthStr + '-01';
    const lastDay  = monthStr + '-' + String(new Date(now.getFullYear(), now.getMonth()+1, 0).getDate()).padStart(2,'0');
    document.getElementById('dateFrom').value   = firstDay;
    document.getElementById('dateTo').value     = lastDay;
    document.getElementById('reportMonth').value = monthStr;

    function showReport(type) {
      currentReport = type;
      const df = document.getElementById('dateFilter');
      const mf = document.getElementById('monthFilter');
      df.classList.add('hidden'); mf.classList.add('hidden');
      if (['milk-daily','births','health','finance','missing'].includes(type)) df.classList.remove('hidden');
      else mf.classList.remove('hidden');
      document.getElementById('reportContent').innerHTML = '<div class="text-center text-gray-400 text-sm py-4">Select filters and click Run Report.</div>';
      document.getElementById('reportTitle').classList.remove('hidden');
      const titles = { 'milk-daily':'Daily Milk Report','milk-monthly':'Monthly Milk Report','animal-stock':'Animal Stock Report','pregnancy':'Pregnancy Report','births':'Birth Report','health':'Health Report','finance':'Finance Report','missing':'Missing Records Report' };
      document.getElementById('reportTitle').textContent = titles[type] || type;
    }

    async function runReport() {
      const from  = document.getElementById('dateFrom').value;
      const to    = document.getElementById('dateTo').value;
      const month = document.getElementById('reportMonth').value;
      document.getElementById('reportContent').innerHTML = '<div class="text-center text-emerald-600 text-sm py-4"><i class="fas fa-spinner fa-spin mr-2"></i>Loading…</div>';

      try {
        switch(currentReport) {
          case 'milk-daily':   await reportMilkDaily(from, to); break;
          case 'milk-monthly': await reportMilkMonthly(month); break;
          case 'animal-stock': await reportAnimalStock(month); break;
          case 'pregnancy':    await reportPregnancy(month); break;
          case 'births':       await reportBirths(from, to); break;
          case 'health':       await reportHealth(from, to); break;
          case 'finance':      await reportFinance(from, to); break;
          case 'missing':      await reportMissing(from, to); break;
          default: document.getElementById('reportContent').innerHTML = '<div class="text-red-500 text-sm py-4">Unknown report type.</div>';
        }
      } catch(e) {
        document.getElementById('reportContent').innerHTML = '<div class="text-red-500 text-sm py-4">Error loading report: ' + e.message + '</div>';
      }
    }

    function table(headers, rows) {
      if (!rows.length) return '<div class="text-center text-gray-400 text-sm py-6">No data found for this period.</div>';
      const headerHtml = headers.map(h => `<th class="text-left text-xs font-semibold text-gray-600 px-3 py-2 whitespace-nowrap">${h}</th>`).join('');
      const rowsHtml   = rows.map((row, i) => `<tr class="${i%2===0?'bg-white':'bg-gray-50'}">${row.map(cell => `<td class="px-3 py-2 text-xs text-gray-700 whitespace-nowrap">${cell===null||cell===undefined?'-':cell}</td>`).join('')}</tr>`).join('');
      return `<div class="overflow-x-auto"><table class="w-full border border-gray-200 rounded-xl overflow-hidden text-sm"><thead class="bg-gray-100"><tr>${headerHtml}</tr></thead><tbody>${rowsHtml}</tbody></table></div>`;
    }

    async function reportMilkDaily(from, to) {
      const snap = await ME.meRef(session.projectId, 'milkRecords').orderByChild('date').startAt(from).endAt(to).once('value');
      reportData = [];
      snap.forEach(ch => reportData.push(ch.val()));
      reportData.sort((a,b) => (a.date||'').localeCompare(b.date||''));
      let totalL = 0, totalSold = 0, totalHome = 0, totalInc = 0;
      const rows = reportData.map(r => {
        totalL    += r.totalLitres||0; totalSold += r.litresSold||0;
        totalHome += r.litresHome||0;  totalInc  += r.totalIncome||0;
        return [r.date||'-', r.animalName||'-', (r.totalLitres||0).toFixed(1)+' L', (r.litresHome||0).toFixed(1)+' L', (r.litresSold||0).toFixed(1)+' L', sym+' '+(r.totalIncome||0).toFixed(2), r.confirmStatus||'Draft', r.createdByName||'-'];
      });
      rows.push(['TOTAL','',totalL.toFixed(1)+' L',totalHome.toFixed(1)+' L',totalSold.toFixed(1)+' L',sym+' '+totalInc.toFixed(2),'','']);
      document.getElementById('reportContent').innerHTML =
        `<div class="grid grid-cols-4 gap-3 mb-4">${[['Total Litres',totalL.toFixed(1)+' L','blue'],['Sold',totalSold.toFixed(1)+' L','green'],['Home',totalHome.toFixed(1)+' L','amber'],['Income',sym+' '+totalInc.toFixed(2),'emerald']].map(([l,v,c])=>`<div class="bg-${c}-50 rounded-xl p-3 text-center"><div class="font-bold text-${c}-700">${v}</div><div class="text-xs text-gray-500">${l}</div></div>`).join('')}</div>` +
        table(['Date','Animal','Total','Home','Sold','Income','Status','By'], rows);
    }

    async function reportMilkMonthly(month) {
      const snap = await ME.meRef(session.projectId, 'milkRecords').orderByChild('date').startAt(month+'-01').endAt(month+'-31').once('value');
      const byAnimal = {};
      snap.forEach(ch => {
        const r = ch.val();
        if (!byAnimal[r.animalId]) byAnimal[r.animalId] = { name: r.animalName||r.animalId, total:0, sold:0, home:0, income:0, days:0 };
        byAnimal[r.animalId].total  += r.totalLitres||0;
        byAnimal[r.animalId].sold   += r.litresSold||0;
        byAnimal[r.animalId].home   += r.litresHome||0;
        byAnimal[r.animalId].income += r.totalIncome||0;
        byAnimal[r.animalId].days++;
      });
      reportData = Object.values(byAnimal);
      const rows = reportData.map(a => [a.name, a.total.toFixed(1)+' L', a.home.toFixed(1)+' L', a.sold.toFixed(1)+' L', sym+' '+a.income.toFixed(2), a.days+' days', a.days>0?(a.total/a.days).toFixed(1)+' L/day':'-']);
      document.getElementById('reportContent').innerHTML = table(['Animal','Total Litres','Home','Sold','Income','Days Recorded','Avg/Day'], rows);
    }

    async function reportAnimalStock(month) {
      const snap = await ME.meRef(session.projectId, 'animals').once('value');
      const all = animalsFromSnapshot(snap);
      const rows = all.map(a => [a.animalId||a.id, a.name||'-', a.species||'-', a.sex||'-', a.breed||'-', a.pregnancyStatus||'-', a.milkStatus||'-', a.status||'-', ME.fmtDate(a.dateAcquired||a.createdAt)]);
      const active = all.filter(a=>a.status==='active').length;
      const sold   = all.filter(a=>a.status==='sold').length;
      const dead   = all.filter(a=>['dead','missing'].includes(a.status)).length;
      document.getElementById('reportContent').innerHTML =
        `<div class="grid grid-cols-4 gap-3 mb-4">${[['Active',active,'emerald'],['Sold',sold,'amber'],['Dead/Missing',dead,'red'],['Total',all.length,'gray']].map(([l,v,c])=>`<div class="bg-${c}-50 rounded-xl p-3 text-center"><div class="font-bold text-${c}-700">${v}</div><div class="text-xs text-gray-500">${l}</div></div>`).join('')}</div>` +
        table(['Animal ID','Name','Species','Sex','Breed','Pregnancy','Milk','Status','Date Acquired'], rows);
    }

    async function reportPregnancy(month) {
      const snap = await ME.meRef(session.projectId, 'animals').once('value');
      const rows = [];
      animalsFromSnapshot(snap).forEach(a => {
        if (['Suspected pregnant','Confirmed pregnant'].includes(a.pregnancyStatus)) {
          rows.push([a.name||a.animalId||a.id, a.species||'-', a.pregnancyStatus, a.expectedBirthDate||'-', a.status||'-']);
        }
      });
      document.getElementById('reportContent').innerHTML =
        `<div class="font-semibold text-gray-700 mb-3">${rows.length} pregnant animal(s)</div>` +
        table(['Animal','Species','Status','Expected Birth','Current Status'], rows);
    }

    async function reportBirths(from, to) {
      const snap = await ME.meRef(session.projectId, 'birthRecords').orderByChild('date').startAt(from).endAt(to).once('value');
      reportData = [];
      snap.forEach(ch => reportData.push(ch.val()));
      const rows = reportData.map(r => [r.date||'-', r.motherName||'-', r.species||'-', r.numberBorn||'-', r.aliveStatus||'-', r.sex||'-', r.healthCondition||'-', r.confirmStatus||'Draft']);
      document.getElementById('reportContent').innerHTML = table(['Date','Mother','Species','Born','Alive/Dead','Sex','Health','Status'], rows);
    }

    async function reportHealth(from, to) {
      const snap = await ME.meRef(session.projectId, 'healthRecords').orderByChild('date').startAt(from).endAt(to).once('value');
      reportData = [];
      snap.forEach(ch => reportData.push(ch.val()));
      let totalCost = 0;
      const rows = reportData.map(r => { totalCost += parseFloat(r.cost||0); return [r.date||'-', r.animalName||'-', r.type||'-', r.medicine||'-', sym+' '+(r.cost||0).toFixed(2), r.recoveryStatus||'-', r.nextVisitDate||'-']; });
      document.getElementById('reportContent').innerHTML =
        `<div class="mb-3 font-semibold text-gray-700">Total vet/medicine cost: ${sym} ${totalCost.toFixed(2)}</div>` +
        table(['Date','Animal','Type','Medicine','Cost','Recovery','Next Visit'], rows);
    }

    async function reportFinance(from, to) {
      const snap = await ME.meRef(session.projectId, 'financeRecords').orderByChild('date').startAt(from).endAt(to).once('value');
      reportData = [];
      snap.forEach(ch => reportData.push(ch.val()));
      let income = 0, expense = 0;
      const rows = reportData.map(r => {
        if (r.type==='Income') income += parseFloat(r.amount||0);
        else expense += parseFloat(r.amount||0);
        return [r.date||'-', r.type||'-', r.category||'-', sym+' '+parseFloat(r.amount||0).toFixed(2), r.paymentStatus||'-', r.description||'-', r.createdByName||'-'];
      });
      document.getElementById('reportContent').innerHTML =
        `<div class="grid grid-cols-3 gap-3 mb-4">${[['Income',sym+' '+income.toFixed(2),'green'],['Expenses',sym+' '+expense.toFixed(2),'red'],['Net',sym+' '+Math.abs(income-expense).toFixed(2),income>=expense?'emerald':'red']].map(([l,v,c])=>`<div class="bg-${c}-50 rounded-xl p-3 text-center"><div class="font-bold text-${c}-700">${v}</div><div class="text-xs text-gray-500">${l}</div></div>`).join('')}</div>` +
        table(['Date','Type','Category','Amount','Status','Description','By'], rows);
    }

    async function reportMissing(from, to) {
      // Check for days without milk records (within range, count distinct dates)
      const milkSnap = await ME.meRef(session.projectId, 'milkRecords').orderByChild('date').startAt(from).endAt(to).once('value');
      const milkDates = new Set();
      milkSnap.forEach(ch => milkDates.add(ch.val().date));

      // Calculate missing days
      const start = new Date(from), end = new Date(to);
      const allDays = [];
      for (let d = new Date(start); d <= end; d.setDate(d.getDate()+1)) {
        allDays.push(d.toISOString().split('T')[0]);
      }
      const missingDays = allDays.filter(d => !milkDates.has(d));

      // Unconfirmed milk records
      let unconfirmed = 0;
      milkSnap.forEach(ch => { if ((ch.val().confirmStatus||'Draft') === 'Draft') unconfirmed++; });

      // Animals without photos
      const animalSnap = await ME.meRef(session.projectId, 'animals').once('value');
      let noPhoto = 0, noPurchasePrice = 0, noSource = 0;
      animalsFromSnapshot(animalSnap).forEach(a => {
        if (a.status === 'active') {
          if (!a.photoUrl) noPhoto++;
          if (!a.purchasePrice && a.acquiredBy === 'Bought') noPurchasePrice++;
          if (!a.seller && !a.motherID && a.acquiredBy !== 'Born in project') noSource++;
        }
      });

      document.getElementById('reportContent').innerHTML = `
        <div class="space-y-4">
          <div class="bg-orange-50 border border-orange-200 rounded-xl p-4">
            <div class="font-bold text-orange-700 mb-2"><i class="fas fa-calendar-times mr-1"></i>Days Without Milk Records (${missingDays.length})</div>
            ${missingDays.length ? `<div class="text-xs text-orange-600 flex flex-wrap gap-1">${missingDays.map(d=>`<span class="bg-orange-100 rounded px-1.5 py-0.5">${d}</span>`).join('')}</div>` : '<div class="text-xs text-green-600">All days have milk records!</div>'}
          </div>
          <div class="bg-amber-50 border border-amber-200 rounded-xl p-4">
            <div class="font-bold text-amber-700 mb-1"><i class="fas fa-exclamation-circle mr-1"></i>Unconfirmed Milk Records</div>
            <div class="text-2xl font-bold text-amber-800">${unconfirmed}</div>
            <div class="text-xs text-amber-600">records not yet confirmed by Manager</div>
          </div>
          <div class="bg-blue-50 border border-blue-200 rounded-xl p-4">
            <div class="font-bold text-blue-700 mb-2"><i class="fas fa-info-circle mr-1"></i>Animal Record Completeness</div>
            <div class="grid grid-cols-3 gap-3 text-center text-xs">
              <div><div class="text-xl font-bold text-red-600">${noPhoto}</div><div class="text-gray-500">No Photo</div></div>
              <div><div class="text-xl font-bold text-amber-600">${noPurchasePrice}</div><div class="text-gray-500">No Purchase Price</div></div>
              <div><div class="text-xl font-bold text-orange-600">${noSource}</div><div class="text-gray-500">No Source/Seller</div></div>
            </div>
          </div>
        </div>`;
    }

    function exportCSV() {
      if (!reportData || !reportData.length) { ME.showAlert('No data to export. Run a report first.', 'warning'); return; }
      const headers = Object.keys(reportData[0]);
      const rows = reportData.map(r => headers.map(h => '"' + String(r[h]||'').replace(/"/g,'""') + '"').join(','));
      const csv  = [headers.join(','), ...rows].join('\n');
      const blob = new Blob([csv], { type:'text/csv' });
      const a    = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = (currentReport||'report') + '-' + ME.todayStr() + '.csv';
      a.click();
    }
  </script>
</body>
</html>
