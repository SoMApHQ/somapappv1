<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MENGINEYO — Animals</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
</head>
<body class="min-h-screen bg-gray-50 pb-28">

  <!-- Header -->
  <header class="bg-emerald-700 text-white px-4 py-3">
    <div class="max-w-4xl mx-auto flex items-center justify-between">
      <div class="flex items-center gap-2">
        <a href="mengineyo-dashboard.html" class="text-emerald-200 hover:text-white"><i class="fas fa-arrow-left"></i></a>
        <div>
          <div class="font-bold text-base">Animal Registry</div>
          <div class="text-xs text-emerald-200" id="meProjectName"></div>
        </div>
      </div>
      <span class="text-xs text-emerald-200" id="meOperatorInfo"></span>
    </div>
  </header>

  <div class="max-w-4xl mx-auto px-4 py-4">
    <div id="meAlert"></div>

    <!-- Filters + Add button -->
    <div class="flex flex-col sm:flex-row gap-3 mb-4">
      <div class="flex gap-2 flex-1 flex-wrap">
        <select id="filterSpecies" onchange="applyFilters()" class="border border-gray-300 rounded-lg px-3 py-2 text-sm flex-1 min-w-28">
          <option value="">All Species</option>
          <option>Cattle</option><option>Goat</option><option>Sheep</option><option>Chicken</option><option>Pig</option><option>Other</option>
        </select>
        <select id="filterStatus" onchange="applyFilters()" class="border border-gray-300 rounded-lg px-3 py-2 text-sm flex-1 min-w-28">
          <option value="">All Status</option>
          <option value="active">Active</option><option value="sold">Sold</option><option value="dead">Dead</option><option value="missing">Missing</option>
        </select>
      </div>
      <button id="addAnimalBtn" onclick="openAddModal()" class="bg-emerald-600 text-white text-sm px-4 py-2 rounded-lg hover:bg-emerald-700 font-semibold whitespace-nowrap">
        <i class="fas fa-plus mr-1"></i>Add Animal
      </button>
    </div>

    <!-- Stats bar -->
    <div id="statsBar" class="flex gap-3 mb-4 overflow-x-auto pb-1"></div>

    <!-- Animals grid -->
    <div id="animalsList" class="grid grid-cols-1 sm:grid-cols-2 gap-3">
      <div class="col-span-full text-center text-gray-400 text-sm py-8">Loading animals…</div>
    </div>
  </div>

  <!-- Add/Edit Animal Modal -->
  <div id="animalModal" class="hidden fixed inset-0 z-50 flex items-end sm:items-center justify-center px-4 py-6" onclick="closeModal(event,'animalModal')">
    <div class="absolute inset-0 bg-black/50"></div>
    <div class="relative bg-white rounded-2xl shadow-xl w-full max-w-lg p-5 max-h-[90vh] overflow-y-auto" onclick="event.stopPropagation()">
      <div class="flex items-center justify-between mb-4">
        <h3 class="font-bold text-gray-800" id="animalModalTitle">Add Animal</h3>
        <button onclick="closeModal(null,'animalModal')" class="text-gray-400 hover:text-gray-700"><i class="fas fa-times"></i></button>
      </div>
      <div id="animalModalAlert"></div>
      <input type="hidden" id="editAnimalId" />
      <div class="space-y-3">
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-xs font-semibold text-gray-600 mb-1">Species <span class="text-red-500">*</span></label>
            <select id="aSpecies" class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:ring-2 focus:ring-emerald-500 focus:outline-none">
              <option value="">Select…</option>
              <option>Cattle</option><option>Goat</option><option>Sheep</option><option>Chicken</option><option>Pig</option><option>Other</option>
            </select>
          </div>
          <div>
            <label class="block text-xs font-semibold text-gray-600 mb-1">Sex <span class="text-red-500">*</span></label>
            <select id="aSex" class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:ring-2 focus:ring-emerald-500 focus:outline-none">
              <option value="">Select…</option>
              <option>Female</option><option>Male</option><option>Unknown</option>
            </select>
          </div>
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-xs font-semibold text-gray-600 mb-1">Name / Tag Number</label>
            <input id="aName" type="text" placeholder="e.g. Cow 001 or Msomi" class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:ring-2 focus:ring-emerald-500 focus:outline-none" />
          </div>
          <div>
            <label class="block text-xs font-semibold text-gray-600 mb-1">Breed</label>
            <input id="aBreed" type="text" placeholder="e.g. Friesian, Boran" class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:ring-2 focus:ring-emerald-500 focus:outline-none" />
          </div>
        </div>
        <div>
          <label class="block text-xs font-semibold text-gray-600 mb-1">Color / Description</label>
          <input id="aColor" type="text" placeholder="e.g. Black and white, Brown" class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:ring-2 focus:ring-emerald-500 focus:outline-none" />
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-xs font-semibold text-gray-600 mb-1">How Acquired <span class="text-red-500">*</span></label>
            <select id="aAcquiredBy" class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:ring-2 focus:ring-emerald-500 focus:outline-none">
              <option value="">Select…</option>
              <option>Bought</option><option>Born in project</option><option>Gifted</option><option>Transferred</option><option>Other</option>
            </select>
          </div>
          <div>
            <label class="block text-xs font-semibold text-gray-600 mb-1">Date Acquired</label>
            <input id="aDateAcquired" type="date" class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:ring-2 focus:ring-emerald-500 focus:outline-none" />
          </div>
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-xs font-semibold text-gray-600 mb-1">Date of Birth</label>
            <input id="aDOB" type="date" class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:ring-2 focus:ring-emerald-500 focus:outline-none" />
          </div>
          <div>
            <label class="block text-xs font-semibold text-gray-600 mb-1">Estimated Age</label>
            <input id="aAge" type="text" placeholder="e.g. 2 years" class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:ring-2 focus:ring-emerald-500 focus:outline-none" />
          </div>
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-xs font-semibold text-gray-600 mb-1">Purchase Price</label>
            <input id="aPurchasePrice" type="number" min="0" step="0.01" placeholder="0.00" class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:ring-2 focus:ring-emerald-500 focus:outline-none" />
          </div>
          <div>
            <label class="block text-xs font-semibold text-gray-600 mb-1">Transport Cost</label>
            <input id="aTransportCost" type="number" min="0" step="0.01" placeholder="0.00" class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:ring-2 focus:ring-emerald-500 focus:outline-none" />
          </div>
        </div>
        <div>
          <label class="block text-xs font-semibold text-gray-600 mb-1">Seller / Source</label>
          <input id="aSeller" type="text" placeholder="Name of seller or source" class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:ring-2 focus:ring-emerald-500 focus:outline-none" />
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-xs font-semibold text-gray-600 mb-1">Mother Animal ID</label>
            <input id="aMotherID" type="text" placeholder="Mother's animal ID" class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:ring-2 focus:ring-emerald-500 focus:outline-none" />
          </div>
          <div>
            <label class="block text-xs font-semibold text-gray-600 mb-1">Father Animal ID</label>
            <input id="aFatherID" type="text" placeholder="Father's animal ID" class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:ring-2 focus:ring-emerald-500 focus:outline-none" />
          </div>
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-xs font-semibold text-gray-600 mb-1">Pregnancy Status</label>
            <select id="aPregnancy" class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:ring-2 focus:ring-emerald-500 focus:outline-none">
              <option value="">Select…</option>
              <option>Not pregnant</option><option>Suspected pregnant</option><option>Confirmed pregnant</option><option>Recently gave birth</option><option>Not applicable</option>
            </select>
          </div>
          <div>
            <label class="block text-xs font-semibold text-gray-600 mb-1">Expected Birth Date</label>
            <input id="aExpectedBirth" type="date" class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:ring-2 focus:ring-emerald-500 focus:outline-none" />
          </div>
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-xs font-semibold text-gray-600 mb-1">Milk Status</label>
            <select id="aMilkStatus" class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:ring-2 focus:ring-emerald-500 focus:outline-none">
              <option value="">Select…</option>
              <option>Lactating</option><option>Dry</option><option>Not applicable</option>
            </select>
          </div>
          <div>
            <label class="block text-xs font-semibold text-gray-600 mb-1">Current Status</label>
            <select id="aStatus" class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:ring-2 focus:ring-emerald-500 focus:outline-none">
              <option value="active">Active</option><option value="sold">Sold</option><option value="dead">Dead</option><option value="missing">Missing</option><option value="transferred">Transferred</option>
            </select>
          </div>
        </div>
        <div>
          <label class="block text-xs font-semibold text-gray-600 mb-1">Photo <span class="text-gray-400 font-normal">(optional)</span></label>
          <input id="aPhoto" type="file" accept="image/*" class="w-full text-sm text-gray-500 file:mr-3 file:py-2 file:px-4 file:rounded-lg file:border-0 file:font-semibold file:bg-emerald-50 file:text-emerald-700 hover:file:bg-emerald-100" />
        </div>
        <div>
          <label class="block text-xs font-semibold text-gray-600 mb-1">Notes</label>
          <textarea id="aNotes" rows="2" placeholder="Any notes about this animal…" class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:ring-2 focus:ring-emerald-500 focus:outline-none resize-none"></textarea>
        </div>
      </div>
      <button id="saveAnimalBtn" onclick="saveAnimal()" class="mt-4 w-full py-3 rounded-xl font-bold text-white bg-emerald-600 hover:bg-emerald-700 text-sm">
        Save Animal
      </button>
    </div>
  </div>

  <!-- Bottom Nav -->
  <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 z-40">
    <div class="max-w-5xl mx-auto flex items-center justify-around py-1">
      <a href="mengineyo-dashboard.html" class="flex flex-col items-center py-1 px-2 text-gray-500 hover:text-emerald-700"><i class="fas fa-home text-lg"></i><span class="text-xs mt-0.5">Home</span></a>
      <a href="mengineyo-animals.html" class="flex flex-col items-center py-1 px-2 text-emerald-700"><i class="fas fa-cow text-lg"></i><span class="text-xs mt-0.5 font-semibold">Animals</span></a>
      <a href="mengineyo-milk.html" class="flex flex-col items-center py-1 px-2 text-gray-500 hover:text-emerald-700"><i class="fas fa-tint text-lg"></i><span class="text-xs mt-0.5">Milk</span></a>
      <a href="mengineyo-finance.html" class="flex flex-col items-center py-1 px-2 text-gray-500 hover:text-emerald-700"><i class="fas fa-coins text-lg"></i><span class="text-xs mt-0.5">Finance</span></a>
      <a href="mengineyo-reports.html" class="flex flex-col items-center py-1 px-2 text-gray-500 hover:text-emerald-700"><i class="fas fa-chart-bar text-lg"></i><span class="text-xs mt-0.5">Reports</span></a>
      <a href="mengineyo-births.html" class="flex flex-col items-center py-1 px-2 text-gray-500 hover:text-emerald-700"><i class="fas fa-baby text-lg"></i><span class="text-xs mt-0.5">Births</span></a>
    </div>
  </nav>

  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-storage-compat.js"></script>
  <script src="../firebase.js"></script>
  <script src="./mengineyo-core.js"></script>
  <script>
    const session = ME.requireAuth();
    ME.renderHeader();

    // Hide Add button for Viewers
    if (['Viewer','Vet','Accountant'].includes(session.role)) {
      const btn = document.getElementById('addAnimalBtn');
      if (btn) btn.classList.add('hidden');
    }

    let allAnimals = [];

    function loadAnimals() {
      ME.meRef(session.projectId, 'animals').on('value', snap => {
        allAnimals = ME.snapshotToAnimals(snap);
        // Sort: active first, then by createdAt desc
        allAnimals.sort((a, b) => {
          if (a.status === 'active' && b.status !== 'active') return -1;
          if (b.status === 'active' && a.status !== 'active') return 1;
          return (b.createdAt || 0) - (a.createdAt || 0);
        });
        renderStats();
        applyFilters();
      });
    }

    function renderStats() {
      const counts = {};
      allAnimals.filter(a => a.status === 'active').forEach(a => {
        counts[a.species || 'Other'] = (counts[a.species || 'Other'] || 0) + 1;
      });
      const bar = document.getElementById('statsBar');
      const total = allAnimals.filter(a => a.status === 'active').length;
      const items = [{ label:'Total', n: total, cls:'bg-emerald-100 text-emerald-800' }];
      Object.entries(counts).forEach(([sp, n]) => items.push({ label: sp, n, cls:'bg-gray-100 text-gray-700' }));
      bar.innerHTML = items.map(i => `<div class="flex-shrink-0 ${i.cls} rounded-full px-3 py-1 text-xs font-semibold whitespace-nowrap">${i.label}: ${i.n}</div>`).join('');
    }

    function applyFilters() {
      const sp  = document.getElementById('filterSpecies').value;
      const st  = document.getElementById('filterStatus').value;
      const filtered = allAnimals.filter(a =>
        (!sp || ME.normalizeSpecies(a.species) === sp) &&
        (!st || ME.normalizeStatus(a.status) === st)
      );
      renderAnimals(filtered);
    }

    const speciesIcons = { Cattle:'🐄', Goat:'🐐', Sheep:'🐑', Chicken:'🐔', Pig:'🐷', Other:'🐾' };
    const statusColors = { active:'text-green-600 bg-green-50', sold:'text-amber-600 bg-amber-50', dead:'text-gray-500 bg-gray-100', missing:'text-red-600 bg-red-50', transferred:'text-blue-600 bg-blue-50' };
    const pregColors  = { 'Confirmed pregnant':'text-pink-700 font-semibold', 'Suspected pregnant':'text-pink-500', 'Recently gave birth':'text-teal-600' };

    function renderAnimals(list) {
      const el = document.getElementById('animalsList');
      if (!list.length) { el.innerHTML = '<div class="col-span-full text-center text-gray-400 text-sm py-8">No animals found.</div>'; return; }
      el.innerHTML = list.map(a => {
        const icon = speciesIcons[a.species] || '🐾';
        const stCls = statusColors[a.status] || 'text-gray-600 bg-gray-100';
        const pregCls = pregColors[a.pregnancyStatus] || '';
        return `
        <div class="bg-white rounded-xl border border-gray-100 shadow-sm overflow-hidden">
          <div class="flex items-start gap-3 p-4">
            ${a.photoUrl ? `<img src="${a.photoUrl}" alt="" class="w-14 h-14 rounded-xl object-cover flex-shrink-0 border border-gray-200" />` : `<div class="w-14 h-14 rounded-xl bg-emerald-50 flex items-center justify-center text-3xl flex-shrink-0">${icon}</div>`}
            <div class="flex-1 min-w-0">
              <div class="flex items-start justify-between gap-1">
                <div class="font-bold text-gray-800 text-sm truncate">${a.name || a.animalId || 'Animal'}</div>
                <span class="text-xs px-2 py-0.5 rounded-full flex-shrink-0 ${stCls}">${a.status || 'active'}</span>
              </div>
              <div class="text-xs text-gray-500">${a.species || ''} · ${a.sex || ''} ${a.breed ? '· ' + a.breed : ''}</div>
              <div class="text-xs text-gray-400 font-mono mt-0.5">${a.animalId || ''}</div>
              ${a.pregnancyStatus && a.pregnancyStatus !== 'Not applicable' ? `<div class="text-xs mt-1 ${pregCls}">${a.pregnancyStatus}</div>` : ''}
              ${a.milkStatus === 'Lactating' ? '<div class="text-xs text-blue-600 mt-0.5"><i class="fas fa-tint"></i> Lactating</div>' : ''}
            </div>
          </div>
          ${['Chair','CEO','Manager','Mchungi'].includes(session.role) ? `
          <div class="border-t border-gray-50 px-4 py-2 flex gap-3">
            <button onclick="openEditModal('${a.id}')" class="text-xs text-emerald-600 hover:text-emerald-800 font-semibold"><i class="fas fa-edit mr-1"></i>Edit</button>
            <button onclick="viewAnimal('${a.id}')" class="text-xs text-gray-500 hover:text-gray-700 font-semibold"><i class="fas fa-eye mr-1"></i>View Details</button>
          </div>` : ''}
        </div>`;
      }).join('');
    }

    function viewAnimal(id) {
      const a = allAnimals.find(x => x.id === id);
      if (!a) return;
      alert([
        'ID: ' + (a.animalId || id),
        'Name: ' + (a.name || '-'),
        'Species: ' + (a.species || '-'),
        'Sex: ' + (a.sex || '-'),
        'Breed: ' + (a.breed || '-'),
        'Color: ' + (a.color || '-'),
        'Status: ' + (a.status || '-'),
        'Pregnancy: ' + (a.pregnancyStatus || '-'),
        'Milk Status: ' + (a.milkStatus || '-'),
        'Acquired: ' + (a.acquiredBy || '-') + ' on ' + (a.dateAcquired || '-'),
        'Mother ID: ' + (a.motherID || '-'),
        'Father ID: ' + (a.fatherID || '-'),
        'Purchase Price: ' + (session.currencySymbol || '') + ' ' + (a.purchasePrice || 0),
        'Notes: ' + (a.notes || '-'),
      ].join('\n'));
    }

    function openAddModal() {
      clearForm();
      document.getElementById('editAnimalId').value = '';
      document.getElementById('animalModalTitle').textContent = 'Add Animal';
      document.getElementById('aDateAcquired').value = ME.todayStr();
      document.getElementById('animalModal').classList.remove('hidden');
    }

    function openEditModal(id) {
      const a = allAnimals.find(x => x.id === id);
      if (!a) return;
      clearForm();
      document.getElementById('editAnimalId').value = id;
      document.getElementById('animalModalTitle').textContent = 'Edit Animal';
      document.getElementById('aSpecies').value  = a.species || '';
      document.getElementById('aSex').value      = a.sex || '';
      document.getElementById('aName').value     = a.name || '';
      document.getElementById('aBreed').value    = a.breed || '';
      document.getElementById('aColor').value    = a.color || '';
      document.getElementById('aAcquiredBy').value = a.acquiredBy || '';
      document.getElementById('aDateAcquired').value = a.dateAcquired || '';
      document.getElementById('aDOB').value      = a.dateOfBirth || '';
      document.getElementById('aAge').value      = a.estimatedAge || '';
      document.getElementById('aPurchasePrice').value = a.purchasePrice || '';
      document.getElementById('aTransportCost').value = a.transportCost || '';
      document.getElementById('aSeller').value   = a.seller || '';
      document.getElementById('aMotherID').value = a.motherID || '';
      document.getElementById('aFatherID').value = a.fatherID || '';
      document.getElementById('aPregnancy').value = a.pregnancyStatus || '';
      document.getElementById('aExpectedBirth').value = a.expectedBirthDate || '';
      document.getElementById('aMilkStatus').value = a.milkStatus || '';
      document.getElementById('aStatus').value   = a.status || 'active';
      document.getElementById('aNotes').value    = a.notes || '';
      document.getElementById('animalModal').classList.remove('hidden');
    }

    function clearForm() {
      ['aSpecies','aSex','aName','aBreed','aColor','aAcquiredBy','aDateAcquired','aDOB','aAge','aPurchasePrice','aTransportCost','aSeller','aMotherID','aFatherID','aPregnancy','aExpectedBirth','aMilkStatus','aNotes'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.value = '';
      });
      document.getElementById('aStatus').value = 'active';
    }

    async function saveAnimal() {
      const editId  = document.getElementById('editAnimalId').value;
      const species = ME.normalizeSpecies(document.getElementById('aSpecies').value);
      const sex     = document.getElementById('aSex').value;
      const acqBy   = document.getElementById('aAcquiredBy').value;

      if (!species) { ME.showAlert('Please select a species.', 'error', 'animalModalAlert'); return; }
      if (!sex)     { ME.showAlert('Please select the sex.', 'error', 'animalModalAlert'); return; }
      if (!acqBy)   { ME.showAlert('Please select how the animal was acquired.', 'error', 'animalModalAlert'); return; }

      ME.setBtnLoading('saveAnimalBtn', true);
      try {
        // Handle photo upload
        const photoInput = document.getElementById('aPhoto');
        let photoUrl = null;
        if (photoInput.files && photoInput.files.length) {
          ME.showAlert('Uploading photo…', 'info', 'animalModalAlert');
          photoUrl = await ME.uploadPhoto(photoInput, 'animals', session.projectId);
        }

        const animalId = editId ? null : ME.generateAnimalId(species);
        const data = {
          ...(editId ? {} : { animalId, ...ME.baseRecord() }),
          species,
          sex,
          name: document.getElementById('aName').value.trim() || null,
          breed: document.getElementById('aBreed').value.trim() || null,
          color: document.getElementById('aColor').value.trim() || null,
          acquiredBy: acqBy,
          dateAcquired: document.getElementById('aDateAcquired').value || null,
          dateOfBirth: document.getElementById('aDOB').value || null,
          estimatedAge: document.getElementById('aAge').value.trim() || null,
          purchasePrice: parseFloat(document.getElementById('aPurchasePrice').value) || 0,
          transportCost: parseFloat(document.getElementById('aTransportCost').value) || 0,
          seller: document.getElementById('aSeller').value.trim() || null,
          motherID: document.getElementById('aMotherID').value.trim() || null,
          fatherID: document.getElementById('aFatherID').value.trim() || null,
          pregnancyStatus: document.getElementById('aPregnancy').value || null,
          expectedBirthDate: document.getElementById('aExpectedBirth').value || null,
          milkStatus: document.getElementById('aMilkStatus').value || null,
          status: ME.normalizeStatus(document.getElementById('aStatus').value),
          notes: document.getElementById('aNotes').value.trim() || null,
          ...(photoUrl ? { photoUrl } : {}),
          ...ME.updateMeta(),
        };

        let savedId = editId;
        if (editId) {
          await ME.meRef(session.projectId, 'animals/' + editId).update(data);
          await ME.audit('animal_edited', 'animal', editId, { species, name: data.name });
        } else {
          const ref = ME.meRef(session.projectId, 'animals').push();
          savedId = ref.key;
          await ref.set({ ...data, animalId: animalId || savedId });
          await ME.audit('animal_added', 'animal', savedId, { species, animalId, name: data.name });
        }

        ME.showAlert('Animal saved!', 'success');
        setTimeout(() => closeModal(null, 'animalModal'), 1200);
      } catch(e) {
        ME.showAlert('Save failed: ' + e.message, 'error', 'animalModalAlert');
      }
      ME.setBtnLoading('saveAnimalBtn', false);
    }

    function closeModal(evt, id) {
      if (evt && evt.target !== document.getElementById(id)) return;
      document.getElementById(id).classList.add('hidden');
    }

    loadAnimals();
  </script>
</body>
</html>
