<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MENGINEYO — Milk Records</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
</head>
<body class="min-h-screen bg-gray-50 pb-28">

  <header class="bg-emerald-700 text-white px-4 py-3">
    <div class="max-w-3xl mx-auto flex items-center justify-between">
      <div class="flex items-center gap-2">
        <a href="mengineyo-dashboard.html" class="text-emerald-200 hover:text-white"><i class="fas fa-arrow-left"></i></a>
        <div>
          <div class="font-bold text-base">Milk Records</div>
          <div class="text-xs text-emerald-200" id="meProjectName"></div>
        </div>
      </div>
      <span class="text-xs text-emerald-200" id="meOperatorInfo"></span>
    </div>
  </header>

  <div class="max-w-3xl mx-auto px-4 py-4">
    <div id="meAlert"></div>

    <!-- Date picker + Add button -->
    <div class="flex flex-col sm:flex-row gap-3 mb-4">
      <div class="flex items-center gap-2 flex-1">
        <label class="text-sm font-semibold text-gray-700 whitespace-nowrap">Date:</label>
        <input id="milkDate" type="date" onchange="loadMilkForDate()" class="border border-gray-300 rounded-lg px-3 py-2 text-sm flex-1 focus:ring-2 focus:ring-emerald-500 focus:outline-none" />
      </div>
      <button onclick="openAddModal()" class="bg-emerald-600 text-white text-sm px-4 py-2 rounded-lg hover:bg-emerald-700 font-semibold whitespace-nowrap">
        <i class="fas fa-plus mr-1"></i>Record Milk
      </button>
    </div>

    <!-- Daily summary -->
    <div id="dailySummary" class="grid grid-cols-2 sm:grid-cols-4 gap-3 mb-4 hidden">
      <div class="bg-blue-50 rounded-xl p-3 text-center">
        <div class="text-xl font-bold text-blue-700" id="sumTotal">0</div>
        <div class="text-xs text-gray-500 mt-0.5">Total Litres</div>
      </div>
      <div class="bg-green-50 rounded-xl p-3 text-center">
        <div class="text-xl font-bold text-green-700" id="sumSold">0</div>
        <div class="text-xs text-gray-500 mt-0.5">Sold</div>
      </div>
      <div class="bg-amber-50 rounded-xl p-3 text-center">
        <div class="text-xl font-bold text-amber-700" id="sumHome">0</div>
        <div class="text-xs text-gray-500 mt-0.5">Used at Home</div>
      </div>
      <div class="bg-emerald-50 rounded-xl p-3 text-center">
        <div class="text-xl font-bold text-emerald-700" id="sumIncome">0</div>
        <div class="text-xs text-gray-500 mt-0.5">Income</div>
      </div>
    </div>

    <!-- Records list -->
    <div id="milkList" class="space-y-3">
      <div class="text-center text-gray-400 text-sm py-8"><i class="fas fa-tint text-gray-300 text-3xl mb-2 block"></i>No milk records for this date.</div>
    </div>
  </div>

  <!-- Add/Edit Milk Modal -->
  <div id="milkModal" class="hidden fixed inset-0 z-50 flex items-end sm:items-center justify-center px-4 py-4" onclick="closeModal(event,'milkModal')">
    <div class="absolute inset-0 bg-black/50"></div>
    <div class="relative bg-white rounded-2xl shadow-xl w-full max-w-lg p-5 max-h-[90vh] overflow-y-auto" onclick="event.stopPropagation()">
      <div class="flex items-center justify-between mb-4">
        <h3 class="font-bold text-gray-800">Record Milk</h3>
        <button onclick="closeModal(null,'milkModal')" class="text-gray-400 hover:text-gray-700"><i class="fas fa-times"></i></button>
      </div>
      <div id="milkModalAlert"></div>
      <input type="hidden" id="editMilkId" />
      <div class="space-y-3">
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-xs font-semibold text-gray-600 mb-1">Date <span class="text-red-500">*</span></label>
            <input id="mDate" type="date" class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:ring-2 focus:ring-emerald-500 focus:outline-none" />
          </div>
          <div>
            <label class="block text-xs font-semibold text-gray-600 mb-1">Animal / Cow <span class="text-red-500">*</span></label>
            <select id="mAnimal" class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:ring-2 focus:ring-emerald-500 focus:outline-none">
              <option value="">Select animal…</option>
            </select>
          </div>
        </div>
        <div class="bg-blue-50 rounded-xl p-3">
          <p class="text-xs font-semibold text-blue-700 mb-2"><i class="fas fa-tint mr-1"></i>Milk Produced</p>
          <div class="grid grid-cols-3 gap-2">
            <div>
              <label class="block text-xs text-gray-600 mb-1">Morning (L)</label>
              <input id="mMorning" type="number" min="0" step="0.1" placeholder="0.0" onchange="calcTotal()" oninput="calcTotal()" class="w-full border border-gray-300 rounded-lg px-2 py-2 text-sm focus:ring-2 focus:ring-blue-400 focus:outline-none" />
            </div>
            <div>
              <label class="block text-xs text-gray-600 mb-1">Evening (L)</label>
              <input id="mEvening" type="number" min="0" step="0.1" placeholder="0.0" onchange="calcTotal()" oninput="calcTotal()" class="w-full border border-gray-300 rounded-lg px-2 py-2 text-sm focus:ring-2 focus:ring-blue-400 focus:outline-none" />
            </div>
            <div>
              <label class="block text-xs text-gray-600 mb-1">Total (L)</label>
              <input id="mTotal" type="number" min="0" step="0.1" readonly class="w-full border border-blue-200 rounded-lg px-2 py-2 text-sm bg-blue-50 font-bold text-blue-700" />
            </div>
          </div>
        </div>
        <div class="bg-gray-50 rounded-xl p-3">
          <p class="text-xs font-semibold text-gray-600 mb-2">Milk Allocation</p>
          <div class="grid grid-cols-2 gap-2">
            <div>
              <label class="block text-xs text-gray-500 mb-1">Sold (L)</label>
              <input id="mSold" type="number" min="0" step="0.1" placeholder="0.0" oninput="checkAllocation()" class="w-full border border-gray-300 rounded-lg px-2 py-2 text-sm focus:ring-2 focus:ring-emerald-500 focus:outline-none" />
            </div>
            <div>
              <label class="block text-xs text-gray-500 mb-1">Home / Tea (L)</label>
              <input id="mHome" type="number" min="0" step="0.1" placeholder="0.0" oninput="checkAllocation()" class="w-full border border-gray-300 rounded-lg px-2 py-2 text-sm focus:ring-2 focus:ring-emerald-500 focus:outline-none" />
            </div>
            <div>
              <label class="block text-xs text-gray-500 mb-1">Calf / Reserved (L)</label>
              <input id="mCalf" type="number" min="0" step="0.1" placeholder="0.0" oninput="checkAllocation()" class="w-full border border-gray-300 rounded-lg px-2 py-2 text-sm focus:ring-2 focus:ring-emerald-500 focus:outline-none" />
            </div>
            <div>
              <label class="block text-xs text-gray-500 mb-1">Wasted / Spoiled (L)</label>
              <input id="mWasted" type="number" min="0" step="0.1" placeholder="0.0" oninput="checkAllocation()" class="w-full border border-gray-300 rounded-lg px-2 py-2 text-sm focus:ring-2 focus:ring-emerald-500 focus:outline-none" />
            </div>
          </div>
          <div id="allocWarning" class="hidden mt-2 text-xs text-amber-700 bg-amber-50 border border-amber-200 rounded-lg px-2 py-1.5">
            <i class="fas fa-exclamation-triangle mr-1"></i>
            <span id="allocMsg">Allocation does not match total milk.</span>
          </div>
        </div>
        <div class="bg-green-50 rounded-xl p-3">
          <p class="text-xs font-semibold text-green-700 mb-2"><i class="fas fa-coins mr-1"></i>Sales</p>
          <div class="grid grid-cols-2 gap-2">
            <div>
              <label class="block text-xs text-gray-500 mb-1">Price per Litre</label>
              <input id="mPricePerL" type="number" min="0" step="0.01" placeholder="0.00" oninput="calcIncome()" class="w-full border border-gray-300 rounded-lg px-2 py-2 text-sm focus:ring-2 focus:ring-emerald-500 focus:outline-none" />
            </div>
            <div>
              <label class="block text-xs text-gray-500 mb-1">Total Income</label>
              <input id="mIncome" type="number" min="0" step="0.01" readonly class="w-full border border-green-200 rounded-lg px-2 py-2 text-sm bg-green-50 font-bold text-green-700" />
            </div>
            <div>
              <label class="block text-xs text-gray-500 mb-1">Buyer Name</label>
              <input id="mBuyer" type="text" placeholder="Optional" class="w-full border border-gray-300 rounded-lg px-2 py-2 text-sm focus:ring-2 focus:ring-emerald-500 focus:outline-none" />
            </div>
            <div>
              <label class="block text-xs text-gray-500 mb-1">Amount Paid</label>
              <input id="mPaid" type="number" min="0" step="0.01" placeholder="0.00" class="w-full border border-gray-300 rounded-lg px-2 py-2 text-sm focus:ring-2 focus:ring-emerald-500 focus:outline-none" />
            </div>
          </div>
        </div>
        <div>
          <label class="block text-xs font-semibold text-gray-600 mb-1">Notes</label>
          <textarea id="mNotes" rows="2" placeholder="Optional notes…" class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:ring-2 focus:ring-emerald-500 focus:outline-none resize-none"></textarea>
        </div>
      </div>
      <button id="saveMilkBtn" onclick="saveMilk()" class="mt-4 w-full py-3 rounded-xl font-bold text-white bg-emerald-600 hover:bg-emerald-700 text-sm">
        Save Milk Record
      </button>
    </div>
  </div>

  <!-- Confirm Modal (Manager/Chair/CEO) -->
  <div id="confirmModal" class="hidden fixed inset-0 z-50 flex items-end sm:items-center justify-center px-4" onclick="closeModal(event,'confirmModal')">
    <div class="absolute inset-0 bg-black/50"></div>
    <div class="relative bg-white rounded-2xl shadow-xl w-full max-w-sm p-5" onclick="event.stopPropagation()">
      <h3 class="font-bold text-gray-800 mb-2">Confirm Milk Record</h3>
      <p class="text-sm text-gray-600 mb-4" id="confirmMsg"></p>
      <div id="confirmAlert"></div>
      <input type="hidden" id="confirmRecordId" />
      <div class="flex gap-3">
        <button onclick="closeModal(null,'confirmModal')" class="flex-1 py-2.5 rounded-xl font-semibold text-gray-700 border border-gray-300 text-sm">Cancel</button>
        <button onclick="doConfirm('Confirmed')" class="flex-1 py-2.5 rounded-xl font-bold text-white bg-emerald-600 hover:bg-emerald-700 text-sm">Confirm</button>
        <button onclick="doConfirm('Rejected')" class="flex-1 py-2.5 rounded-xl font-bold text-white bg-red-600 hover:bg-red-700 text-sm">Reject</button>
      </div>
    </div>
  </div>

  <!-- Bottom Nav -->
  <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 z-40">
    <div class="max-w-5xl mx-auto flex items-center justify-around py-1">
      <a href="mengineyo-dashboard.html" class="flex flex-col items-center py-1 px-2 text-gray-500 hover:text-emerald-700"><i class="fas fa-home text-lg"></i><span class="text-xs mt-0.5">Home</span></a>
      <a href="mengineyo-animals.html" class="flex flex-col items-center py-1 px-2 text-gray-500 hover:text-emerald-700"><i class="fas fa-cow text-lg"></i><span class="text-xs mt-0.5">Animals</span></a>
      <a href="mengineyo-milk.html" class="flex flex-col items-center py-1 px-2 text-emerald-700"><i class="fas fa-tint text-lg"></i><span class="text-xs mt-0.5 font-semibold">Milk</span></a>
      <a href="mengineyo-finance.html" class="flex flex-col items-center py-1 px-2 text-gray-500 hover:text-emerald-700"><i class="fas fa-coins text-lg"></i><span class="text-xs mt-0.5">Finance</span></a>
      <a href="mengineyo-reports.html" class="flex flex-col items-center py-1 px-2 text-gray-500 hover:text-emerald-700"><i class="fas fa-chart-bar text-lg"></i><span class="text-xs mt-0.5">Reports</span></a>
      <a href="mengineyo-births.html" class="flex flex-col items-center py-1 px-2 text-gray-500 hover:text-emerald-700"><i class="fas fa-baby text-lg"></i><span class="text-xs mt-0.5">Births</span></a>
    </div>
  </nav>

  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-storage-compat.js"></script>
  <script src="../firebase.js"></script>
  <script src="./mengineyo-core.js"></script>
  <script>
    const session = ME.requireAuth();
    ME.renderHeader();

    const canConfirm = ['Chair','CEO','Manager'].includes(session.role);
    const canRecord  = ['Chair','CEO','Manager','Mchungi'].includes(session.role);
    const sym = session.currencySymbol || 'KSh';

    // Set today's date
    document.getElementById('milkDate').value = ME.todayStr();

    // Load lactating animals for dropdown
    async function loadAnimals() {
      const snap = await ME.meRef(session.projectId, 'animals').once('value');
      const sel = document.getElementById('mAnimal');
      const opts = [];
      ME.snapshotToAnimals(snap).forEach(a => {
        if (a.status === 'active' && ['Cattle','Goat','Sheep'].includes(a.species)) {
          opts.push(`<option value="${a.id}" data-name="${a.name || a.animalId}">${a.name || a.animalId || a.id} (${a.species})</option>`);
        }
      });
      sel.innerHTML = '<option value="">Select animal…</option>' + opts.join('');
    }
    loadAnimals();

    function calcTotal() {
      const m = parseFloat(document.getElementById('mMorning').value) || 0;
      const e = parseFloat(document.getElementById('mEvening').value) || 0;
      document.getElementById('mTotal').value = (m + e).toFixed(1);
      checkAllocation();
      calcIncome();
    }

    function checkAllocation() {
      const total   = parseFloat(document.getElementById('mTotal').value) || 0;
      const sold    = parseFloat(document.getElementById('mSold').value)   || 0;
      const home    = parseFloat(document.getElementById('mHome').value)   || 0;
      const calf    = parseFloat(document.getElementById('mCalf').value)   || 0;
      const wasted  = parseFloat(document.getElementById('mWasted').value) || 0;
      const alloc   = sold + home + calf + wasted;
      const diff    = Math.abs(total - alloc);
      const warn    = document.getElementById('allocWarning');
      if (total > 0 && diff > 0.05) {
        document.getElementById('allocMsg').textContent =
          'Allocated ' + alloc.toFixed(1) + ' L but total is ' + total.toFixed(1) + ' L (difference: ' + diff.toFixed(1) + ' L)';
        warn.classList.remove('hidden');
      } else {
        warn.classList.add('hidden');
      }
    }

    function calcIncome() {
      const sold  = parseFloat(document.getElementById('mSold').value)       || 0;
      const price = parseFloat(document.getElementById('mPricePerL').value)  || 0;
      document.getElementById('mIncome').value = (sold * price).toFixed(2);
    }

    function openAddModal() {
      document.getElementById('editMilkId').value = '';
      document.getElementById('mDate').value    = document.getElementById('milkDate').value;
      document.getElementById('mMorning').value = '';
      document.getElementById('mEvening').value = '';
      document.getElementById('mTotal').value   = '';
      document.getElementById('mSold').value    = '';
      document.getElementById('mHome').value    = '';
      document.getElementById('mCalf').value    = '';
      document.getElementById('mWasted').value  = '';
      document.getElementById('mPricePerL').value = '';
      document.getElementById('mIncome').value  = '';
      document.getElementById('mBuyer').value   = '';
      document.getElementById('mPaid').value    = '';
      document.getElementById('mNotes').value   = '';
      document.getElementById('allocWarning').classList.add('hidden');
      document.getElementById('milkModal').classList.remove('hidden');
    }

    async function saveMilk() {
      const animalId = document.getElementById('mAnimal').value;
      const date     = document.getElementById('mDate').value;
      const morning  = parseFloat(document.getElementById('mMorning').value) || 0;
      const evening  = parseFloat(document.getElementById('mEvening').value) || 0;
      const total    = parseFloat(document.getElementById('mTotal').value)   || morning + evening;
      const sold     = parseFloat(document.getElementById('mSold').value)    || 0;
      const home     = parseFloat(document.getElementById('mHome').value)    || 0;
      const calf     = parseFloat(document.getElementById('mCalf').value)    || 0;
      const wasted   = parseFloat(document.getElementById('mWasted').value)  || 0;
      const price    = parseFloat(document.getElementById('mPricePerL').value) || 0;
      const income   = parseFloat(document.getElementById('mIncome').value)  || sold * price;
      const paid     = parseFloat(document.getElementById('mPaid').value)    || 0;
      const editId   = document.getElementById('editMilkId').value;

      if (!animalId) { ME.showAlert('Please select an animal.', 'error', 'milkModalAlert'); return; }
      if (!date)     { ME.showAlert('Please select a date.', 'error', 'milkModalAlert'); return; }
      if (total <= 0){ ME.showAlert('Please enter milk produced (morning or evening litres).', 'error', 'milkModalAlert'); return; }

      // Warn but don't block if allocation is off
      const alloc = sold + home + calf + wasted;
      if (total > 0 && Math.abs(total - alloc) > 0.05) {
        if (!confirm('Allocation (' + alloc.toFixed(1) + ' L) does not match total (' + total.toFixed(1) + ' L). Save anyway?')) return;
      }

      ME.setBtnLoading('saveMilkBtn', true);
      try {
        // Get animal name for record
        const animalSnap = await ME.meRef(session.projectId, 'animals/' + animalId).once('value');
        const animal = animalSnap.val();

        const data = {
          date, animalId,
          animalName: (animal && (animal.name || animal.animalId)) || animalId,
          animalSpecies: (animal && animal.species) || null,
          litresMorning: morning, litresEvening: evening, totalLitres: total,
          litresSold: sold, litresHome: home, litresCalf: calf, litresWasted: wasted,
          pricePerLitre: price, totalIncome: income,
          amountPaid: paid, debt: Math.max(0, income - paid),
          buyer: document.getElementById('mBuyer').value.trim() || null,
          notes: document.getElementById('mNotes').value.trim() || null,
          confirmStatus: 'Draft',
          currency: session.currency, currencySymbol: sym,
          ...ME.updateMeta(),
        };

        if (editId) {
          await ME.meRef(session.projectId, 'milkRecords/' + editId).update(data);
          await ME.audit('milk_edited', 'milkRecord', editId);
        } else {
          const ref = ME.meRef(session.projectId, 'milkRecords').push();
          await ref.set({ ...ME.baseRecord(), ...data });
          await ME.audit('milk_recorded', 'milkRecord', ref.key, { date, animalId, total });
        }

        // Also create/update finance income record for milk
        if (income > 0) {
          const fRef = ME.meRef(session.projectId, 'financeRecords').push();
          await fRef.set({
            ...ME.baseRecord(),
            type: 'Income', category: 'Milk sales', date,
            amount: income, amountPaid: paid, paymentStatus: paid >= income ? 'Paid' : paid > 0 ? 'Partial' : 'Pending',
            description: 'Milk sale: ' + (animal && animal.name || animalId) + ' — ' + sold.toFixed(1) + ' L',
            relatedAnimalId: animalId, currency: session.currency, currencySymbol: sym,
          });
        }

        ME.showAlert('Milk record saved!', 'success');
        setTimeout(() => { closeModal(null,'milkModal'); loadMilkForDate(); }, 1000);
      } catch(e) {
        ME.showAlert('Save failed: ' + e.message, 'error', 'milkModalAlert');
      }
      ME.setBtnLoading('saveMilkBtn', false);
    }

    function loadMilkForDate() {
      const date = document.getElementById('milkDate').value;
      ME.meRef(session.projectId, 'milkRecords').orderByChild('date').equalTo(date).once('value').then(snap => {
        const records = [];
        snap.forEach(ch => records.push({ id: ch.key, ...ch.val() }));
        renderMilkList(records);
        renderDailySummary(records);
      });
    }

    function renderDailySummary(records) {
      if (!records.length) { document.getElementById('dailySummary').classList.add('hidden'); return; }
      document.getElementById('dailySummary').classList.remove('hidden');
      let total = 0, sold = 0, home = 0, income = 0;
      records.forEach(r => {
        total  += r.totalLitres  || 0;
        sold   += r.litresSold   || 0;
        home   += r.litresHome   || 0;
        income += r.totalIncome  || 0;
      });
      ME.setText('sumTotal',  total.toFixed(1)  + ' L');
      ME.setText('sumSold',   sold.toFixed(1)   + ' L');
      ME.setText('sumHome',   home.toFixed(1)   + ' L');
      ME.setText('sumIncome', sym + ' ' + income.toFixed(2));
    }

    const confirmColors = { Draft:'bg-gray-100 text-gray-600', Submitted:'bg-blue-100 text-blue-700', Confirmed:'bg-green-100 text-green-700', Rejected:'bg-red-100 text-red-700' };

    function renderMilkList(records) {
      const el = document.getElementById('milkList');
      if (!records.length) {
        el.innerHTML = '<div class="text-center text-gray-400 text-sm py-8"><i class="fas fa-tint text-gray-300 text-3xl mb-2 block"></i>No milk records for this date.</div>';
        return;
      }
      records.sort((a,b) => (a.animalName||'').localeCompare(b.animalName||''));
      el.innerHTML = records.map(r => {
        const cCls = confirmColors[r.confirmStatus] || confirmColors.Draft;
        return `
        <div class="bg-white rounded-xl border border-gray-100 shadow-sm p-4">
          <div class="flex items-start justify-between gap-2 mb-2">
            <div>
              <div class="font-bold text-gray-800 text-sm">${r.animalName || 'Animal'} <span class="text-gray-400 font-normal">(${r.animalSpecies || ''})</span></div>
              <div class="text-xs text-gray-400">Recorded by ${r.createdByName || '-'}</div>
            </div>
            <span class="text-xs px-2 py-0.5 rounded-full font-semibold ${cCls}">${r.confirmStatus || 'Draft'}</span>
          </div>
          <div class="grid grid-cols-4 gap-2 text-center text-xs mb-2">
            <div class="bg-blue-50 rounded-lg p-1.5"><div class="font-bold text-blue-700">${(r.totalLitres||0).toFixed(1)}L</div><div class="text-gray-500">Total</div></div>
            <div class="bg-green-50 rounded-lg p-1.5"><div class="font-bold text-green-700">${(r.litresSold||0).toFixed(1)}L</div><div class="text-gray-500">Sold</div></div>
            <div class="bg-amber-50 rounded-lg p-1.5"><div class="font-bold text-amber-700">${(r.litresHome||0).toFixed(1)}L</div><div class="text-gray-500">Home</div></div>
            <div class="bg-emerald-50 rounded-lg p-1.5"><div class="font-bold text-emerald-700">${sym} ${(r.totalIncome||0).toFixed(0)}</div><div class="text-gray-500">Income</div></div>
          </div>
          ${r.debt > 0 ? `<div class="text-xs text-red-600 mb-2"><i class="fas fa-exclamation-circle mr-1"></i>Debt: ${sym} ${r.debt.toFixed(2)}</div>` : ''}
          ${r.notes ? `<div class="text-xs text-gray-500 italic mb-2">${r.notes}</div>` : ''}
          <div class="flex gap-2 flex-wrap">
            ${canRecord ? `<button onclick="editRecord('${r.id}')" class="text-xs bg-gray-100 hover:bg-gray-200 px-3 py-1.5 rounded-lg font-semibold text-gray-700"><i class="fas fa-edit mr-1"></i>Edit</button>` : ''}
            ${canConfirm && r.confirmStatus !== 'Confirmed' ? `<button onclick="openConfirm('${r.id}','${r.animalName||r.animalId}')" class="text-xs bg-emerald-50 hover:bg-emerald-100 px-3 py-1.5 rounded-lg font-semibold text-emerald-700"><i class="fas fa-check mr-1"></i>Confirm</button>` : ''}
          </div>
        </div>`;
      }).join('');
    }

    function editRecord(id) {
      ME.meRef(session.projectId, 'milkRecords/' + id).once('value').then(snap => {
        const r = snap.val();
        if (!r) return;
        document.getElementById('editMilkId').value  = id;
        document.getElementById('mDate').value        = r.date || '';
        document.getElementById('mAnimal').value      = r.animalId || '';
        document.getElementById('mMorning').value     = r.litresMorning || '';
        document.getElementById('mEvening').value     = r.litresEvening || '';
        document.getElementById('mTotal').value       = r.totalLitres || '';
        document.getElementById('mSold').value        = r.litresSold || '';
        document.getElementById('mHome').value        = r.litresHome || '';
        document.getElementById('mCalf').value        = r.litresCalf || '';
        document.getElementById('mWasted').value      = r.litresWasted || '';
        document.getElementById('mPricePerL').value   = r.pricePerLitre || '';
        document.getElementById('mIncome').value      = r.totalIncome || '';
        document.getElementById('mBuyer').value       = r.buyer || '';
        document.getElementById('mPaid').value        = r.amountPaid || '';
        document.getElementById('mNotes').value       = r.notes || '';
        document.getElementById('milkModal').classList.remove('hidden');
      });
    }

    function openConfirm(id, animalName) {
      document.getElementById('confirmRecordId').value = id;
      document.getElementById('confirmMsg').textContent = 'Confirm or reject the milk record for ' + animalName + '?';
      document.getElementById('confirmModal').classList.remove('hidden');
    }

    async function doConfirm(status) {
      const id = document.getElementById('confirmRecordId').value;
      try {
        await ME.meRef(session.projectId, 'milkRecords/' + id).update({
          confirmStatus: status,
          confirmedBy: session.operatorId,
          confirmedByName: session.operatorName,
          confirmedAt: ME.now(),
          ...ME.updateMeta(),
        });
        await ME.audit('milk_' + status.toLowerCase(), 'milkRecord', id);
        closeModal(null,'confirmModal');
        loadMilkForDate();
      } catch(e) {
        ME.showAlert('Failed: ' + e.message, 'error', 'confirmAlert');
      }
    }

    function closeModal(evt, id) {
      if (evt && evt.target !== document.getElementById(id)) return;
      document.getElementById(id).classList.add('hidden');
    }

    loadMilkForDate();
  </script>
</body>
</html>
