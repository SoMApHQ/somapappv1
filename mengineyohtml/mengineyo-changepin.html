<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MENGINEYO — Change PIN</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <style>.me-hero { background: linear-gradient(135deg, #064e3b 0%, #065f46 60%, #047857 100%); }</style>
</head>
<body class="min-h-screen me-hero flex flex-col items-center justify-center px-4 py-10">
  <div class="w-full max-w-sm">
    <div class="text-center mb-6">
      <div class="text-white font-extrabold text-3xl tracking-widest">MENGINEYO</div>
      <div class="text-emerald-200 text-xs mt-1">Change Your PIN</div>
    </div>
    <div class="bg-white rounded-2xl shadow-xl p-6">
      <div class="bg-amber-50 border border-amber-200 rounded-xl p-3 mb-4">
        <p class="text-xs text-amber-800"><i class="fas fa-exclamation-triangle mr-1"></i>You are using a temporary PIN. Please set a new personal PIN now.</p>
      </div>
      <div id="meAlert"></div>
      <div class="space-y-4">
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1">New PIN <span class="text-red-500">*</span></label>
          <div class="relative">
            <input id="newPin" type="password" placeholder="Minimum 4 characters" class="w-full border border-gray-300 rounded-lg px-3 py-3 text-sm focus:ring-2 focus:ring-emerald-500 focus:outline-none pr-10" />
            <button type="button" onclick="togglePin('newPin',this)" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400"><i class="fas fa-eye"></i></button>
          </div>
        </div>
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1">Confirm New PIN <span class="text-red-500">*</span></label>
          <div class="relative">
            <input id="confirmPin" type="password" placeholder="Repeat your new PIN" class="w-full border border-gray-300 rounded-lg px-3 py-3 text-sm focus:ring-2 focus:ring-emerald-500 focus:outline-none pr-10" />
            <button type="button" onclick="togglePin('confirmPin',this)" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400"><i class="fas fa-eye"></i></button>
          </div>
        </div>
        <button id="changePinBtn" onclick="changePIN()" class="w-full py-3 rounded-xl font-bold text-white bg-emerald-600 hover:bg-emerald-700 text-sm">
          Set New PIN
        </button>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-storage-compat.js"></script>
  <script src="../firebase.js"></script>
  <script src="./mengineyo-core.js"></script>
  <script>
    const session = ME.requireAuth();

    function togglePin(id, btn) {
      const inp = document.getElementById(id);
      if (inp.type === 'password') { inp.type='text'; btn.innerHTML='<i class="fas fa-eye-slash"></i>'; }
      else { inp.type='password'; btn.innerHTML='<i class="fas fa-eye"></i>'; }
    }

    async function changePIN() {
      const pin  = document.getElementById('newPin').value;
      const conf = document.getElementById('confirmPin').value;
      if (pin.length < 4)  { ME.showAlert('PIN must be at least 4 characters.', 'error'); return; }
      if (pin !== conf)    { ME.showAlert('PINs do not match.', 'error'); return; }

      ME.setBtnLoading('changePinBtn', true);
      try {
        const hash = await ME.hashPin(pin);
        await ME.meRef(session.projectId, 'operators/' + session.operatorId).update({
          pinHash: hash,
          temporaryPin: false,
          temporaryPinHash: null,
          ...ME.updateMeta(),
        });
        // Update session
        session.isTemporaryPin = false;
        ME.saveSession(session);
        await ME.audit('pin_changed', 'operator', session.operatorId);
        await ME.vaultSaveOperator(
          session.projectId,
          { projectName: session.projectName, projectCode: session.projectCode },
          session.operatorId,
          { fullName: session.operatorName, role: session.role, password: pin, temporaryPin: false }
        ).catch(() => {});
        ME.showAlert('PIN changed successfully! Redirecting to dashboard…', 'success');
        setTimeout(() => { window.location.href = 'mengineyo-dashboard.html'; }, 1500);
      } catch(e) {
        ME.showAlert('Failed to change PIN: ' + e.message, 'error');
      }
      ME.setBtnLoading('changePinBtn', false);
    }
  </script>
</body>
</html>
