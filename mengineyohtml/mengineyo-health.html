<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MENGINEYO — Health Records</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
</head>
<body class="min-h-screen bg-gray-50 pb-28">

  <header class="bg-emerald-700 text-white px-4 py-3">
    <div class="max-w-3xl mx-auto flex items-center justify-between">
      <div class="flex items-center gap-2">
        <a href="mengineyo-dashboard.html" class="text-emerald-200 hover:text-white"><i class="fas fa-arrow-left"></i></a>
        <div>
          <div class="font-bold text-base">Health &amp; Vet Records</div>
          <div class="text-xs text-emerald-200" id="meProjectName"></div>
        </div>
      </div>
      <span class="text-xs text-emerald-200" id="meOperatorInfo"></span>
    </div>
  </header>

  <div class="max-w-3xl mx-auto px-4 py-4">
    <div id="meAlert"></div>

    <!-- Alerts panel -->
    <div id="upcomingAlerts" class="mb-4"></div>

    <div class="flex justify-between items-center mb-4">
      <div class="flex gap-2">
        <select id="filterType" onchange="loadRecords()" class="border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500">
          <option value="">All Types</option>
          <option>Sickness</option><option>Injury</option><option>Vaccination</option><option>Deworming</option>
          <option>Pregnancy check</option><option>Routine check</option><option>Treatment</option><option>Death report</option>
        </select>
      </div>
      <button onclick="openModal()" class="bg-red-600 text-white text-sm px-4 py-2 rounded-lg hover:bg-red-700 font-semibold whitespace-nowrap">
        <i class="fas fa-plus mr-1"></i>Add Health Record
      </button>
    </div>

    <div id="healthList" class="space-y-3">
      <div class="text-center text-gray-400 text-sm py-8">Loading health records…</div>
    </div>
  </div>

  <!-- Health Modal -->
  <div id="healthModal" class="hidden fixed inset-0 z-50 flex items-end sm:items-center justify-center px-4 py-4" onclick="closeModal(event,'healthModal')">
    <div class="absolute inset-0 bg-black/50"></div>
    <div class="relative bg-white rounded-2xl shadow-xl w-full max-w-lg p-5 max-h-[90vh] overflow-y-auto" onclick="event.stopPropagation()">
      <div class="flex items-center justify-between mb-4">
        <h3 class="font-bold text-gray-800">Health / Vet Record</h3>
        <button onclick="closeModal(null,'healthModal')" class="text-gray-400"><i class="fas fa-times"></i></button>
      </div>
      <div id="healthModalAlert"></div>
      <input type="hidden" id="editHealthId" />
      <div class="space-y-3">
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-xs font-semibold text-gray-600 mb-1">Animal <span class="text-red-500">*</span></label>
            <select id="hAnimal" class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:ring-2 focus:ring-red-400 focus:outline-none">
              <option value="">Select animal…</option>
            </select>
          </div>
          <div>
            <label class="block text-xs font-semibold text-gray-600 mb-1">Date <span class="text-red-500">*</span></label>
            <input id="hDate" type="date" class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:ring-2 focus:ring-red-400 focus:outline-none" />
          </div>
        </div>
        <div>
          <label class="block text-xs font-semibold text-gray-600 mb-1">Record Type <span class="text-red-500">*</span></label>
          <select id="hType" class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:ring-2 focus:ring-red-400 focus:outline-none">
            <option value="">Select type…</option>
            <option>Sickness</option><option>Injury</option><option>Vaccination</option><option>Deworming</option>
            <option>Pregnancy check</option><option>Routine check</option><option>Treatment</option><option>Death report</option>
          </select>
        </div>
        <div>
          <label class="block text-xs font-semibold text-gray-600 mb-1">Symptoms / Issue Description</label>
          <textarea id="hSymptoms" rows="2" placeholder="Describe the condition, symptoms, or reason for visit…" class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:ring-2 focus:ring-red-400 focus:outline-none resize-none"></textarea>
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-xs font-semibold text-gray-600 mb-1">Vet / Person Responsible</label>
            <input id="hVet" type="text" placeholder="Name of vet or person" class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:ring-2 focus:ring-red-400 focus:outline-none" />
          </div>
          <div>
            <label class="block text-xs font-semibold text-gray-600 mb-1">Medicine / Treatment</label>
            <input id="hMedicine" type="text" placeholder="e.g. Oxytetracycline" class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:ring-2 focus:ring-red-400 focus:outline-none" />
          </div>
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-xs font-semibold text-gray-600 mb-1">Cost</label>
            <input id="hCost" type="number" min="0" step="0.01" placeholder="0.00" class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:ring-2 focus:ring-red-400 focus:outline-none" />
          </div>
          <div>
            <label class="block text-xs font-semibold text-gray-600 mb-1">Next Visit Date</label>
            <input id="hNextVisit" type="date" class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:ring-2 focus:ring-red-400 focus:outline-none" />
          </div>
        </div>
        <div>
          <label class="block text-xs font-semibold text-gray-600 mb-1">Recovery Status</label>
          <select id="hRecovery" class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:ring-2 focus:ring-red-400 focus:outline-none">
            <option>Ongoing</option><option>Recovered</option><option>Dead</option><option>Follow-up needed</option>
          </select>
        </div>
        <div>
          <label class="block text-xs font-semibold text-gray-600 mb-1">Receipt / Photo <span class="text-gray-400 font-normal">(optional)</span></label>
          <input id="hPhoto" type="file" accept="image/*,application/pdf" class="w-full text-sm text-gray-500 file:mr-3 file:py-2 file:px-4 file:rounded-lg file:border-0 file:font-semibold file:bg-red-50 file:text-red-700 hover:file:bg-red-100" />
        </div>
        <div>
          <label class="block text-xs font-semibold text-gray-600 mb-1">Notes</label>
          <textarea id="hNotes" rows="2" placeholder="Optional additional notes…" class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:ring-2 focus:ring-red-400 focus:outline-none resize-none"></textarea>
        </div>
      </div>
      <button id="saveHealthBtn" onclick="saveHealth()" class="mt-4 w-full py-3 rounded-xl font-bold text-white bg-red-600 hover:bg-red-700 text-sm">
        Save Health Record
      </button>
    </div>
  </div>

  <!-- Bottom Nav -->
  <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 z-40">
    <div class="max-w-5xl mx-auto flex items-center justify-around py-1">
      <a href="mengineyo-dashboard.html" class="flex flex-col items-center py-1 px-2 text-gray-500 hover:text-emerald-700"><i class="fas fa-home text-lg"></i><span class="text-xs mt-0.5">Home</span></a>
      <a href="mengineyo-animals.html" class="flex flex-col items-center py-1 px-2 text-gray-500 hover:text-emerald-700"><i class="fas fa-cow text-lg"></i><span class="text-xs mt-0.5">Animals</span></a>
      <a href="mengineyo-milk.html" class="flex flex-col items-center py-1 px-2 text-gray-500 hover:text-emerald-700"><i class="fas fa-tint text-lg"></i><span class="text-xs mt-0.5">Milk</span></a>
      <a href="mengineyo-finance.html" class="flex flex-col items-center py-1 px-2 text-gray-500 hover:text-emerald-700"><i class="fas fa-coins text-lg"></i><span class="text-xs mt-0.5">Finance</span></a>
      <a href="mengineyo-reports.html" class="flex flex-col items-center py-1 px-2 text-gray-500 hover:text-emerald-700"><i class="fas fa-chart-bar text-lg"></i><span class="text-xs mt-0.5">Reports</span></a>
      <a href="mengineyo-health.html" class="flex flex-col items-center py-1 px-2 text-emerald-700"><i class="fas fa-stethoscope text-lg"></i><span class="text-xs mt-0.5 font-semibold">Health</span></a>
    </div>
  </nav>

  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-storage-compat.js"></script>
  <script src="../firebase.js"></script>
  <script src="./mengineyo-core.js"></script>
  <script>
    const session = ME.requireAuth();
    ME.renderHeader();
    document.getElementById('hDate').value = ME.todayStr();
    const sym = session.currencySymbol || 'KSh';

    async function loadAnimals() {
      const snap = await ME.meRef(session.projectId, 'animals').once('value');
      const opts = [];
      snap.forEach(ch => {
        const a = ch.val();
        opts.push(`<option value="${ch.key}">${a.name || a.animalId || ch.key} (${a.species || ''}) — ${a.status || 'active'}</option>`);
      });
      document.getElementById('hAnimal').innerHTML = '<option value="">Select animal…</option>' + opts.join('');
    }
    loadAnimals();

    async function loadUpcomingAlerts() {
      const today = ME.todayStr();
      const snap = await ME.meRef(session.projectId, 'healthRecords').once('value');
      const due = [];
      snap.forEach(ch => {
        const h = ch.val();
        if (h.nextVisitDate && h.nextVisitDate <= today && h.recoveryStatus !== 'Recovered' && h.recoveryStatus !== 'Dead') {
          due.push(h);
        }
      });
      const box = document.getElementById('upcomingAlerts');
      if (due.length) {
        box.innerHTML = `
          <div class="bg-amber-50 border border-amber-200 rounded-xl p-3 mb-4">
            <div class="font-semibold text-amber-700 text-sm mb-1"><i class="fas fa-bell mr-1"></i>Vet Visits Due / Overdue (${due.length})</div>
            ${due.map(h => `<div class="text-xs text-amber-600">${h.animalName || h.animalId} — ${h.type} — Next visit: ${h.nextVisitDate || 'Unknown'}</div>`).join('')}
          </div>`;
      }
    }
    loadUpcomingAlerts();

    async function loadRecords() {
      const typeFilter = document.getElementById('filterType').value;
      const snap = await ME.meRef(session.projectId, 'healthRecords').orderByChild('createdAt').limitToLast(50).once('value');
      const records = [];
      snap.forEach(ch => records.unshift({ id: ch.key, ...ch.val() }));
      const filtered = typeFilter ? records.filter(r => r.type === typeFilter) : records;
      renderList(filtered);
    }

    const typeCls = { Sickness:'bg-red-100 text-red-700', Injury:'bg-orange-100 text-orange-700', Vaccination:'bg-green-100 text-green-700', Deworming:'bg-teal-100 text-teal-700', 'Pregnancy check':'bg-pink-100 text-pink-700', 'Routine check':'bg-blue-100 text-blue-700', Treatment:'bg-purple-100 text-purple-700', 'Death report':'bg-gray-200 text-gray-700' };
    const recoveryCls = { Ongoing:'text-amber-600', Recovered:'text-green-600', Dead:'text-gray-500', 'Follow-up needed':'text-red-600' };

    function renderList(records) {
      const el = document.getElementById('healthList');
      if (!records.length) { el.innerHTML = '<div class="text-center text-gray-400 text-sm py-8">No health records found.</div>'; return; }
      el.innerHTML = records.map(r => `
        <div class="bg-white rounded-xl border border-gray-100 shadow-sm p-4">
          <div class="flex items-start justify-between gap-2 mb-2">
            <div>
              <div class="font-bold text-gray-800 text-sm">${r.animalName || r.animalId || '-'}</div>
              <div class="text-xs text-gray-400">${ME.fmtDate(r.date)} · Recorded by ${r.createdByName || '-'}</div>
            </div>
            <span class="text-xs px-2 py-0.5 rounded-full font-semibold flex-shrink-0 ${typeCls[r.type] || 'bg-gray-100 text-gray-700'}">${r.type || '-'}</span>
          </div>
          ${r.symptoms ? `<div class="text-xs text-gray-600 mb-2">${r.symptoms}</div>` : ''}
          <div class="flex flex-wrap gap-2 text-xs">
            ${r.medicine ? `<span class="bg-gray-100 text-gray-700 rounded-full px-2 py-0.5"><i class="fas fa-pills mr-1"></i>${r.medicine}</span>` : ''}
            ${r.cost ? `<span class="bg-amber-50 text-amber-700 rounded-full px-2 py-0.5">${sym} ${parseFloat(r.cost).toFixed(2)}</span>` : ''}
            ${r.vet ? `<span class="bg-blue-50 text-blue-700 rounded-full px-2 py-0.5"><i class="fas fa-user-md mr-1"></i>${r.vet}</span>` : ''}
            ${r.recoveryStatus ? `<span class="${recoveryCls[r.recoveryStatus] || ''} font-semibold">${r.recoveryStatus}</span>` : ''}
          </div>
          ${r.nextVisitDate ? `<div class="text-xs mt-2 ${r.nextVisitDate <= ME.todayStr() ? 'text-red-600 font-semibold' : 'text-blue-600'}"><i class="fas fa-calendar mr-1"></i>Next visit: ${r.nextVisitDate}</div>` : ''}
          ${r.notes ? `<div class="text-xs text-gray-400 italic mt-1">${r.notes}</div>` : ''}
        </div>`).join('');
    }

    function openModal() { document.getElementById('healthModal').classList.remove('hidden'); }

    async function saveHealth() {
      const animalId = document.getElementById('hAnimal').value;
      const date     = document.getElementById('hDate').value;
      const type     = document.getElementById('hType').value;
      if (!animalId) { ME.showAlert('Please select an animal.', 'error', 'healthModalAlert'); return; }
      if (!date)     { ME.showAlert('Please enter a date.', 'error', 'healthModalAlert'); return; }
      if (!type)     { ME.showAlert('Please select a record type.', 'error', 'healthModalAlert'); return; }

      ME.setBtnLoading('saveHealthBtn', true);
      try {
        const animalSnap = await ME.meRef(session.projectId, 'animals/' + animalId).once('value');
        const animal = animalSnap.val();

        let photoUrl = null;
        const photoInput = document.getElementById('hPhoto');
        if (photoInput.files && photoInput.files.length) {
          ME.showAlert('Uploading…', 'info', 'healthModalAlert');
          photoUrl = await ME.uploadPhoto(photoInput, 'health', session.projectId);
        }

        const cost = parseFloat(document.getElementById('hCost').value) || 0;
        const ref  = ME.meRef(session.projectId, 'healthRecords').push();

        await ref.set({
          ...ME.baseRecord(),
          animalId, animalName: (animal && (animal.name || animal.animalId)) || animalId,
          animalSpecies: animal ? animal.species : null,
          date, type,
          symptoms: document.getElementById('hSymptoms').value.trim() || null,
          vet: document.getElementById('hVet').value.trim() || null,
          medicine: document.getElementById('hMedicine').value.trim() || null,
          cost, currency: session.currency,
          nextVisitDate: document.getElementById('hNextVisit').value || null,
          recoveryStatus: document.getElementById('hRecovery').value,
          photoUrl: photoUrl || null,
          notes: document.getElementById('hNotes').value.trim() || null,
        });

        // Log vet cost as expense
        if (cost > 0) {
          const cat = type === 'Vaccination' ? 'Vet' : type === 'Deworming' ? 'Medicine' : 'Vet';
          await ME.meRef(session.projectId, 'financeRecords').push().set({
            ...ME.baseRecord(),
            type: 'Expense', category: cat, date,
            amount: cost, paymentStatus: 'Paid',
            description: type + ' for ' + ((animal && animal.name) || animalId),
            relatedAnimalId: animalId, currency: session.currency, currencySymbol: sym,
          });
        }

        // Update animal if death report
        if (type === 'Death report') {
          await ME.meRef(session.projectId, 'animals/' + animalId).update({ status: 'dead', dateOfDeath: date, ...ME.updateMeta() });
        }

        await ME.audit('health_record_added', 'healthRecord', ref.key, { animalId, type, cost });
        ME.showAlert('Health record saved!', 'success');
        setTimeout(() => { closeModal(null,'healthModal'); loadRecords(); loadUpcomingAlerts(); }, 1200);
      } catch(e) {
        ME.showAlert('Save failed: ' + e.message, 'error', 'healthModalAlert');
      }
      ME.setBtnLoading('saveHealthBtn', false);
    }

    function closeModal(evt, id) {
      if (evt && evt.target !== document.getElementById(id)) return;
      document.getElementById(id).classList.add('hidden');
    }

    loadRecords();
  </script>
</body>
</html>
