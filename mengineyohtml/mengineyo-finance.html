<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MENGINEYO — Finance</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
</head>
<body class="min-h-screen bg-gray-50 pb-28">

  <header class="bg-emerald-700 text-white px-4 py-3">
    <div class="max-w-3xl mx-auto flex items-center justify-between">
      <div class="flex items-center gap-2">
        <a href="mengineyo-dashboard.html" class="text-emerald-200 hover:text-white"><i class="fas fa-arrow-left"></i></a>
        <div>
          <div class="font-bold text-base">Finance</div>
          <div class="text-xs text-emerald-200" id="meProjectName"></div>
        </div>
      </div>
      <span class="text-xs text-emerald-200" id="meOperatorInfo"></span>
    </div>
  </header>

  <div class="max-w-3xl mx-auto px-4 py-4">
    <div id="meAlert"></div>

    <!-- Month summary cards -->
    <div class="grid grid-cols-3 gap-3 mb-4">
      <div class="bg-green-50 border border-green-200 rounded-xl p-3 text-center">
        <div class="text-lg font-bold text-green-700" id="sumIncome">—</div>
        <div class="text-xs text-gray-500 mt-0.5">Income</div>
      </div>
      <div class="bg-red-50 border border-red-200 rounded-xl p-3 text-center">
        <div class="text-lg font-bold text-red-700" id="sumExpense">—</div>
        <div class="text-xs text-gray-500 mt-0.5">Expenses</div>
      </div>
      <div class="bg-emerald-50 border border-emerald-200 rounded-xl p-3 text-center">
        <div class="text-lg font-bold" id="sumNet">—</div>
        <div class="text-xs text-gray-500 mt-0.5">Net</div>
      </div>
    </div>

    <!-- Filter + Add -->
    <div class="flex flex-col sm:flex-row gap-3 mb-4">
      <div class="flex gap-2 flex-1 flex-wrap">
        <select id="filterType" onchange="loadRecords()" class="border border-gray-300 rounded-lg px-3 py-2 text-sm flex-1 min-w-24 focus:outline-none focus:ring-2 focus:ring-emerald-500">
          <option value="">All Types</option>
          <option value="Income">Income</option>
          <option value="Expense">Expense</option>
        </select>
        <input id="filterMonth" type="month" onchange="loadRecords()" class="border border-gray-300 rounded-lg px-3 py-2 text-sm flex-1 min-w-28 focus:outline-none focus:ring-2 focus:ring-emerald-500" />
      </div>
      <button onclick="openModal()" class="bg-emerald-600 text-white text-sm px-4 py-2 rounded-lg hover:bg-emerald-700 font-semibold whitespace-nowrap">
        <i class="fas fa-plus mr-1"></i>Add Record
      </button>
    </div>

    <div id="financeList" class="space-y-3">
      <div class="text-center text-gray-400 text-sm py-8">Loading finance records…</div>
    </div>
  </div>

  <!-- Finance Modal -->
  <div id="financeModal" class="hidden fixed inset-0 z-50 flex items-end sm:items-center justify-center px-4 py-4" onclick="closeModal(event,'financeModal')">
    <div class="absolute inset-0 bg-black/50"></div>
    <div class="relative bg-white rounded-2xl shadow-xl w-full max-w-lg p-5 max-h-[90vh] overflow-y-auto" onclick="event.stopPropagation()">
      <div class="flex items-center justify-between mb-4">
        <h3 class="font-bold text-gray-800">Finance Record</h3>
        <button onclick="closeModal(null,'financeModal')" class="text-gray-400"><i class="fas fa-times"></i></button>
      </div>
      <div id="financeModalAlert"></div>
      <input type="hidden" id="editFinanceId" />
      <div class="space-y-3">
        <!-- Income / Expense toggle -->
        <div class="flex gap-2">
          <button id="typeIncome" onclick="setType('Income')" class="flex-1 py-2.5 rounded-xl font-bold text-sm border-2 border-green-600 bg-green-600 text-white">
            <i class="fas fa-arrow-up mr-1"></i>Income
          </button>
          <button id="typeExpense" onclick="setType('Expense')" class="flex-1 py-2.5 rounded-xl font-bold text-sm border-2 border-gray-300 text-gray-600 hover:border-red-400 hover:text-red-600">
            <i class="fas fa-arrow-down mr-1"></i>Expense
          </button>
        </div>
        <input type="hidden" id="fType" value="Income" />

        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-xs font-semibold text-gray-600 mb-1">Date <span class="text-red-500">*</span></label>
            <input id="fDate" type="date" class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:ring-2 focus:ring-emerald-500 focus:outline-none" />
          </div>
          <div>
            <label class="block text-xs font-semibold text-gray-600 mb-1">Category <span class="text-red-500">*</span></label>
            <select id="fCategory" class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:ring-2 focus:ring-emerald-500 focus:outline-none">
              <option value="">Select…</option>
            </select>
          </div>
        </div>

        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-xs font-semibold text-gray-600 mb-1">Amount <span class="text-red-500">*</span></label>
            <input id="fAmount" type="number" min="0" step="0.01" placeholder="0.00" class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:ring-2 focus:ring-emerald-500 focus:outline-none" />
          </div>
          <div>
            <label class="block text-xs font-semibold text-gray-600 mb-1">Amount Paid</label>
            <input id="fPaid" type="number" min="0" step="0.01" placeholder="0.00" class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:ring-2 focus:ring-emerald-500 focus:outline-none" />
          </div>
        </div>

        <div>
          <label class="block text-xs font-semibold text-gray-600 mb-1">Payment Status</label>
          <select id="fPayStatus" class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:ring-2 focus:ring-emerald-500 focus:outline-none">
            <option value="Paid">Paid</option><option value="Pending">Pending</option><option value="Partial">Partial</option><option value="Debt">Debt</option>
          </select>
        </div>

        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-xs font-semibold text-gray-600 mb-1">Paid By</label>
            <input id="fPaidBy" type="text" placeholder="Name of payer" class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:ring-2 focus:ring-emerald-500 focus:outline-none" />
          </div>
          <div>
            <label class="block text-xs font-semibold text-gray-600 mb-1">Paid To</label>
            <input id="fPaidTo" type="text" placeholder="Name of recipient" class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:ring-2 focus:ring-emerald-500 focus:outline-none" />
          </div>
        </div>

        <div>
          <label class="block text-xs font-semibold text-gray-600 mb-1">Description</label>
          <textarea id="fDesc" rows="2" placeholder="Describe this transaction…" class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:ring-2 focus:ring-emerald-500 focus:outline-none resize-none"></textarea>
        </div>

        <div>
          <label class="block text-xs font-semibold text-gray-600 mb-1">Related Animal <span class="text-gray-400 font-normal">(optional)</span></label>
          <select id="fAnimal" class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:ring-2 focus:ring-emerald-500 focus:outline-none">
            <option value="">None</option>
          </select>
        </div>

        <div>
          <label class="block text-xs font-semibold text-gray-600 mb-1">Receipt Photo <span class="text-gray-400 font-normal">(optional)</span></label>
          <input id="fReceipt" type="file" accept="image/*,application/pdf" class="w-full text-sm text-gray-500 file:mr-3 file:py-2 file:px-4 file:rounded-lg file:border-0 file:font-semibold file:bg-emerald-50 file:text-emerald-700 hover:file:bg-emerald-100" />
        </div>
      </div>
      <button id="saveFinanceBtn" onclick="saveFinance()" class="mt-4 w-full py-3 rounded-xl font-bold text-white bg-emerald-600 hover:bg-emerald-700 text-sm">
        Save Record
      </button>
    </div>
  </div>

  <!-- Bottom Nav -->
  <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 z-40">
    <div class="max-w-5xl mx-auto flex items-center justify-around py-1">
      <a href="mengineyo-dashboard.html" class="flex flex-col items-center py-1 px-2 text-gray-500 hover:text-emerald-700"><i class="fas fa-home text-lg"></i><span class="text-xs mt-0.5">Home</span></a>
      <a href="mengineyo-animals.html" class="flex flex-col items-center py-1 px-2 text-gray-500 hover:text-emerald-700"><i class="fas fa-cow text-lg"></i><span class="text-xs mt-0.5">Animals</span></a>
      <a href="mengineyo-milk.html" class="flex flex-col items-center py-1 px-2 text-gray-500 hover:text-emerald-700"><i class="fas fa-tint text-lg"></i><span class="text-xs mt-0.5">Milk</span></a>
      <a href="mengineyo-finance.html" class="flex flex-col items-center py-1 px-2 text-emerald-700"><i class="fas fa-coins text-lg"></i><span class="text-xs mt-0.5 font-semibold">Finance</span></a>
      <a href="mengineyo-reports.html" class="flex flex-col items-center py-1 px-2 text-gray-500 hover:text-emerald-700"><i class="fas fa-chart-bar text-lg"></i><span class="text-xs mt-0.5">Reports</span></a>
      <a href="mengineyo-births.html" class="flex flex-col items-center py-1 px-2 text-gray-500 hover:text-emerald-700"><i class="fas fa-baby text-lg"></i><span class="text-xs mt-0.5">Births</span></a>
    </div>
  </nav>

  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-storage-compat.js"></script>
  <script src="../firebase.js"></script>
  <script src="./mengineyo-core.js"></script>
  <script>
    const session = ME.requireAuth();
    ME.renderHeader();
    const sym = session.currencySymbol || 'KSh';

    // Set current month
    const now = new Date();
    document.getElementById('filterMonth').value = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0');
    document.getElementById('fDate').value = ME.todayStr();

    function normalizeSpeciesLocal(value) {
      if (ME.normalizeSpecies) return ME.normalizeSpecies(value);
      const key = String(value || '').trim().toLowerCase();
      if (['cattle','cow','cows'].includes(key)) return 'Cattle';
      if (['goat','goats'].includes(key)) return 'Goat';
      if (key === 'sheep') return 'Sheep';
      if (['chicken','chickens'].includes(key)) return 'Chicken';
      if (['pig','pigs'].includes(key)) return 'Pig';
      return value || 'Other';
    }

    function normalizeStatusLocal(value) {
      const key = String(value || 'active').trim().toLowerCase();
      return ['active','sold','dead','missing','transferred','deleted'].includes(key) ? key : 'active';
    }

    function animalsFromSnapshot(snap) {
      if (ME.snapshotToAnimals) return ME.snapshotToAnimals(snap);
      const animals = [];
      snap.forEach(ch => {
        const value = ch.val() || {};
        if (value.species || value.animalId || value.name || value.sex || value.status) {
          animals.push({ id: ch.key, ...value, species: normalizeSpeciesLocal(value.species), status: normalizeStatusLocal(value.status) });
          return;
        }
        Object.keys(value).forEach(nestedKey => {
          const nested = value[nestedKey];
          if (nested && typeof nested === 'object') {
            animals.push({ id: nestedKey, species: normalizeSpeciesLocal(ch.key), ...nested, status: normalizeStatusLocal(nested.status) });
          }
        });
      });
      return animals;
    }

    // Load animals for dropdown
    ME.meRef(session.projectId, 'animals').once('value').then(snap => {
      const opts = ['<option value="">None</option>'];
      animalsFromSnapshot(snap).forEach(a => {
        opts.push(`<option value="${a.id}">${a.name || a.animalId || a.id} (${a.species || ''})</option>`);
      });
      document.getElementById('fAnimal').innerHTML = opts.join('');
    });

    // Check URL param for type
    const urlType = new URLSearchParams(window.location.search).get('type');
    if (urlType === 'income') setType('Income');
    else if (urlType === 'expense') setType('Expense');
    else setType('Income');

    function setType(type) {
      document.getElementById('fType').value = type;
      const incBtn = document.getElementById('typeIncome');
      const expBtn = document.getElementById('typeExpense');
      incBtn.className = 'flex-1 py-2.5 rounded-xl font-bold text-sm border-2 ' + (type==='Income' ? 'border-green-600 bg-green-600 text-white' : 'border-gray-300 text-gray-600 hover:border-green-400 hover:text-green-600');
      expBtn.className = 'flex-1 py-2.5 rounded-xl font-bold text-sm border-2 ' + (type==='Expense' ? 'border-red-600 bg-red-600 text-white' : 'border-gray-300 text-gray-600 hover:border-red-400 hover:text-red-600');
      // Update category options
      const cats = type === 'Income' ? ME.INCOME_CATS : ME.EXPENSE_CATS;
      ME.populateSelect('fCategory', cats, c => c, c => c);
    }

    async function loadRecords() {
      const typeFilter  = document.getElementById('filterType').value;
      const monthFilter = document.getElementById('filterMonth').value;

      const snap = await ME.meRef(session.projectId, 'financeRecords').orderByChild('createdAt').limitToLast(100).once('value');
      let records = [];
      snap.forEach(ch => records.unshift({ id: ch.key, ...ch.val() }));

      if (typeFilter) records = records.filter(r => r.type === typeFilter);

      // Filter by month if selected
      if (monthFilter) {
        records = records.filter(r => r.date && r.date.startsWith(monthFilter));
      }

      // Calculate summary
      let income = 0, expense = 0;
      records.forEach(r => {
        if (r.type === 'Income')  income  += parseFloat(r.amount || 0);
        if (r.type === 'Expense') expense += parseFloat(r.amount || 0);
      });
      const net = income - expense;
      ME.setText('sumIncome',  sym + ' ' + income.toFixed(2));
      ME.setText('sumExpense', sym + ' ' + expense.toFixed(2));
      const netEl = document.getElementById('sumNet');
      netEl.textContent = sym + ' ' + Math.abs(net).toFixed(2);
      netEl.className = 'text-lg font-bold ' + (net >= 0 ? 'text-green-700' : 'text-red-600');

      renderList(records);
    }

    const payCls = { Paid:'bg-green-100 text-green-700', Pending:'bg-amber-100 text-amber-700', Partial:'bg-blue-100 text-blue-700', Debt:'bg-red-100 text-red-700' };

    function renderList(records) {
      const el = document.getElementById('financeList');
      if (!records.length) { el.innerHTML = '<div class="text-center text-gray-400 text-sm py-8">No finance records for this period.</div>'; return; }
      el.innerHTML = records.map(r => `
        <div class="bg-white rounded-xl border border-gray-100 shadow-sm p-4">
          <div class="flex items-start justify-between gap-2">
            <div class="flex items-center gap-2">
              <div class="w-8 h-8 rounded-full flex items-center justify-center flex-shrink-0 ${r.type==='Income'?'bg-green-100':'bg-red-100'}">
                <i class="fas ${r.type==='Income'?'fa-arrow-up text-green-600':'fa-arrow-down text-red-600'} text-sm"></i>
              </div>
              <div>
                <div class="font-bold text-gray-800 text-sm">${r.category || '-'}</div>
                <div class="text-xs text-gray-400">${r.date || '-'} · ${r.createdByName || '-'}</div>
              </div>
            </div>
            <div class="text-right flex-shrink-0">
              <div class="font-bold text-sm ${r.type==='Income'?'text-green-700':'text-red-600'}">${sym} ${parseFloat(r.amount||0).toFixed(2)}</div>
              <span class="text-xs px-2 py-0.5 rounded-full ${payCls[r.paymentStatus]||'bg-gray-100 text-gray-600'}">${r.paymentStatus || '-'}</span>
            </div>
          </div>
          ${r.description ? `<div class="text-xs text-gray-500 mt-2">${r.description}</div>` : ''}
          ${r.paidBy || r.paidTo ? `<div class="text-xs text-gray-400 mt-1">${r.paidBy?'From: '+r.paidBy:''} ${r.paidTo?'To: '+r.paidTo:''}</div>` : ''}
        </div>`).join('');
    }

    function openModal() {
      document.getElementById('editFinanceId').value = '';
      document.getElementById('fDate').value = ME.todayStr();
      document.getElementById('fAmount').value = '';
      document.getElementById('fPaid').value = '';
      document.getElementById('fDesc').value = '';
      document.getElementById('fPaidBy').value = '';
      document.getElementById('fPaidTo').value = '';
      document.getElementById('fPayStatus').value = 'Paid';
      document.getElementById('financeModal').classList.remove('hidden');
    }

    async function saveFinance() {
      const type     = document.getElementById('fType').value;
      const date     = document.getElementById('fDate').value;
      const category = document.getElementById('fCategory').value;
      const amount   = parseFloat(document.getElementById('fAmount').value);

      if (!date)        { ME.showAlert('Please enter a date.', 'error', 'financeModalAlert'); return; }
      if (!category)    { ME.showAlert('Please select a category.', 'error', 'financeModalAlert'); return; }
      if (!amount || amount <= 0) { ME.showAlert('Please enter a valid amount.', 'error', 'financeModalAlert'); return; }

      ME.setBtnLoading('saveFinanceBtn', true);
      try {
        let receiptUrl = null;
        const receiptInput = document.getElementById('fReceipt');
        if (receiptInput.files && receiptInput.files.length) {
          ME.showAlert('Uploading receipt…', 'info', 'financeModalAlert');
          receiptUrl = await ME.uploadPhoto(receiptInput, 'receipts', session.projectId);
        }

        const paid = parseFloat(document.getElementById('fPaid').value) || amount;
        const ref  = ME.meRef(session.projectId, 'financeRecords').push();

        await ref.set({
          ...ME.baseRecord(),
          type, category, date, amount, amountPaid: paid,
          paymentStatus: document.getElementById('fPayStatus').value,
          description: document.getElementById('fDesc').value.trim() || null,
          paidBy: document.getElementById('fPaidBy').value.trim() || null,
          paidTo: document.getElementById('fPaidTo').value.trim() || null,
          relatedAnimalId: document.getElementById('fAnimal').value || null,
          receiptUrl: receiptUrl || null,
          currency: session.currency, currencySymbol: sym,
        });

        await ME.audit('finance_recorded', 'financeRecord', ref.key, { type, category, amount, date });
        ME.showAlert('Finance record saved!', 'success');
        setTimeout(() => { closeModal(null,'financeModal'); loadRecords(); }, 1000);
      } catch(e) {
        ME.showAlert('Save failed: ' + e.message, 'error', 'financeModalAlert');
      }
      ME.setBtnLoading('saveFinanceBtn', false);
    }

    function closeModal(evt, id) {
      if (evt && evt.target !== document.getElementById(id)) return;
      document.getElementById(id).classList.add('hidden');
    }

    loadRecords();
  </script>
</body>
</html>
