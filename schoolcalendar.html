<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>School Calendar | SoMAp</title>
  <script src="somapappv1multischool/js/context.js"></script>
  <script src="Todashboardhtml/yearContext.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
  <script src="firebase.js"></script>
  <script src="js/school-logo.js"></script>
  <script src="shared/school_calendar.js"></script>
  <style>
    :root {
      --bg: #f8fafc;
      --panel: rgba(255,255,255,0.92);
      --line: rgba(15,23,42,0.08);
      --text: #0f172a;
      --muted: #475569;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(37,99,235,0.12), transparent 26%),
        radial-gradient(circle at top right, rgba(139,92,246,0.12), transparent 20%),
        linear-gradient(180deg, #eef2ff 0%, #f8fafc 32%, #ffffff 100%);
      color: var(--text);
      min-height: 100vh;
    }
    .page { max-width: 1400px; margin: 0 auto; padding: 22px; }
    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 24px;
      box-shadow: 0 18px 40px rgba(15,23,42,0.08);
      backdrop-filter: blur(10px);
    }
    .hero {
      display: flex;
      justify-content: space-between;
      gap: 18px;
      flex-wrap: wrap;
      padding: 22px;
      margin-bottom: 18px;
    }
    .brand { display: flex; align-items: center; gap: 16px; }
    .logo {
      width: 72px;
      height: 72px;
      border-radius: 18px;
      object-fit: cover;
      border: 1px solid var(--line);
      background: white;
      padding: 8px;
    }
    .eyebrow {
      margin: 0 0 6px;
      color: #2563eb;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-size: 0.8rem;
      font-weight: 800;
    }
    h1 { margin: 0; font-size: clamp(1.7rem, 3vw, 2.4rem); }
    .muted { color: var(--muted); }
    .pill-row { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 10px; }
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,0.9);
      border: 1px solid var(--line);
      color: var(--text);
      font-size: 0.9rem;
    }
    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 18px;
    }
    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 7px 10px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.72);
      font-size: 0.85rem;
    }
    .dot { width: 12px; height: 12px; border-radius: 999px; display: inline-block; }
    .layout {
      display: grid;
      grid-template-columns: 1.5fr 1fr;
      gap: 18px;
    }
    .panel-title { padding: 18px 18px 0; }
    .panel-body { padding: 18px; }
    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 14px;
    }
    .month-card {
      border-radius: 20px;
      border: 1px solid var(--line);
      background: rgba(248,250,252,0.94);
      padding: 14px;
    }
    .month-head, .month-days {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: 6px;
    }
    .month-head div {
      text-align: center;
      color: var(--muted);
      font-size: 0.72rem;
      text-transform: uppercase;
    }
    .day {
      min-height: 56px;
      border-radius: 14px;
      padding: 6px;
      border: 1px solid rgba(15,23,42,0.04);
      background: rgba(255,255,255,0.84);
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .day.empty { visibility: hidden; }
    .day.weekend { background: rgba(148,163,184,0.14); }
    .day.public_holiday { background: rgba(254,226,226,0.9); }
    .day.school_break { background: rgba(219,234,254,0.92); }
    .day.reopening { background: rgba(220,252,231,0.92); }
    .day.school_event { background: rgba(243,232,255,0.94); }
    .day.working_day_override { background: rgba(254,243,199,0.95); }
    .day-number { font-weight: 800; font-size: 0.84rem; }
    .day-note { font-size: 0.66rem; line-height: 1.2; color: #1e293b; }
    .event-list { display: grid; gap: 10px; }
    .event-card {
      border-radius: 18px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.86);
      padding: 14px;
      display: grid;
      gap: 8px;
    }
    .event-type {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 0.8rem;
      font-weight: 700;
      border: 1px solid transparent;
    }
    @media (max-width: 1080px) {
      .layout { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="card hero">
      <div class="brand">
        <img id="schoolLogo" class="logo" alt="School logo">
        <div>
          <p class="eyebrow">School Calendar</p>
          <h1 id="pageTitle">Loading school calendar...</h1>
          <p class="muted" id="schoolLine"></p>
          <div class="pill-row">
            <span class="pill" id="countryPill">Country</span>
            <span class="pill" id="yearPill">Year</span>
            <span class="pill">Read only</span>
          </div>
        </div>
      </div>
      <div style="display:flex; align-items:flex-start; gap:10px; flex-wrap:wrap;">
        <a class="pill" href="parent.html">Back</a>
      </div>
    </section>

    <div class="legend" id="legend"></div>

    <section class="layout">
      <article class="card">
        <div class="panel-title">
          <h2>Year Calendar</h2>
          <p class="muted">Public holidays, parent-visible breaks, events, and reopening dates.</p>
        </div>
        <div class="panel-body">
          <div class="calendar-grid" id="calendarGrid"></div>
        </div>
      </article>
      <article class="card">
        <div class="panel-title">
          <h2>Event List</h2>
          <p class="muted">Only parent-visible school entries are shown here, plus national public holidays.</p>
        </div>
        <div class="panel-body">
          <div class="event-list" id="eventList"></div>
        </div>
      </article>
    </section>
  </main>
  <script>
    (async function () {
      const Calendar = window.SomapSchoolCalendar;
      const params = new URLSearchParams(window.location.search);
      const schoolId = params.get('school') || Calendar.resolveSchoolId();
      const year = String(params.get('year') || window.somapYearContext?.getSelectedYear?.() || new Date().getFullYear());
      if (schoolId) {
        try { localStorage.setItem('somap.currentSchoolId', schoolId); } catch (_error) {}
      }

      const meta = await Calendar.getSchoolCalendarMeta(year, { schoolId });
      const publicHolidays = Calendar.getCountryPublicHolidayEntries(year, { country: meta.country });
      const entries = (await Calendar.listSchoolCalendarEntries(year, { schoolId, forceRefresh: true })).filter((entry) => entry.parentVisible);

      function escapeHtml(value) {
        return String(value || '')
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      document.getElementById('pageTitle').textContent = `${meta.schoolName} Calendar`;
      document.getElementById('schoolLine').textContent = `${meta.schoolName} | ${meta.country} | Academic year ${year}`;
      document.getElementById('countryPill').textContent = `Country: ${meta.country}`;
      document.getElementById('yearPill').textContent = `Year: ${year}`;
      if (window.SomapLogo?.loadSchoolLogo) {
        window.SomapLogo.loadSchoolLogo({
          elementId: 'schoolLogo',
          defaultLogo: 'images/somap-logo.png.jpg',
          fallbackLogo: 'images/somap-logo.png.jpg',
          schoolId,
        });
      }

      const legendItems = [
        { color: '#64748b', label: 'Weekend' },
        { color: Calendar.TYPE_META.public_holiday.color, label: 'Public holiday' },
        { color: Calendar.TYPE_META.school_break.color, label: 'School break' },
        { color: Calendar.TYPE_META.reopening.color, label: 'Reopening' },
        { color: Calendar.TYPE_META.school_event.color, label: 'Special event' },
        { color: Calendar.TYPE_META.working_day_override.color, label: 'Working weekend override' },
      ];
      document.getElementById('legend').innerHTML = legendItems.map((item) => `<span class="legend-item"><span class="dot" style="background:${item.color};"></span>${escapeHtml(item.label)}</span>`).join('');

      const publicMap = new Map(publicHolidays.map((holiday) => [holiday.startDate, holiday]));
      document.getElementById('calendarGrid').innerHTML = Array.from({ length: 12 }, function (_item, monthIndex) {
        const first = new Date(Number(year), monthIndex, 1);
        const offset = first.getDay();
        const monthName = first.toLocaleDateString('en-GB', { month: 'long' });
        const cells = [];
        for (let i = 0; i < offset; i += 1) cells.push('<div class="day empty"></div>');
        for (let day = 1; day <= 31; day += 1) {
          const date = new Date(Number(year), monthIndex, day);
          if (date.getMonth() !== monthIndex) break;
          const iso = `${year}-${String(monthIndex + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
          const entry = entries.find((item) => iso >= item.startDate && iso <= item.endDate) || publicMap.get(iso) || null;
          const classes = ['day'];
          if ((meta.weekendDays || [0, 6]).includes(date.getDay())) classes.push('weekend');
          if (entry?.type) classes.push(entry.type);
          cells.push(`<div class="${classes.join(' ')}"><div class="day-number">${day}</div><div class="day-note">${escapeHtml((entry?.title || '').slice(0, 24))}</div></div>`);
        }
        return `<div class="month-card"><h3>${escapeHtml(monthName)} ${year}</h3><div class="month-head"><div>Sun</div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div></div><div class="month-days">${cells.join('')}</div></div>`;
      }).join('');

      const list = publicHolidays.map((entry) => ({ ...entry, scope: { wholeSchool: true } })).concat(entries).sort((a, b) => a.startDate.localeCompare(b.startDate));
      document.getElementById('eventList').innerHTML = list.map((entry) => {
        const typeMeta = Calendar.TYPE_META[entry.type] || Calendar.TYPE_META.public_holiday;
        return `
          <article class="event-card">
            <div class="event-type" style="background:${typeMeta.background}; color:${typeMeta.color}; border-color:${typeMeta.color}33;"><span class="dot" style="background:${typeMeta.color};"></span>${escapeHtml(typeMeta.label)}</div>
            <strong>${escapeHtml(entry.title)}</strong>
            <div>${escapeHtml(Calendar.formatDateRange(entry.startDate, entry.endDate))}</div>
            <div><strong>Scope:</strong> ${escapeHtml(Calendar.describeScope(entry))}</div>
            <div><strong>Explanation:</strong> ${escapeHtml(entry.reason || entry.description || 'Public holiday')}</div>
            <div><strong>Authority note:</strong> ${escapeHtml(entry.authorityNote || '-')}</div>
          </article>`;
      }).join('');
    })().catch((error) => {
      console.error('School calendar public page failed', error);
      document.getElementById('pageTitle').textContent = 'School calendar failed to load';
      document.getElementById('schoolLine').textContent = error.message || String(error);
    });
  </script>
</body>
</html>
